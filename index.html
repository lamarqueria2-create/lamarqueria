    if (!fechaEnt) { alert("La fecha de entrega es obligatoria"); return; }
    onGuardar({folio:folioMostrar,cliente:cliente,tel:tel,fechaEntrega:fechaEnt,items:items,productos:productos,anticipo:ant,metodoPago:metodo,estado:pedidoOriginal?pedidoOriginal.estado:"Pendiente",nota:nota,descuentoPct:desPct,imagen:pedidoOriginal?(pedidoOriginal.imagen||null):null});
    onClose();
  }
  return (
    <Modal title={pedidoOriginal ? "Actualizar pedido #"+pedidoOriginal.folio : "Nota #"+nextFolio} onClose={onClose} wide={true}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        <div>
          <div style={{background:T.bgDark,borderRadius:8,padding:"10px 13px",marginBottom:12,border:"1px solid "+T.border}}>
            {(productos && productos.length > 0) ? (
              productos.map(function(prod) {
                const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
                if (itemsProd.length === 0) return null;
                const subProd = itemsProd.reduce(function(s,i){return s+(parseFloat(i.precio)||0);},0);
                return (
                  <div key={prod.id} style={{marginBottom:8,paddingBottom:6,borderBottom:"1px solid "+T.border}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                      <span style={{fontFamily:FONT,fontSize:12,fontWeight:700,color:T.text}}>{prod.titulo}</span>
                      <span style={{fontFamily:FONT,fontWeight:700,color:T.amber,fontSize:13}}>{fmt(subProd)}</span>
                    </div>
                    {prod.nota && <div style={{fontSize:10,color:T.amber,fontFamily:FS,fontStyle:"italic",marginBottom:3}}>📝 {prod.nota}</div>}
                    {itemsProd.map(function(it,i){
                      return <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2,fontFamily:FS,paddingLeft:8}}><span style={{color:T.textSub}}>· {it.nombre}</span><span style={{color:T.textFade}}>{fmt(it.precio)}</span></div>;
                    })}
                  </div>
                );
              })
            ) : (
              items.map(function(it,i){return <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3,fontFamily:FS}}><span style={{color:T.textSub}}>{it.nombre}</span><span style={{fontWeight:700}}>{fmt(it.precio)}</span></div>;})
            )}
            <div style={{borderTop:"1px solid "+T.border,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:FONT,fontWeight:700}}>Total</span><span style={{color:T.amber,fontWeight:700,fontSize:16,fontFamily:FONT}}>{fmt(sub)}</span></div>
          </div>
          <Inp label="Cliente *" value={cliente} onChange={e => setCli(e.target.value)}/>
          <Inp label="Telefono" value={tel} onChange={e => setTel(e.target.value)} type="tel"/>
          <Inp label="Fecha de entrega *" value={fechaEnt} onChange={e => setFE(e.target.value)} type="date"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Inp label="Anticipo ($)" value={anticipo} onChange={e => setAnt(e.target.value)} type="number"/>
            <Inp label="Descuento (%)" value={descPct} onChange={e => setDescPct(e.target.value)} type="number"/>
          </div>
          <Sel label="Metodo de pago" value={metodo} onChange={e => setMet(e.target.value)}>{METODOS.map(m => <option key={m}>{m}</option>)}</Sel>
          <Inp label="Nota" value={nota} onChange={e => setNota(e.target.value)}/>
        </div>
        <div>
          <ST>Resumen</ST>
          {[["Subtotal",fmt(sub),T.text,false],["Descuento",desPct>0?"-"+fmt(desMonto)+" ("+desPct+"%)":"-",T.textFade,false],["TOTAL",fmt(total),T.amber,true],["Anticipo",fmt(ant),T.green,false],["Saldo",fmt(saldo),saldo>0?T.orange:T.green,false]].map(function(row) {
            return (
              <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:(row[3]?"10":"6")+"px 12px",background:row[3]?T.bgDark:"transparent",borderRadius:row[3]?7:0,marginBottom:4}}>
                <span style={{color:T.textSub,fontSize:row[3]?14:12,fontFamily:FS,fontWeight:row[3]?700:400}}>{row[0]}</span>
                <span style={{color:row[2],fontWeight:700,fontSize:row[3]?18:13,fontFamily:row[3]?FONT:FS}}>{row[1]}</span>
              </div>
            );
          })}
          {tel && <a href={"https://wa.me/52"+String(tel||"").replace(/\D/g,"")+"?text="+encodeURIComponent("Nota #"+nextFolio+" — La Marqueria\nCliente: "+cliente+"\nTotal: "+fmt(total)+"\nSaldo: "+fmt(saldo)+"\nEntrega: "+fmtD(fechaEnt))} target="_blank" rel="noreferrer" style={{display:"block",background:"#25D366",color:"#fff",borderRadius:7,padding:"9px 0",textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13,fontFamily:FS,marginTop:8}}>WhatsApp</a>}
          <button onClick={() => generarPDF({folio:nextFolio,tipo:"nota",cliente:cliente,clienteTel:tel,clienteCorreo:"",fecha:HOY,fechaEntrega:fechaEnt,items:items,productos:productos,stock:stock,anticipo:ant,descuentoPct:desPct,iva:false})} style={{width:"100%",marginTop:8,background:"transparent",border:"1px solid "+T.border,borderRadius:7,padding:"9px 0",cursor:"pointer",fontFamily:FS,fontSize:13,fontWeight:600,color:T.text}}>Imprimir PDF</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={guardar} disabled={!cliente || !fechaEnt}>{pedidoOriginal ? "Actualizar #"+pedidoOriginal.folio : "Guardar #"+nextFolio}</Btn>
      </div>
    </Modal>
  );
}

// ── COTIZACIONES ──────────────────────────────────────────────
function TabCotizaciones({cotizaciones, setCotizaciones, onConvertir, nextFolio, onModificar}) {
  const EC = {Pendiente:{c:T.amber,bg:"#FFF8E0"},Aceptada:{c:T.green,bg:T.greenBg},Rechazada:{c:T.red,bg:T.redBg}};
  const [modalVer, setModalVer] = useState(null);
  function cambiar(id, e) { setCotizaciones(cotizaciones.map(c => c.id === id ? Object.assign({},c,{estado:e}) : c)); }
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Cotizaciones</div>
        <div style={{display:"flex",gap:8}}>
          {["Pendiente","Aceptada","Rechazada"].map(function(e) {
            const cnt = cotizaciones.filter(c => c.estado === e).length;
            const s = EC[e];
            return <div key={e} style={{background:s.bg,border:"1px solid "+s.c+"30",borderRadius:7,padding:"4px 12px",color:s.c,fontSize:12,fontWeight:700,fontFamily:FS}}>{e}: {cnt}</div>;
          })}
        </div>
      </div>
      {cotizaciones.length === 0 ? (
        <div style={{textAlign:"center",color:T.textFade,padding:"60px 0",fontFamily:FS}}>Sin cotizaciones. Crea una desde el Cotizador.</div>
      ) : cotizaciones.map(function(c) {
        const s = EC[c.estado] || EC.Pendiente;
        return (
          <Card key={c.id} style={{marginBottom:9,borderLeft:"3px solid "+s.c}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:2}}>
                  <span style={{fontWeight:700,fontSize:14,fontFamily:FONT}}>{c.cliente}</span>
                  <Badge label={c.estado} color={s.c} bg={s.bg}/>
                </div>
                <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>C-{c.folio} · {fmtD(c.fecha)}</div>
              </div>
              <div style={{color:T.amber,fontWeight:700,fontSize:18,fontFamily:FONT}}>{fmt(c.total)}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <Btn size="sm" variant="success" onClick={() => setModalVer(c)}>Ver</Btn>
                {c.estado === "Pendiente" && <Btn size="sm" onClick={() => cambiar(c.id,"Aceptada")}>Aceptar</Btn>}
                {c.estado === "Pendiente" && <Btn size="sm" variant="danger" onClick={() => cambiar(c.id,"Rechazada")}>Rechazar</Btn>}
                {c.estado === "Aceptada" && <Btn size="sm" onClick={() => onConvertir(c)}>Convertir a Nota #{nextFolio}</Btn>}
                <Btn size="sm" variant="danger" onClick={() => { if(confirmar("¿Eliminar cotización C-"+c.folio+"?")) setCotizaciones(cotizaciones.filter(x => x.id !== c.id)); }}>Eliminar</Btn>
              </div>
            </div>
          </Card>
        );
      })}
      {modalVer && <ModalVisualizarCotizacion
        cotizacion={modalVer}
        onClose={() => setModalVer(null)}
        onConvertir={() => { onConvertir(modalVer); setModalVer(null); }}
        onCambiarEstado={(e) => { cambiar(modalVer.id, e); setModalVer(Object.assign({},modalVer,{estado:e})); }}
        onModificar={() => { if (onModificar) { onModificar(modalVer); setModalVer(null); } }}
        generarPDF={generarPDF}
      />}
    </div>
  );
}

// ── MODAL VISUALIZAR COTIZACION ──────────────────────────────────────
function ModalVisualizarCotizacion({cotizacion, onClose, onConvertir, onCambiarEstado, onModificar, generarPDF}) {
  if (!cotizacion) return null;
  const c = cotizacion;
  const items = parsearJSON(c.items);
  const productos = parsearJSON(c.productos);
  // Calcular total considerando cantidad de productos
  let total = 0;
  const prodIds = new Set(productos.map(function(p){return p.id;}));
  if (productos.length > 0) {
    productos.forEach(function(prod){
      const itsProd = items.filter(function(it){return it.productoId === prod.id;});
      const subProd = itsProd.reduce(function(s,it){return s+(parseFloat(it.precio)||0);},0);
      total += subProd * (parseFloat(prod.cantidad)||1);
    });
    const sueltos = items.filter(function(it){return !prodIds.has(it.productoId);});
    total += sueltos.reduce(function(s,it){return s+(parseFloat(it.precio)||0);},0);
  } else {
    total = items.reduce(function(s,i){return s + (parseFloat(i.precio)||0);},0);
  }

  // Agrupar items por producto
  let grupos = [];
  productos.forEach(function(prod){
    const itsProd = items.filter(function(i){return i.productoId === prod.id;});
    if (itsProd.length > 0) {
      const subBase = itsProd.reduce(function(s,i){return s+(parseFloat(i.precio)||0);},0);
      const cant = parseFloat(prod.cantidad)||1;
      grupos.push({producto:prod, items:itsProd, subtotal:subBase*cant, subBase:subBase, cantidad:cant});
    }
  });
  const sinAgrupar = items.filter(function(i){return !productos.find(function(p){return p.id === i.productoId;});});
  if (sinAgrupar.length > 0) grupos.push({producto:{id:"_otros",titulo:"Otros items",nota:""}, items:sinAgrupar, subtotal:sinAgrupar.reduce(function(s,i){return s+(parseFloat(i.precio)||0);},0), subBase:0, cantidad:1});

  const ECol = {Pendiente:{c:T.amber,bg:"#FFF8E0"},Aceptada:{c:T.green,bg:T.greenBg},Rechazada:{c:T.red,bg:T.redBg}};
  const stEst = ECol[c.estado] || ECol.Pendiente;

  return (
    <div onClick={onClose} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.bg,borderRadius:11,maxWidth:760,width:"100%",maxHeight:"90vh",overflowY:"auto",padding:24,boxShadow:"0 10px 40px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,paddingBottom:12,borderBottom:"2px solid "+T.amber}}>
          <div>
            <div style={{fontFamily:FONT,fontSize:22,fontWeight:700}}>Cotización C-{c.folio}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5}}>
              <Badge label={c.estado} color={stEst.c} bg={stEst.bg}/>
              <span style={{color:T.textFade,fontSize:12,fontFamily:FS}}>{fmtD(c.fecha)}</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.textFade,cursor:"pointer",fontSize:22,padding:"0 4px"}}>✕</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div style={{background:T.bgDark,borderRadius:7,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:3}}>CLIENTE</div>
            <div style={{fontFamily:FONT,fontWeight:700,fontSize:14}}>{c.cliente||"—"}</div>
            {c.tel && <div style={{fontSize:11,color:T.textSub,fontFamily:FS,marginTop:2}}>{String(c.tel)}</div>}
          </div>
          <div style={{background:T.bgDark,borderRadius:7,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:3}}>FECHA ENTREGA</div>
            <div style={{fontFamily:FONT,fontWeight:700,fontSize:14}}>{fmtD(c.fechaEntrega) || "—"}</div>
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontFamily:FS,fontSize:11,fontWeight:600,color:T.textFade,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Productos</div>
          {grupos.length === 0 && (
            <div style={{padding:"14px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:12,background:T.bgDark,borderRadius:7}}>Sin productos en esta cotización</div>
          )}
          {grupos.map(function(g, gi){
            return (
              <div key={gi} style={{marginBottom:10,background:T.bgCard,borderRadius:8,border:"1px solid "+T.border,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:6,borderBottom:"1px dashed "+T.border}}>
                  <div>
                    <div style={{fontFamily:FONT,fontWeight:700,fontSize:13}}>{g.producto.titulo || "Producto"}</div>
                    {g.producto.nota && <div style={{fontSize:11,color:T.textSub,fontFamily:FS,fontStyle:"italic"}}>{g.producto.nota}</div>}
                  </div>
                  <div style={{fontFamily:FONT,fontWeight:700,color:T.amber,fontSize:14}}>{fmt(g.subtotal)}</div>
                </div>
                {g.producto.imagen && (
                  <div style={{marginBottom:8}}>
                    <img src={g.producto.imagen} alt="" style={{maxWidth:"100%",maxHeight:180,objectFit:"contain",background:"#fff",borderRadius:5,border:"1px solid "+T.border}}/>
                  </div>
                )}
                <div style={{fontFamily:FS,fontSize:11}}>
                  {g.items.map(function(it, ii){
                    return (
                      <div key={ii} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",color:T.textSub}}>
                        <span>{it.nombre}{it.descripcion?" — "+it.descripcion:""}</span>
                        <span style={{fontWeight:600,color:T.text}}>{fmt(parseFloat(it.precio)||0)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{background:T.amber,borderRadius:8,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:FONT,fontWeight:700,color:"#fff",fontSize:14}}>TOTAL</span>
          <span style={{fontFamily:FONT,fontWeight:700,color:"#fff",fontSize:22}}>{fmt(c.total||total)}</span>
        </div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <Btn size="md" variant="ghost" onClick={() => generarPDF && generarPDF({folio:"C-"+c.folio,tipo:"cotizacion",cliente:c.cliente,clienteTel:c.tel||"",clienteCorreo:"",fecha:c.fecha,fechaEntrega:c.fechaEntrega||c.validez,items:items,productos:productos,stock:[],anticipo:0,descuento:0,iva:false})}>📄 Ver PDF</Btn>
          {(c.estado === "Pendiente" || c.estado === "Aceptada") && <Btn size="md" variant="ghost" onClick={onModificar}>✏️ Modificar</Btn>}
          <Btn size="md" variant="default" onClick={onClose}>Cerrar</Btn>
          {c.estado === "Pendiente" && <Btn size="md" variant="success" onClick={() => onCambiarEstado("Aceptada")}>Aceptar Cotización</Btn>}
          {c.estado === "Pendiente" && <Btn size="md" variant="danger" onClick={() => onCambiarEstado("Rechazada")}>Rechazar</Btn>}
          {c.estado === "Aceptada" && <Btn size="md" variant="success" onClick={onConvertir}>Convertir a Pedido</Btn>}
          {c.estado === "Rechazada" && <Btn size="md" onClick={() => onCambiarEstado("Pendiente")}>Reactivar</Btn>}
        </div>
      </div>
    </div>
  );
}

// ── MODAL DETALLE PEDIDO ──────────────────────────────────────
function ModalDetallePedido({pedido, onClose, onEditar, onEliminar, onPago, generarPDF, stock}) {
  if (!pedido) return null;
  const pn = normalizarPedido(pedido);
  const items = Array.isArray(pn.items) ? pn.items : [];
  const productos = Array.isArray(pn.productos) ? pn.productos : [];
  const tot = calcularTotal(pn);
  const saldo = calcularSaldo(pn);
  const pagado = Math.round(saldo) <= 0;

  // Agrupar items por producto manualmente (sin llamar gruposProducto para evitar crash)
  let grupos = [];
  if (productos.length === 0) {
    if (items.length > 0) {
      grupos = [{id:"default", titulo:"", nota:"", imagen:null, items:items}];
    }
  } else {
    grupos = productos.map(function(prod) {
      const its = items.filter(function(it){return it.productoId === prod.id;});
      return {id:prod.id, titulo:prod.titulo||"", nota:prod.nota||"", imagen:prod.imagen||null, items:its};
    });
  }

  return (
    <Modal title={"Pedido #"+(pn.folio||"")+" — "+(pn.cliente||"")} onClose={onClose} wide={true}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        <div>
          {[["Cliente",pn.cliente||"—"],["Teléfono",pn.tel||"—"],["Entrega",fmtD(pn.fechaEntrega)],["Estado",pn.estado||"—"],["Método pago",pn.metodoPago||"—"]].map(function(row) {
            return <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+T.border,fontSize:13,fontFamily:FS}}><span style={{color:T.textFade}}>{row[0]}</span><span style={{fontWeight:600}}>{row[1]}</span></div>;
          })}
          <div style={{marginTop:10}}>
            {grupos.map(function(grupo) {
              const subProd = grupo.items.reduce(function(s,i){return s+(parseFloat(i.precio)||0);},0);
              return (
                <div key={grupo.id} style={{marginBottom:10,paddingBottom:8,borderBottom:"1px solid "+T.border}}>
                  {grupo.titulo ? <div style={{fontFamily:FONT,fontSize:12,fontWeight:700,color:T.text,marginBottom:3}}>{grupo.titulo}</div> : null}
                  {grupo.nota ? <div style={{fontSize:10,color:T.amber,fontFamily:FS,fontStyle:"italic",marginBottom:4,padding:"3px 6px",background:"#FFF8E0",borderRadius:4}}>📝 {grupo.nota}</div> : null}
                  {grupo.imagen ? <img src={grupo.imagen} alt="" style={{width:"100%",maxHeight:160,objectFit:"contain",borderRadius:6,marginBottom:6,border:"1px solid "+T.border}}/> : null}
                  {grupo.items.map(function(it,i){
                    return <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2,fontFamily:FS,paddingLeft:8}}><span style={{color:T.textSub}}>· {it.nombre||""}{it.descripcion?" — "+it.descripcion:""}</span><span style={{color:T.textFade}}>{fmt(parseFloat(it.precio)||0)}</span></div>;
                  })}
                  {grupos.length > 1 && <div style={{textAlign:"right",fontSize:11,color:T.amber,fontFamily:FONT,fontWeight:700,marginTop:3}}>{fmt(subProd)}</div>}
                </div>
              );
            })}
            {grupos.length === 0 && <div style={{color:T.textFade,fontSize:11,fontFamily:FS,padding:"10px 0"}}>Sin productos registrados</div>}
            <div style={{borderTop:"2px solid "+T.border,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
              <span style={{fontFamily:FONT,fontWeight:700}}>Total</span>
              <span style={{color:T.amber,fontWeight:700,fontSize:18,fontFamily:FONT}}>{fmt(tot)}</span>
            </div>
          </div>
          {pagado ? (
            <div style={{background:T.greenBg,border:"1px solid "+T.green+"40",borderRadius:8,padding:"10px 14px",marginTop:10,textAlign:"center",fontWeight:700,color:T.green,fontSize:15,fontFamily:FONT}}>✓ PAGADO</div>
          ) : (
            <div style={{background:T.orangeBg,border:"1px solid "+T.orange+"40",borderRadius:8,padding:"10px 14px",marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>Anticipo: {fmt(parseFloat(pn.anticipo)||0)}</div>
                <div style={{color:T.orange,fontWeight:700,fontSize:15,fontFamily:FONT}}>Saldo: {fmt(saldo)}</div>
              </div>
              <Btn onClick={onPago}>Registrar pago</Btn>
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {pn.nota && <div style={{background:T.bgDark,borderRadius:7,padding:"8px 12px",fontSize:11,fontFamily:FS,color:T.textSub,fontStyle:"italic"}}>📝 {pn.nota}</div>}
          <Btn onClick={() => generarPDF({folio:pn.folio,tipo:"nota",cliente:pn.cliente,clienteTel:pn.tel||"",clienteCorreo:"",fecha:pn.fecha||HOY,fechaEntrega:pn.fechaEntrega,items:items,productos:productos,stock:stock||[],anticipo:parseFloat(pn.anticipo)||0,descuento:parseFloat(pn.descuento)||0,descuentoPct:parseFloat(pn.descuentoPct)||0,iva:false})} style={{width:"100%"}}>🖨️ Imprimir PDF</Btn>
          {pn.tel && <a href={"https://wa.me/52"+String(pn.tel||"").replace(/\D/g,"")+"?text="+encodeURIComponent("Nota #"+pn.folio+" — La Marqueria\nCliente: "+pn.cliente+"\nTotal: "+fmt(tot)+"\nSaldo: "+fmt(saldo)+"\nEntrega: "+fmtD(pn.fechaEntrega))} target="_blank" rel="noreferrer" style={{display:"block",background:"#25D366",color:"#fff",borderRadius:7,padding:"10px 0",textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13,fontFamily:FS}}>WhatsApp</a>}
          <Btn variant="ghost" onClick={onEditar}>Editar pedido</Btn>
          <Btn variant="danger" onClick={onEliminar}>Eliminar</Btn>
        </div>
      </div>
    </Modal>
  );
}

function ModalConvertir({cotizacion, nextFolio, onClose, onConfirmar}) {
  const productosOrig = cotizacion.productos || [];
  const itemsOrig = cotizacion.items || [];
  // Si no hay productos meta, generamos uno por cada item
  const productosIniciales = productosOrig.length > 0
    ? productosOrig.map(function(p){return Object.assign({},p);})
    : itemsOrig.map(function(it,i){return {id:it.productoId||("p"+i), titulo:it.nombre||"Producto "+(i+1), nota:""};});
  const [fechaEnt, setFE] = useState("");
  const [notaPed, setNotaPed] = useState("Desde C-"+cotizacion.folio);
  const [productos, setProds] = useState(productosIniciales);
  const [anticipo, setAnt] = useState("");
  const [metodo, setMet] = useState("Efectivo");

  function actualizarNota(id, val) {
    setProds(productos.map(function(p){return p.id===id ? Object.assign({},p,{nota:val}) : p;}));
  }
  function aplicar() {
    if (!fechaEnt) { alert("La fecha de entrega es obligatoria"); return; }
    // Re-tag items con productoId si no lo tienen
    const itemsTagged = itemsOrig.map(function(it,i){
      const pid = it.productoId || (productosIniciales[i] && productosIniciales[i].id) || ("p"+i);
      return Object.assign({},it,{productoId: pid});
    });
    onConfirmar({
      fechaEntrega: fechaEnt,
      nota: notaPed,
      productos: productos,
      items: itemsTagged,
      anticipo: parseFloat(anticipo)||0,
      metodoPago: metodo
    });
  }

  return (
    <Modal title={"Convertir C-"+cotizacion.folio+" → Nota #"+nextFolio} onClose={onClose} wide={true}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        <div>
          <div style={{background:T.bgDark,borderRadius:8,padding:"10px 13px",marginBottom:12,border:"1px solid "+T.border}}>
            <div style={{fontFamily:FONT,fontSize:12,fontWeight:700,marginBottom:6,color:T.textSub}}>Cliente: {cotizacion.cliente}</div>
            <div style={{fontFamily:FS,fontSize:11,color:T.textFade,marginBottom:8}}>Tel: {cotizacion.tel||"—"} · Total: <span style={{color:T.amber,fontWeight:700,fontSize:13,fontFamily:FONT}}>{fmt(cotizacion.total)}</span></div>
          </div>
          <Inp label="Fecha de entrega *" value={fechaEnt} onChange={e => setFE(e.target.value)} type="date"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Inp label="Anticipo ($)" value={anticipo} onChange={e => setAnt(e.target.value)} type="number"/>
            <Sel label="Metodo de pago" value={metodo} onChange={e => setMet(e.target.value)}>{METODOS.map(m => <option key={m}>{m}</option>)}</Sel>
          </div>
          <Inp label="Nota general del pedido" value={notaPed} onChange={e => setNotaPed(e.target.value)}/>
        </div>
        <div>
          <ST>Notas por producto</ST>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS,marginBottom:8,lineHeight:1.4}}>Estas notas aparecerán en Flujo de Trabajo para cada producto.</div>
          {productos.map(function(p) {
            const itemsP = itemsOrig.filter(function(it){return (it.productoId||"") === p.id;});
            return (
              <div key={p.id} style={{background:"#FFF8F0",border:"1px solid "+T.amber+"30",borderRadius:8,padding:"9px 11px",marginBottom:8}}>
                <div style={{fontFamily:FONT,fontSize:12,fontWeight:700,color:T.text,marginBottom:4}}>{p.titulo}</div>
                {itemsP.length > 0 && (
                  <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:6}}>
                    {itemsP.map(function(i){return i.nombre;}).join(" · ")}
                  </div>
                )}
                <input
                  value={p.nota||""}
                  onChange={e => actualizarNota(p.id, e.target.value)}
                  placeholder="Nota: color, detalles, instrucciones especiales..."
                  style={{width:"100%",background:T.bgCard,border:"1px solid "+T.amber+"40",borderRadius:5,padding:"5px 8px",color:T.text,fontFamily:FS,fontSize:11,outline:"none",boxSizing:"border-box"}}
                />
              </div>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={aplicar} disabled={!fechaEnt}>Crear Pedido #{nextFolio}</Btn>
      </div>
    </Modal>
  );
}

function ModalPago({pedido, nuevoPago, setNP, nuevoPagoMet, setNPM, onClose, onAplicar}) {
  const pn = normalizarPedido(pedido);
  const tot = calcularTotal(pn);
  const saldo = calcularSaldo(pn);
  return (
    <Modal title={"Registrar pago — Nota #"+pedido.folio} onClose={onClose}>
      <div style={{background:T.orangeBg,border:"1px solid "+T.orange+"30",borderRadius:8,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
        <span style={{fontFamily:FS,color:T.textSub}}>Saldo pendiente</span>
        <span style={{fontFamily:FONT,fontWeight:700,color:T.orange,fontSize:16}}>{fmt(saldo)}</span>
      </div>
      <Inp label="Monto del pago ($)" type="number" value={nuevoPago} onChange={e => setNP(e.target.value)}/>
      <Sel label="Metodo de pago" value={nuevoPagoMet} onChange={e => setNPM(e.target.value)}>{METODOS.map(m => <option key={m}>{m}</option>)}</Sel>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={onAplicar} disabled={!nuevoPago}>Aplicar pago</Btn>
      </div>
    </Modal>
  );
}

// ── VISTA HOY (enfoque diario) ─────────────────────────────────
function TarjetaHoy({p, calcularTotal, calcularSaldo, diasParaEntrega, colorDiasEntrega, textoDiasEntrega, onVer, onEditar, onCambiar, acento}) {
  const tot = calcularTotal(p);
  const pend = calcularSaldo(p);
  const dias = diasParaEntrega(p.fechaEntrega);
  const colorDia = colorDiasEntrega(dias);
  const textoDia = textoDiasEntrega(dias);
  const grupos = gruposProducto(p).slice(0,2);
  return (
    <div style={{background:T.bgCard,border:"1px solid "+T.border,borderLeft:"4px solid "+acento,borderRadius:9,padding:"11px 13px",marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,fontFamily:FONT}}>{p.cliente}</div>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS,marginBottom:5}}>#{p.folio}</div>
          {grupos.map(function(g){
            return (
              <div key={g.id} style={{fontSize:11,fontFamily:FS,color:T.textSub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                • {g.titulo}{g.nota ? <span style={{color:T.amber,fontStyle:"italic"}}> — {g.nota}</span> : null}
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"right",whiteSpace:"nowrap"}}>
          <div style={{color:T.amber,fontWeight:700,fontSize:15,fontFamily:FONT}}>{fmt(tot)}</div>
          {Math.round(pend)>0 ? <div style={{color:T.orange,fontSize:11,fontFamily:FS}}>Saldo: {fmt(pend)}</div> : <div style={{color:T.green,fontSize:11,fontFamily:FS,fontWeight:600}}>PAGADO</div>}
          {p.fechaEntrega && dias!==null && (
            <div style={{display:"inline-block",background:colorDia,color:"#fff",borderRadius:5,padding:"2px 8px",fontSize:10,fontFamily:FS,fontWeight:700,marginTop:4}}>{textoDia}</div>
          )}
        </div>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:9}}>
        {p.estado === "Pendiente" && <button onClick={() => onCambiar(p.id,"Produccion")} style={{background:"#F0F4FF",color:"#1565C0",border:"1px solid #90B0E0",borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer",fontFamily:FS,fontWeight:600}}>→ A taller</button>}
        {p.estado === "Produccion" && <button onClick={() => onCambiar(p.id,"Listo")} style={{background:"#E8F5E9",color:"#2E7D32",border:"1px solid #A5D6A7",borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer",fontFamily:FS,fontWeight:600}}>→ Listo</button>}
        {p.estado === "Listo" && <button onClick={() => onCambiar(p.id,"Entregado")} style={{background:T.green,color:"#fff",border:"none",borderRadius:5,padding:"4px 11px",fontSize:11,cursor:"pointer",fontFamily:FS,fontWeight:700}}>✓ Entregado</button>}
        <button onClick={() => onVer(p)} style={{background:T.greenBg,color:T.green,border:"1px solid "+T.green+"30",borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer",fontFamily:FS}}>Ver</button>
        <button onClick={() => onEditar(p)} style={{background:T.bgDark,color:T.textSub,border:"1px solid "+T.border,borderRadius:5,padding:"4px 9px",fontSize:11,cursor:"pointer",fontFamily:FS}}>Editar</button>
      </div>
    </div>
  );
}

    {key:"list", titulo:"Listos para entregar", sub:"Terminados, esperando al cliente", color:"#2E7D32", bg:"#E8F5E9", items:listos, acento:"#2E7D32", vacio:"Nada terminado por entregar"}
