const ErrorBoundary = (function(){
  function EB(props) {
    React.Component.call(this, props);
    this.state = {hasError:false, error:null, info:null};
  }
  EB.prototype = Object.create(React.Component.prototype);
  EB.prototype.constructor = EB;
  EB.getDerivedStateFromError = function(error) { return {hasError:true, error:error}; };
  EB.prototype.componentDidCatch = function(error, info) {
    this.setState({info:info});
    console.error("ErrorBoundary caught:", error);
    console.error("Component stack:", info && info.componentStack);
  };
  EB.prototype.render = function() {
    if (this.state.hasError) {
      const err = this.state.error || {};
      const msg = err.message || String(err);
      const stack = err.stack || "";
      const compStack = (this.state.info && this.state.info.componentStack) || "";
      const self = this;
      return React.createElement("div", {style:{padding:"24px",margin:"20px",background:"#FFEBEE",border:"2px solid #C62828",borderRadius:9,fontFamily:"Inter,system-ui,sans-serif"}},
        React.createElement("div", {style:{fontWeight:700,fontSize:16,color:"#C62828",marginBottom:8}}, "⚠ Error en la sección"),
        React.createElement("div", {style:{fontSize:12,color:"#444",marginBottom:6,fontWeight:600}}, "Mensaje:"),
        React.createElement("pre", {style:{background:"#fff",padding:"8px 10px",borderRadius:5,fontSize:11,color:"#C62828",overflowX:"auto",border:"1px solid #ddd",whiteSpace:"pre-wrap",marginBottom:10}}, msg),
        stack && React.createElement("details", {style:{marginBottom:10}},
          React.createElement("summary", {style:{cursor:"pointer",fontSize:11,color:"#666",fontWeight:600}}, "Stack JS"),
          React.createElement("pre", {style:{background:"#fff",padding:"8px 10px",borderRadius:5,fontSize:10,color:"#555",overflowX:"auto",border:"1px solid #ddd",whiteSpace:"pre-wrap",marginTop:5}}, stack)
        ),
        compStack && React.createElement("details", null,
          React.createElement("summary", {style:{cursor:"pointer",fontSize:11,color:"#666",fontWeight:600}}, "Stack componente"),
          React.createElement("pre", {style:{background:"#fff",padding:"8px 10px",borderRadius:5,fontSize:10,color:"#555",overflowX:"auto",border:"1px solid #ddd",whiteSpace:"pre-wrap",marginTop:5}}, compStack)
        ),
        React.createElement("button", {onClick:function(){self.setState({hasError:false,error:null,info:null});}, style:{marginTop:14,background:"#1A1A1A",color:"#fff",border:"none",padding:"7px 16px",borderRadius:6,cursor:"pointer",fontSize:12}}, "Reintentar")
      );
    }
    return this.props.children;
  };
  return EB;
})();

function App() {
  const [tab, setTabRaw] = useState("home");
  const [cotizadorDirty, setCotizadorDirty] = useState(false);
  function setTab(newTab) {
    if (tab === newTab) return;
    if (cotizadorDirty && tab === "cotizador") {
      if (!confirmar("Tienes información sin guardar en Nuevo Pedido. ¿Salir y descartar los datos?")) return;
      setCotizadorDirty(false);
    }
    setTabRaw(newTab);
  }
  const [insumos, setInsumos] = useState(INSUMOS0);
  const [molduras, setMolduras] = useState(MOLDURAS0);
  const [temas, setTemas] = useState([]);
  const [stock, setStock] = useState(STOCK0);
  const [pedidos, setPedidosRaw] = useState([]);
  function necesitaNormalizar(arr) {
    if (!Array.isArray(arr)) return false;
    return arr.some(function(p){
      return p && (typeof p.items === "string" || typeof p.productos === "string" || typeof p.tareas === "string");
    });
  }
  function setPedidos(v) {
    if (typeof v === "function") {
      setPedidosRaw(function(prev){
        const result = v(prev);
        if (Array.isArray(result) && necesitaNormalizar(result)) return result.map(normalizarPedido);
        return result;
      });
    } else {
      if (Array.isArray(v) && necesitaNormalizar(v)) setPedidosRaw(v.map(normalizarPedido));
      else setPedidosRaw(v);
    }
  }
  const [ventasPOS, setVentasPOSRaw] = useState([]);
  function necesitaNormVenta(arr) {
    if (!Array.isArray(arr)) return false;
    return arr.some(function(v){return v && typeof v.items === "string";});
  }
  function setVentasPOS(v) {
    function norm(arr) { return Array.isArray(arr) ? arr.map(function(x){return Object.assign({},x,{items:parsearJSON(x.items)});}) : arr; }
    if (typeof v === "function") {
      setVentasPOSRaw(function(prev){
        const r = v(prev);
        return necesitaNormVenta(r) ? norm(r) : r;
      });
    } else {
      setVentasPOSRaw(necesitaNormVenta(v) ? norm(v) : v);
    }
  }
  const [cotizaciones, setCotizacionesRaw] = useState([]);
  function necesitaNormCot(arr) {
    if (!Array.isArray(arr)) return false;
    return arr.some(function(c){return c && (typeof c.items === "string" || typeof c.productos === "string");});
  }
  function setCotizaciones(v) {
    function norm(arr) { return Array.isArray(arr) ? arr.map(function(x){return Object.assign({},x,{items:parsearJSON(x.items),productos:parsearJSON(x.productos)});}) : arr; }
    if (typeof v === "function") {
      setCotizacionesRaw(function(prev){
        const r = v(prev);
        return necesitaNormCot(r) ? norm(r) : r;
      });
    } else {
      setCotizacionesRaw(necesitaNormCot(v) ? norm(v) : v);
    }
  }
  const [costos, setCostos] = useState(COSTOS0);
  const [gastos, setGastos] = useState(GASTOS0);
  const [nextFolioBase, setNextFolioBase] = useState(1590);
  const [nextFolioQ, setNextFolioQ] = useState(1);
  // nextFolio siempre = max(pedidos.folio, ventas.folio) + 1, garantiza único globalmente
  const nextFolio = (function(){
    const folios = pedidos.map(function(p){return parseInt(p.folio)||0;})
      .concat(ventasPOS.map(function(v){return parseInt(v.folio)||0;}))
      .filter(function(f){return f>0;});
    if (!folios.length) return nextFolioBase;
    return Math.max.apply(null, folios) + 1;
  })();
  function setNextFolio(v) {
    if (typeof v === "function") setNextFolioBase(v); else setNextFolioBase(v);
  }
  const [cargando, setCargando] = useState(true);
  const [guardando, setGuardando] = useState(false);
  const [guardadoAt, setGuardadoAt] = useState(null);
  const [fechaAjuste, setFechaAjuste] = useState(null); // offset manual si el usuario ajusta
  const [horaAjuste, setHoraAjuste] = useState(null);
  const [cotizacionAEditar, setCotizacionAEditar] = useState(null);
  const [pedidoAEditar, setPedidoAEditar] = useState(null);
  const saveTimer = React.useRef(null);
  const primeraVez = React.useRef(true);
  const recargandoRemoto = React.useRef(false);
  const wsRef = React.useRef(null);
  const pedidosCargadosCount = React.useRef(0);

  // Asigna IDs únicos a registros que no lo tengan (NO elimina duplicados:
  // dos gastos pueden tener mismos datos y ser legítimamente distintos)
  function asegurarIds(arr, prefijo) {
    return arr.map(function(r, i) {
      const id = (r.id !== undefined && r.id !== null && r.id !== "") ? r.id : (prefijo + "_" + Date.now() + "_" + i);
      return Object.assign({}, r, {id: id});
    });
  }

  function cargarDatos(esRemoto) {
    return fetch(API_URL + "?accion=leer_todo")
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        // El nuevo script devuelve {ok:true, data:{...}}
        const data = resp && resp.ok && resp.data ? resp.data : {};
        if (esRemoto) recargandoRemoto.current = true;
        if (data.pedidos && data.pedidos.length > 0) {
          // Combinar pedidos de Sheets con históricos, evitando duplicados por folio
          const pedidosSheets = data.pedidos.map(normalizarPedido);
          const foliosExistentes = pedidosSheets.map(function(p){return String(p.folio);});
          const histFiltrados = (typeof PEDIDOS_HIST !== "undefined" ? PEDIDOS_HIST : []).filter(function(h){
            return foliosExistentes.indexOf(String(h.folio)) < 0;
          }).map(normalizarPedido);
          const todos = pedidosSheets.concat(histFiltrados);
          setPedidos(todos);
          pedidosCargadosCount.current = todos.length;
          const fs = todos.map(function(p) { return parseInt(p.folio) || 0; });
          setNextFolioBase(Math.max.apply(null, fs) + 1);
        } else if (!esRemoto && typeof PEDIDOS_HIST !== "undefined" && PEDIDOS_HIST.length > 0) {
          // Sheets vacío → cargar históricos del HTML (solo en carga inicial)
          const pedHist = PEDIDOS_HIST.map(normalizarPedido);
          setPedidos(pedHist);
          const fs = pedHist.map(function(p) { return parseInt(p.folio) || 0; });
          setNextFolioBase(Math.max.apply(null, fs) + 1);
        }
        if (data.cotizaciones && data.cotizaciones.length > 0) {
          setCotizaciones(data.cotizaciones.map(function(c){ return Object.assign({},c,{items:parsearJSON(c.items),productos:parsearJSON(c.productos)}); }));
          const fqs = data.cotizaciones.map(function(c) { return parseInt(c.folio) || 0; });
          setNextFolioQ(Math.max.apply(null, fqs) + 1);
        }
        if (data.ventas_pos && data.ventas_pos.length > 0) setVentasPOS(data.ventas_pos.map(function(v){ return Object.assign({},v,{items:parsearJSON(v.items)}); }));
        if (data.costos && data.costos.length > 0) setCostos(asegurarIds(data.costos, 'c'));
        if (data.gastos && data.gastos.length > 0) setGastos(asegurarIds(data.gastos, 'g'));
        if (data.stock && data.stock.length > 0) setStock(data.stock);
        if (data.insumos && data.insumos.length > 0) setInsumos(data.insumos);
        // Solo sobreescribir molduras si Sheets tiene MAS o IGUAL que las locales (preserva carga inicial del HTML)
        if (data.molduras && data.molduras.length >= MOLDURAS0.length && data.molduras.length > 0) {
          setMolduras(data.molduras);
        }
        if (data.temas && data.temas.length > 0) setTemas(data.temas);
        setCargando(false);
      })
      .catch(function() { setCargando(false); });
  }

  React.useEffect(function() {
    cargarDatos(false);
  }, []);

  // ─── WebSocket: recarga automática cuando otra PC guarda cambios ───
  React.useEffect(function() {
    if (BACKEND !== 'postgres' || !WS_URL) return;
    let reconectarTimer = null;

    function conectar() {
      try {
        const ws = new WebSocket(WS_URL);
        wsRef.current = ws;

        ws.onopen = function() { console.log('🔌 WebSocket conectado'); };

        ws.onmessage = function(ev) {
          try {
            const msg = JSON.parse(ev.data);
            // Si el cambio lo hice YO mismo, ignorar
            if (msg.tipo === 'cambios' && msg.origen !== CLIENTE_ID) {
              console.log('📡 Cambios detectados en otra PC, recargando...');
              cargarDatos(true);
            }
          } catch(_){}
        };

        ws.onclose = function() {
          console.warn('🔌 WebSocket desconectado, reintentando en 5s...');
          reconectarTimer = setTimeout(conectar, 5000);
        };

        ws.onerror = function() { ws.close(); };
      } catch(e) {
        reconectarTimer = setTimeout(conectar, 5000);
      }
    }

    conectar();

    return function() {
      if (reconectarTimer) clearTimeout(reconectarTimer);
      if (wsRef.current) { wsRef.current.onclose = null; wsRef.current.close(); }
    };
  }, []);

  React.useEffect(function() {
    if (cargando) return;
    if (primeraVez.current) { primeraVez.current = false; return; }
    if (recargandoRemoto.current) { recargandoRemoto.current = false; return; }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function() {
      // PROTECCION ANTI-BORRADO 1: si todo esta vacio probablemente hubo
      // un error de carga - no sobrescribir con vacio.
      if (pedidos.length === 0 && ventasPOS.length === 0 && cotizaciones.length === 0 && stock.length === 0) {
        console.warn("Estado vacio detectado - omitiendo guardado para proteger datos");
        setGuardadoAt("⚠️ Guardado omitido (estado vacio)");
        return;
      }
      // PROTECCION ANTI-BORRADO 2: si los pedidos bajaron drasticamente respecto
      // a lo que se cargo (>30% de perdida), probablemente fue un error de carga.
      if (pedidosCargadosCount.current > 50 && pedidos.length < pedidosCargadosCount.current * 0.7) {
        console.warn("Perdida masiva de pedidos detectada (" + pedidos.length + " de " + pedidosCargadosCount.current + ") - omitiendo guardado");
        setGuardadoAt("⚠️ Guardado omitido (posible error de carga)");
        return;
      }
      setGuardando(true);
      const pedidosLimpios = pedidos.map(function(p) {
        const tot = calcularTotal(p);
        const saldo = calcularSaldo(p);
        return Object.assign({}, p, {imagen: null, total: tot, saldo: saldo});
      });
      const payload = JSON.stringify({
        accion: "guardar_todo",
        clienteId: CLIENTE_ID,
        pedidos: pedidosLimpios,
        cotizaciones: cotizaciones,
        ventas_pos: ventasPOS,
        costos: costos,
        gastos: gastos,
        stock: stock,
        insumos: insumos,
        molduras: molduras,
        temas: temas
      });
      console.log('💾 GUARDANDO:', 'pedidos:', pedidosLimpios.length, '| ventas_pos:', ventasPOS.length, '| costos:', costos.length, '| gastos:', gastos.length, '| stock:', stock.length);
      fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: payload
      }).then(function(r) { return r.json(); })
      .then(function(data) {
        setGuardando(false);
        if (data && data.ok) {
          setGuardadoAt(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}));
        } else {
          setGuardadoAt("\u26a0\ufe0f " + (data && data.error ? data.error.substring(0,40) : "Error al guardar"));
        }
      }).catch(function(err) {
        setGuardando(false);
        setGuardadoAt("\u26a0\ufe0f " + (err && err.message ? err.message.substring(0,40) : "Error de red"));
      });
    }, 3000);
  }, [pedidos, cotizaciones, ventasPOS, costos, gastos, stock, insumos, molduras, temas]);

  function agregarPedido(p) { setPedidos(function(ps) { return ps.concat([Object.assign({},p,{id:uid(),fecha:HOY})]); }); }
  function actualizarPedido(original, nuevo) {
    setPedidos(function(ps) {
      return ps.map(function(p) {
        if (String(p.id) !== String(original.id)) return p;
        const totalNuevo = calcularTotal(nuevo);
        const antNuevo = parseFloat(nuevo.anticipo) || 0;
        const antOriginal = parseFloat(original.anticipo) || 0;
        const diferencia = antNuevo - antOriginal;
        const merged = Object.assign({}, p, nuevo, {
          id: p.id,
          folio: p.folio,
          estado: p.estado,
          fecha: p.fecha,
          descuento: 0 // a partir de esta edición, el descuento vive solo en descuentoPct
        });
        if (diferencia > 0) {
          const saldoNuevo = Math.max(0, totalNuevo - antNuevo);
          merged.ultimoPago = {
            fecha: HOY_ACTUAL(),
            monto: diferencia,
            tipo: saldoNuevo === 0 ? "saldo" : "anticipo",
            metodo: nuevo.metodoPago || "Efectivo",
            hora: HORA_ACTUAL()
          };
          if (saldoNuevo === 0 && totalNuevo > 0) merged.fechaSaldo = HOY;
          else if (saldoNuevo > 0) merged.fechaAnticipo = HOY;
        }
        return merged;
      });
    });
  }
  function agregarCot(c) { setCotizaciones(function(cs) { return cs.concat([Object.assign({},c,{id:uid()})]); }); }
  function agregarVentaPOS(v) { setVentasPOS(function(vs) { return vs.concat([Object.assign({},v,{id:uid()})]); }); }
  const [cotConvertir, setCotConvertir] = useState(null);
  function convertirCot(c) { setCotConvertir(c); }
  function aplicarConversion(datos) {
    const c = cotConvertir;
    const nuevo = {
      id:uid(), folio:nextFolio,
      cliente:c.cliente, tel:c.tel,
      fechaEntrega:datos.fechaEntrega,
      items:datos.items, productos:datos.productos,
      anticipo:datos.anticipo, metodoPago:datos.metodoPago,
      estado:"Pendiente", nota:datos.nota,
      imagen:null, fecha:HOY
    };
    setPedidos(function(ps) { return ps.concat([nuevo]); });
    setNextFolio(function(f) { return f+1; });
    setCotizaciones(function(cs) { return cs.map(function(x) { return x.id===c.id ? Object.assign({},x,{estado:"Aceptada"}) : x; }); });
    setCotConvertir(null);
    setTab("pedidos");
  }

  const urgentesCount = pedidos.filter(function(p) { const d=dRest(p.fechaEntrega); return d!==null&&d<=2&&!["Entregado","Bodega"].includes(p.estado); }).length;
  const cotPendCount = cotizaciones.filter(function(c) { return c.estado==="Pendiente"; }).length;
  const bajoStockCount = stock.filter(function(p) { return p.stock<=p.stockMin; }).length;
  const flujoCount = pedidos.filter(function(p) { return p.estado==="Produccion"; }).length;
  const cxcCount = pedidos.filter(function(p) { return p.estado!=="Bodega" && Math.round(saldoPedido(p)) > 0; }).length;

  if (cargando) return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <div style={{border:"2px solid #1A1A1A",padding:"8px 28px"}}>
        <div style={{fontFamily:SERIF,fontSize:22,letterSpacing:5,fontWeight:700}}>LA MARQUERIA</div>
      </div>
      <div style={{fontFamily:FS,color:T.textSub,fontSize:14}}>⏳ Cargando datos desde Google Sheets...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:FS,color:T.text}}>
      <div style={{background:T.header,padding:"13px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{border:"2px solid rgba(255,255,255,0.6)",padding:"4px 16px"}}>
          <div onClick={() => setTab("home")} style={{color:"#fff",fontWeight:700,fontSize:20,letterSpacing:5,fontFamily:SERIF,cursor:"pointer"}} title="Ir a inicio">LA MARQUERIA</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontFamily:FS,marginBottom:6}}>
            <span style={{fontWeight:700,fontSize:13,color:"#fff"}}>📅 {fmtD(fechaAjuste || HOY_ACTUAL())} · 🕐 {horaAjuste || HORA_ACTUAL()}</span>
            {guardando && <span style={{marginLeft:8,color:"#FFF8E0",animation:"blink 1s infinite"}}> ⏳ Guardando costos/gastos/pedidos...</span>}
            {!guardando && guardadoAt === "⚠️ Sin respuesta" && <span style={{marginLeft:8,color:"#FF9999"}}> ⚠️ No hay respuesta de Sheets</span>}
            {!guardando && guardadoAt === "⚠️ Error de red" && <span style={{marginLeft:8,color:"#FF6666"}}> ⚠️ Error de conexión</span>}
            {!guardando && guardadoAt && guardadoAt !== "⚠️ Sin respuesta" && guardadoAt !== "⚠️ Error de red" && <span style={{marginLeft:8,color:"#A8E6A3"}}> ✓ Guardado {guardadoAt}</span>}
            {!guardando && !guardadoAt && <span style={{marginLeft:8,color:"rgba(255,255,255,0.4)"}}> · Listo</span>}
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",cursor:"pointer"}} onClick={() => {
            const f = prompt("Corregir fecha (YYYY-MM-DD):", fechaAjuste || HOY_ACTUAL());
            if (f) { setFechaAjuste(f); FECHA_OVERRIDE = f; }
          }}>
            Folio #{nextFolio} · <u>Ajustar fecha si es necesario</u>
          </div>
          <div style={{color:"rgba(255,255,255,0.45)",fontSize:10,fontFamily:FS,marginTop:4}}>Jose Ma. Morelos 745 Nte. · Culiacan · <u title="Requiere estar en la cuenta de Google que controla la base de datos">Acct: Google conectada</u></div>
        </div>
      </div>
      {tab !== "home" && (
        <div style={{display:"flex",overflowX:"auto",borderBottom:"2px solid "+T.border,background:T.bgCard,padding:"0 12px"}}>
          {TABS.map(function(t) {
            return (
              <button key={t.id} onClick={() => setTab(t.id)} style={{background:"none",border:"none",borderBottom:tab===t.id?"2px solid "+T.header:"2px solid transparent",color:tab===t.id?T.text:"#9E9E9E",padding:"11px 12px",cursor:"pointer",fontFamily:FS,fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",position:"relative",marginBottom:"-2px"}}>
                {t.label}
                {t.id==="pedidos"&&urgentesCount>0&&<span style={{background:T.red,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 5px",marginLeft:4,fontWeight:700}}>{urgentesCount}</span>}
                {t.id==="flujo"&&flujoCount>0&&<span style={{background:T.blue,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 5px",marginLeft:4,fontWeight:700}}>{flujoCount}</span>}
                {t.id==="cxc"&&cxcCount>0&&<span style={{background:T.orange,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 5px",marginLeft:4,fontWeight:700}}>{cxcCount}</span>}
                {t.id==="cotizaciones"&&cotPendCount>0&&<span style={{background:T.amber,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 5px",marginLeft:4,fontWeight:700}}>{cotPendCount}</span>}
                {t.id==="inventario"&&bajoStockCount>0&&<span style={{background:T.orange,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 5px",marginLeft:4,fontWeight:700}}>{bajoStockCount}</span>}
              </button>
            );
          })}
        </div>
      )}
      <div style={{padding:"20px 18px",maxWidth:1280,margin:"0 auto"}}>
        {tab !== "home" && (
          <button onClick={() => setTab("home")} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"7px 14px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:600,color:T.textSub,marginBottom:14,display:"inline-flex",alignItems:"center",gap:6}}>← Regresar a módulos</button>
        )}
        {tab==="home" && (
          <div>
            <div style={{textAlign:"center",marginBottom:24,marginTop:8}}>
              <div style={{fontFamily:FONT,fontSize:24,fontWeight:700,color:T.text,marginBottom:4}}>Bienvenido a La Marquería</div>
              <div style={{fontFamily:FS,fontSize:13,color:T.textFade}}>Selecciona un módulo para comenzar</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
              {TABS.map(function(t) {
                let badge = 0;
                if (t.id==="pedidos") badge = urgentesCount;
                else if (t.id==="flujo") badge = flujoCount;
                else if (t.id==="cxc") badge = cxcCount;
                else if (t.id==="cotizaciones") badge = cotPendCount;
                else if (t.id==="inventario") badge = bajoStockCount;
                return (
                  <div key={t.id} onClick={() => setTab(t.id)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:12,padding:"22px 18px",cursor:"pointer",position:"relative",transition:"all .15s",borderLeft:"4px solid "+t.color}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.08)";}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
                    {badge > 0 && (
                      <span style={{position:"absolute",top:10,right:10,background:t.color,color:"#fff",borderRadius:10,fontSize:10,padding:"2px 8px",fontWeight:700,fontFamily:FS}}>{badge}</span>
                    )}
                    <div style={{fontSize:32,marginBottom:8,lineHeight:1}}>{t.icon}</div>
                    <div style={{fontFamily:FONT,fontWeight:700,fontSize:15,color:T.text,marginBottom:3}}>{t.label}</div>
                    <div style={{fontFamily:FS,fontSize:11,color:T.textFade,lineHeight:1.4}}>{t.desc}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {tab==="dashboard" && <ErrorBoundary><TabDashboard pedidos={pedidos} cotizaciones={cotizaciones} costos={costos} gastos={gastos} stock={stock} ventasPOS={ventasPOS}/></ErrorBoundary>}
        {tab==="cotizador" && <ErrorBoundary><TabCotizador insumos={insumos} molduras={molduras} nextFolio={nextFolio} setNextFolio={setNextFolio} nextFolioQ={nextFolioQ} setNextFolioQ={setNextFolioQ} onPedidoCreado={agregarPedido} onCotizacionCreada={agregarCot} setCotizadorDirty={setCotizadorDirty} stock={stock} cotizacionAEditar={cotizacionAEditar} onLimpiarEdicion={() => setCotizacionAEditar(null)} setCotizaciones={setCotizaciones} pedidoAEditar={pedidoAEditar} onLimpiarEdicionPedido={() => setPedidoAEditar(null)} onPedidoActualizado={actualizarPedido} onVolverAPedidos={() => { setPedidoAEditar(null); setTabRaw("pedidos"); }}/></ErrorBoundary>}
        {tab==="cotizaciones" && <ErrorBoundary><TabCotizaciones cotizaciones={cotizaciones} setCotizaciones={setCotizaciones} onConvertir={convertirCot} nextFolio={nextFolio} onModificar={(c) => { setCotizacionAEditar(c); setTab("cotizador"); }}/></ErrorBoundary>}
        {tab==="pedidos" && <ErrorBoundary><TabPedidos pedidos={pedidos} setPedidos={setPedidos} nextFolio={nextFolio} setNextFolio={setNextFolio} stock={stock} onNuevoPedido={() => setTab("cotizador")} onEditarPedido={(p) => { setPedidoAEditar(normalizarPedido(p)); setTab("cotizador"); }}/></ErrorBoundary>}
        {tab==="flujo" && <ErrorBoundary><TabFlujo pedidos={pedidos} setPedidos={setPedidos} molduras={molduras} insumos={insumos} stock={stock}/></ErrorBoundary>}
        {tab==="cxc" && <ErrorBoundary><TabCXC pedidos={pedidos} setPedidos={setPedidos}/></ErrorBoundary>}
        {tab==="pos" && <ErrorBoundary><TabPOS stock={stock} setStock={setStock} nextFolio={nextFolio} setNextFolio={setNextFolio} onVentaCreada={agregarVentaPOS}/></ErrorBoundary>}
        {tab==="notaspos" && <ErrorBoundary><TabNotasPOS ventasPOS={ventasPOS}/></ErrorBoundary>}
        {tab==="corte" && <ErrorBoundary><TabCorte pedidos={pedidos} ventasPOS={ventasPOS} stock={stock}/></ErrorBoundary>}
        {tab==="inventario" && <ErrorBoundary><TabInventario stock={stock} setStock={setStock}/></ErrorBoundary>}
        {tab==="costos" && <ErrorBoundary><TabRegistros tipo="costo" registros={costos} setRegistros={setCostos} categorias={CAT_COSTOS} proveedores={PROVEEDORES}/></ErrorBoundary>}
        {tab==="gastos" && <ErrorBoundary><TabRegistros tipo="gasto" registros={gastos} setRegistros={setGastos} categorias={CAT_GASTOS}/></ErrorBoundary>}
        {tab==="bases" && <ErrorBoundary><TabBases insumos={insumos} setInsumos={setInsumos} molduras={molduras} setMolduras={setMolduras} stock={stock} setStock={setStock} temas={temas} setTemas={setTemas}/></ErrorBoundary>}
      </div>
      {cotConvertir && <ModalConvertir cotizacion={cotConvertir} nextFolio={nextFolio} onClose={() => setCotConvertir(null)} onConfirmar={aplicarConversion}/>}
    </div>
  );
}

function LoginScreen({onLogin}) {
  const [pw, setPw] = useState("");
  const PASS = "marqueria2024";
  function intentar() {
    if (pw === PASS) { onLogin(); }
    else { alert("Contraseña incorrecta"); setPw(""); }
  }
  return (
    <div style={{minHeight:"100vh",background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FS}}>
      <div style={{background:"#fff",borderRadius:12,padding:"40px 35px",maxWidth:340,width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontFamily:SERIF,fontSize:24,fontWeight:700,textAlign:"center",marginBottom:4,letterSpacing:3}}>LA MARQUERIA</div>
        <div style={{fontSize:11,color:"#888",textAlign:"center",marginBottom:28}}>Sistema de Gestión</div>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"#333",marginBottom:6}}>Contraseña</label>
        <input
          type="password"
          value={pw}
          onChange={function(e){setPw(e.target.value);}}
          onKeyPress={function(e){if(e.key==="Enter") intentar();}}
          placeholder="••••••••••••"
          autoFocus
          style={{width:"100%",padding:"10px 12px",borderRadius:6,border:"1px solid #ddd",fontFamily:FS,fontSize:13,boxSizing:"border-box",outline:"none",marginBottom:14}}
        />
        <button onClick={intentar} style={{width:"100%",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:6,padding:"11px 0",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:FS}}>Ingresar →</button>
      </div>
    </div>
  );
}

function AppWrapper() {
  const [logged, setLogged] = useState(false);
  if (!logged) return <LoginScreen onLogin={function(){setLogged(true);}}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWrapper));
</script>
</body>
</html>
