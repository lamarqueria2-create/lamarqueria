// ── PEDIDOS ───────────────────────────────────────────────────
function TabPedidos({pedidos, setPedidos, nextFolio, setNextFolio, stock, onNuevoPedido, onEditarPedido}) {
  const [modalForm, setMF] = useState(false);
  const [modalDoc, setMD] = useState(null);
  const [modalPago, setMP] = useState(null);
  const [nuevoPago, setNP] = useState("");
  const [nuevoPagoMet, setNPM] = useState("Efectivo");
  const [editId, setEid] = useState(null);
  const [form, setForm] = useState({});
  const [vista, setVista] = useState("hoy");
  const [busq, setBusq] = useState("");
  const [nid, setNid] = useState(200);
  const [stockBuscar, setStockBuscar] = useState("");
  const [stockFocus, setStockFocus] = useState(false);
  const urgentes = pedidos.filter(p => { const d=dRest(p.fechaEntrega); return d!==null&&d<=2&&!["Entregado","Bodega"].includes(p.estado); });

  const busqL = busq.toLowerCase();
  const pedidosBusq = busq ? pedidos.filter(function(p) {
    return (p.cliente||"").toLowerCase().includes(busqL) ||
           String(p.tel||"").includes(busq) ||
           String(p.folio).includes(busq);
  }) : pedidos;
  // Ordenar por folio descendente (más nuevos arriba)
  const pedidosFil = pedidosBusq.slice().sort(function(a,b){
    const fa = parseInt(String(a.folio).replace(/\D/g,""))||0;
    const fb = parseInt(String(b.folio).replace(/\D/g,""))||0;
    return fb - fa;
  });

  function openForm(p) {
    if (p) {
      const itemsRehidratados = (p.items||[]).map(function(i){return Object.assign({},i,{precio:String(i.precio),productoId:i.productoId||uid(),notaProd:i.notaProd||""});});
      // Si no hay productos meta, generamos uno por cada productoId único
      let productos = p.productos || [];
      if (!productos.length) {
        const idsVistos = [];
        productos = [];
        itemsRehidratados.forEach(function(it){
          if (idsVistos.indexOf(it.productoId)<0) {
            idsVistos.push(it.productoId);
            productos.push({id:it.productoId, titulo:it.nombre||"Producto", nota:"", imagen:null});
          }
        });
      }
      setForm(Object.assign({},p,{anticipo:String(p.anticipo||0),items:itemsRehidratados,productos:productos}));
      setEid(p.id);
    } else {
      setForm({folio:nextFolio,cliente:"",tel:"",fechaEntrega:"",items:[],productos:[],anticipo:"",metodoPago:"Efectivo",estado:"Pendiente",nota:"",imagen:null});
      setEid(null);
    }
    setMF(true);
  }
  function editarPedido(p) {
    if (onEditarPedido) { onEditarPedido(p); }
    else { openForm(p); }
  }
  function save() {
    if (!form.cliente) { alert("El cliente es obligatorio"); return; }
    if (!form.fechaEntrega) { alert("La fecha de entrega es obligatoria"); return; }
    const items = (form.items||[]).map(function(i){
      return {nombre:i.nombre, descripcion:i.descripcion, precio:parseFloat(i.precio)||0, productoId:i.productoId||uid(), tipo:i.tipo, refId:i.refId};
    });
    const productosMeta = (form.productos||[]).map(function(p){
      const px = Object.assign({},p);
      delete px.subiendo;
      return px;
    });
    // Validación de folio único (solo para pedidos NUEVOS)
    let folioFinal = parseInt(form.folio)||nextFolio;
    if (!editId) {
      const existente = pedidos.find(function(p){return parseInt(p.folio) === folioFinal;});
      if (existente) {
        const opciones = "El folio #"+folioFinal+" ya existe (cliente: "+existente.cliente+").\n\n" +
                         "Aceptar = Eliminar el pedido anterior y usar el folio #"+folioFinal+"\n" +
                         "Cancelar = Asignar el siguiente folio disponible automáticamente";
        if (confirmar(opciones)) {
          const pedidosSinDup = pedidos.filter(function(p){return parseInt(p.folio) !== folioFinal;});
          const item = Object.assign({},form,{folio:folioFinal,anticipo:parseFloat(form.anticipo)||0,items:items,productos:productosMeta});
          setPedidos(pedidosSinDup.concat([Object.assign({},item,{id:"p"+uid(),fecha:item.fecha||HOY_ACTUAL()})]));
          setNid(n => n+1);
          setMF(false);
          return;
        } else {
          const usados = pedidos.map(function(p){return parseInt(p.folio)||0;});
          let nuevo = folioFinal + 1;
          while (usados.indexOf(nuevo) >= 0) nuevo++;
          folioFinal = nuevo;
          alert("Se asignará el folio #"+folioFinal);
        }
      }
    }
    const item = Object.assign({},form,{folio:folioFinal,anticipo:parseFloat(form.anticipo)||0,items:items,productos:productosMeta});
    // Detectar movimiento de dinero al editar (no aplica para creación)
    const totItem = calcularTotal(item);
    const antItem = parseFloat(form.anticipo)||0;
    const saldoItem = Math.max(0, totItem - antItem);
    const pedidoOriginal = editId ? pedidos.find(function(p){return String(p.id) === String(editId);}) : null;
    const antOriginal = pedidoOriginal ? (parseFloat(pedidoOriginal.anticipo)||0) : 0;
    const diferencia = antItem - antOriginal;
    if (diferencia > 0) {
      // Hubo un pago adicional al editar
      item.ultimoPago = {
        fecha: HOY_ACTUAL(),
        monto: diferencia,
        tipo: saldoItem === 0 ? "saldo" : "anticipo",
        metodo: form.metodoPago || "Efectivo",
        hora: HORA_ACTUAL()
      };
      // Mantener compatibilidad con campos antiguos
      if (saldoItem === 0 && totItem > 0) item.fechaSaldo = HOY;
      else if (saldoItem > 0) item.fechaAnticipo = HOY;
    }
    if (editId !== null && editId !== undefined) {
      // EDICIÓN: buscar por folio (único y confiable) primero, luego por id
      let existeIdx = -1;
      if (form.folio) {
        existeIdx = pedidos.findIndex(function(p){ return String(p.folio) === String(form.folio); });
      }
      if (existeIdx < 0) {
        existeIdx = pedidos.findIndex(function(p){ return String(p.id) === String(editId); });
      }
      if (existeIdx >= 0) {
        const nuevos = pedidos.slice();
        nuevos[existeIdx] = Object.assign({},item,{id: pedidos[existeIdx].id});
        setPedidos(nuevos);
      } else {
        // No encontrado: agregar como nuevo con id único
        setPedidos(pedidos.concat([Object.assign({},item,{id:"p"+uid(),fecha:item.fecha||HOY_ACTUAL()})]));
      }
    } else {
      setPedidos(pedidos.concat([Object.assign({},item,{id:"p"+uid(),fecha:item.fecha||HOY_ACTUAL()})]));
      setNid(n => n+1);
    }
    setMF(false);
  }
  function cerrarModalForm() {
    const tieneInfo = form.cliente || form.tel || form.fechaEntrega || (form.productos && form.productos.length > 0) || (form.items && form.items.some(function(i){return i.nombre||i.precio||i.descripcion;}));
    if (!editId && tieneInfo) {
      if (!confirmar("Tienes información sin guardar. ¿Salir y descartar el pedido?")) return;
    }
    setMF(false);
  }
  function cambiar(id, e) {
    // Buscar por folio (único) para evitar conflictos de ids duplicados al recargar
    const ped = pedidos.find(function(p){ return p.id === id || String(p.folio) === String(id); });
    if (!ped || ped.estado === e) return;
    const folioRef = String(ped.folio);
    setPedidos(pedidos.map(function(p){
      return String(p.folio) === folioRef ? Object.assign({},p,{estado:e}) : p;
    }));
  }
  function handleImg(e) {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => setForm(fm => Object.assign({},fm,{imagen:ev.target.result}));
    r.readAsDataURL(f);
  }
  function updateItem(i, field, val) {
    const items = form.items.map((x,j) => j===i ? Object.assign({},x,{[field]:val}) : x);
    setForm(Object.assign({},form,{items:items}));
  }
  function addItem() { setForm(Object.assign({},form,{items:(form.items||[]).concat([{nombre:"",descripcion:"",precio:"",cantidad:1,productoId:uid(),notaProd:""}])})); }
  function removeItem(i) { setForm(Object.assign({},form,{items:form.items.filter((_,j) => j!==i)})); }

  function agregarProductoStock(stockProd, temaSeleccionado) {
    const pid = uid();
    const newItems = [];
    if ((stockProd.composicion||[]).length === 0) {
      // Sin composición: agregamos como item simple
      newItems.push({nombre:stockProd.nombre, descripcion:stockProd.medidas||"", precio:String(stockProd.precio||0), cantidad:1, productoId:pid, notaProd:""});
    } else {
      // Desglosamos en items por cada componente
      stockProd.composicion.forEach(function(c, idx) {
        newItems.push({
          nombre: c.nombre,
          descripcion: c.tipo === "moldura" ? "Moldura" : "Insumo",
          precio: idx === 0 ? String(stockProd.precio||0) : "0",
          cantidad: 1,
          productoId: pid,
          notaProd: "",
          tipo: c.tipo,
          refId: c.refId
        });
      });
    }
    // Inicializa productos meta con titulo, nota e imagen
    const tema = temaSeleccionado || "General";
    const productosMeta = (form.productos || []).concat([{
      id: pid,
      titulo: stockProd.nombre + (tema ? " — " + tema : "") + " " + (stockProd.alto||"") + "x" + (stockProd.ancho||"") + "cm",
      nota: "",
      imagen: null,
      stockId: stockProd.id,
      tema: tema
    }]);
    setForm(Object.assign({},form,{items:(form.items||[]).concat(newItems), productos:productosMeta}));
  }

  function agregarItemSuelto() {
    const pid = uid();
    const productosMeta = (form.productos || []).concat([{id:pid, titulo:"Producto", nota:"", imagen:null}]);
    setForm(Object.assign({},form,{
      items:(form.items||[]).concat([{nombre:"",descripcion:"",precio:"",cantidad:1,productoId:pid,notaProd:""}]),
      productos: productosMeta
    }));
  }

  function actualizarProducto(pid, field, val) {
    setForm(function(prev) {
      const productos = (prev.productos||[]).map(function(p){return p.id===pid?Object.assign({},p,{[field]:val}):p;});
      return Object.assign({},prev,{productos:productos});
    });
  }

  function eliminarProducto(pid) {
    if (!confirmar("¿Eliminar este producto y todos sus componentes?")) return;
    setForm(Object.assign({},form,{
      items: (form.items||[]).filter(function(i){return i.productoId !== pid;}),
      productos: (form.productos||[]).filter(function(p){return p.id !== pid;})
    }));
  }

  function handleImgProducto(pid, e) {
    const f = e.target.files[0];
    if (!f) return;

    // Marcar como subiendo
    setForm(function(prev) {
      const productos = (prev.productos||[]).map(function(p){return p.id===pid?Object.assign({},p,{subiendo:true}):p;});
      return Object.assign({},prev,{productos:productos});
    });

    const r = new FileReader();
    r.onload = function(ev) {
      const base64Original = ev.target.result;

      // Generar thumbnail comprimido para visualización y guardado
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxDim = 360; // Max 360px → ~10-15KB en base64 jpeg
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
        else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        const thumbnail = canvas.toDataURL('image/jpeg', 0.68);

        // Asignar imagen y nombre del archivo en una sola actualización funcional
        setForm(function(prev) {
          const productos = (prev.productos||[]).map(function(p){
            return p.id===pid ? Object.assign({},p,{imagen:thumbnail, subiendo:false}) : p;
          });
          return Object.assign({},prev,{productos:productos});
        });

        // Subir original a Drive en paralelo (no afecta visualización)
        const tituloProd = (function(){
          const prod = (form.productos||[]).find(function(p){return p.id===pid;});
          return prod ? prod.titulo : "imagen";
        })() || "imagen";

        fetch(API_URL, {
          method: 'POST',
          headers: {"Content-Type": "text/plain"},
          body: JSON.stringify({
            accion: 'subir_imagen',
            imagen: base64Original,
            nombre: tituloProd
          })
        })
        .then(resp => resp.json())
        .then(data => {
          if (data && data.ok && data.fileId) {
            setForm(function(prev) {
              const productos = (prev.productos||[]).map(function(p){
                return p.id===pid ? Object.assign({},p,{fileId:data.fileId}) : p;
              });
              return Object.assign({},prev,{productos:productos});
            });
          }
        })
        .catch(err => {
          console.warn("Drive upload failed (image still works locally): " + err.message);
        });
      };
      img.onerror = function() {
        setForm(function(prev) {
          const productos = (prev.productos||[]).map(function(p){return p.id===pid?Object.assign({},p,{subiendo:false}):p;});
          return Object.assign({},prev,{productos:productos});
        });
        alert("No se pudo procesar la imagen.");
      };
      img.src = base64Original;
    };
    r.onerror = function() {
      setForm(function(prev) {
        const productos = (prev.productos||[]).map(function(p){return p.id===pid?Object.assign({},p,{subiendo:false}):p;});
        return Object.assign({},prev,{productos:productos});
      });
      alert("Error leyendo el archivo.");
    };
    r.readAsDataURL(f);
  }

  function eliminarImagenProducto(pid) {
    const prod = form.productos.find(p => p.id === pid);
    if (!prod || !prod.imagen) return;
    
    if (!confirmar("¿Eliminar la imagen de este producto?")) return;
    
    // Si existe fileId, eliminar de Drive
    if (prod.fileId) {
      fetch(API_URL, {
        method: 'POST',
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({
          accion: 'eliminar_imagen',
          fileId: prod.fileId
        })
      }).catch(err => console.error("Error eliminando de Drive:", err));
    }
    
    actualizarProducto(pid, "imagen", null);
    actualizarProducto(pid, "fileId", null);
  }

  // ── VISTA HOY: 3 grupos de enfoque diario ──
  const enProceso = function(p){ return p.estado === "Pendiente" || p.estado === "Produccion"; };
  const hoyAtrasados = pedidosFil.filter(function(p){
    const d = diasParaEntrega(p.fechaEntrega);
    return enProceso(p) && d !== null && d < 0;
  }).sort(function(a,b){ return (diasParaEntrega(a.fechaEntrega)||0) - (diasParaEntrega(b.fechaEntrega)||0); });
  const hoyProximos = pedidosFil.filter(function(p){
    const d = diasParaEntrega(p.fechaEntrega);
    return enProceso(p) && d !== null && d >= 0 && d <= 1;
  }).sort(function(a,b){ return (diasParaEntrega(a.fechaEntrega)||0) - (diasParaEntrega(b.fechaEntrega)||0); });
  const hoyListos = pedidosFil.filter(function(p){ return p.estado === "Listo"; }).sort(function(a,b){
    const fa = parseInt(String(a.folio).replace(/\D/g,""))||0;
    const fb = parseInt(String(b.folio).replace(/\D/g,""))||0;
    return fb - fa;
  });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Pedidos</div>
          {urgentes.length>0 && <div style={{color:T.red,fontSize:11,fontFamily:FS,marginTop:2}}>{urgentes.length} urgente{urgentes.length>1?"s":""}</div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{display:"flex",border:"1px solid "+T.border,borderRadius:7,overflow:"hidden"}}>
            <button onClick={() => setVista("hoy")} style={{background:vista==="hoy"?T.bgDark:"transparent",color:vista==="hoy"?T.text:T.textFade,border:"none",padding:"6px 14px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:vista==="hoy"?700:400}}>Hoy</button>
            <button onClick={() => setVista("kanban")} style={{background:vista==="kanban"?T.bgDark:"transparent",color:vista==="kanban"?T.text:T.textFade,border:"none",padding:"6px 14px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:vista==="kanban"?700:400}}>Kanban</button>
            <button onClick={() => setVista("lista")} style={{background:vista==="lista"?T.bgDark:"transparent",color:vista==="lista"?T.text:T.textFade,border:"none",padding:"6px 14px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:vista==="lista"?700:400}}>Lista</button>
          </div>
          <Btn onClick={() => { if (onNuevoPedido) onNuevoPedido(); else openForm(null); }}>+ Nuevo pedido</Btn>
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <input
          value={busq}
          onChange={e => setBusq(e.target.value)}
          placeholder="Buscar por nombre, telefono o numero de nota..."
          style={{width:"100%",background:T.bgCard,border:"1px solid "+(busq?T.amber:T.border),borderRadius:8,padding:"9px 14px",color:T.text,fontFamily:FS,fontSize:13,outline:"none",boxSizing:"border-box"}}
        />
        {busq && <div style={{color:T.textSub,fontSize:11,fontFamily:FS,marginTop:4}}>{pedidosFil.length} resultado{pedidosFil.length!==1?"s":""} para "{busq}"</div>}
      </div>

      {vista === "hoy" ? (
        <VistaHoy
          atrasados={hoyAtrasados}
          proximos={hoyProximos}
          listos={hoyListos}
          calcularTotal={calcularTotal}
          calcularSaldo={calcularSaldo}
          diasParaEntrega={diasParaEntrega}
          colorDiasEntrega={colorDiasEntrega}
          textoDiasEntrega={textoDiasEntrega}
          onVer={(p) => setMD(normalizarPedido(p))}
          onEditar={editarPedido}
          onCambiar={cambiar}
        />
      ) : vista === "kanban" ? (
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,overflowX:"auto"}}>
          {ESTADOS_K.map(function(est) {
            const col = META_K[est];
            // Filtrar y ordenar SIEMPRE descendente por folio dentro de cada columna
            const cards = pedidosFil.filter(p => p.estado === est).slice().sort(function(a,b){
              const fa = parseInt(String(a.folio).replace(/\D/g,""))||0;
              const fb = parseInt(String(b.folio).replace(/\D/g,""))||0;
              return fb - fa;
            });
            return (
              <div key={est} style={{background:col.bg,border:"1px solid "+col.border,borderRadius:11,padding:"10px 8px",minHeight:180}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:col.dot}}/>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12,fontFamily:FS}}>{est}</div><div style={{color:T.textFade,fontSize:10,fontFamily:FS}}>{col.label}</div></div>
                  <div style={{background:col.dot+"20",color:col.dot,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700,fontFamily:FS}}>{cards.length}</div>
                </div>
                {cards.map(function(p) {
                  const tot = calcularTotal(p);
                  const pend = calcularSaldo(p);
                  const dias = diasParaEntrega(p.fechaEntrega);
                  const colorDia = colorDiasEntrega(dias);
                  const textoDia = textoDiasEntrega(dias);
                  const urg = dias!==null&&dias<=1&&!["Entregado","Bodega"].includes(p.estado);
                  // Pedido entregado con saldo pendiente
                  const entregadoConSaldo = p.estado === "Entregado" && Math.round(pend) > 0;
                  return (
                    <div key={String(p.folio)+"-"+String(p.id)} style={{background:entregadoConSaldo?"#FFEBEE":(urg?"#FFEBEE":T.bgCard),border:entregadoConSaldo?"2px solid "+T.red:(urg?"1px solid "+T.red+"40":"1px solid "+T.border),borderRadius:8,padding:"9px 10px",marginBottom:7}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <div><div style={{fontWeight:700,fontSize:12,fontFamily:FONT}}>{p.cliente}</div><div style={{color:T.textFade,fontSize:10,fontFamily:FS}}>#{p.folio}</div></div>
                        {entregadoConSaldo && <span style={{background:T.red,color:"#fff",borderRadius:6,fontSize:9,padding:"1px 5px",fontWeight:700}}>💰 SALDO</span>}
                        {!entregadoConSaldo && urg && <span style={{background:T.red,color:"#fff",borderRadius:6,fontSize:9,padding:"1px 5px",fontWeight:700}}>⚡</span>}
                      </div>
                      {p.imagen && <img src={p.imagen} alt="" style={{width:"100%",height:48,objectFit:"cover",borderRadius:5,marginBottom:5}}/>}
                      {gruposProducto(p).slice(0,2).map(function(g){
                        return (
                          <div key={g.id} style={{background:T.bgDark,borderRadius:4,padding:"3px 6px",marginBottom:3}}>
                            <div style={{color:T.text,fontSize:10,fontFamily:FS,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.titulo}</div>
                            {g.nota && <div style={{color:T.amber,fontSize:9,fontFamily:FS,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📝 {g.nota}</div>}
                            <div style={{color:T.textFade,fontSize:9,fontFamily:FS}}>{g.items.length} item{g.items.length!==1?"s":""}</div>
                          </div>
                        );
                      })}
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:6,marginBottom:4}}>
                        <div>
                          <div style={{color:T.amber,fontWeight:700,fontSize:13,fontFamily:FONT}}>{fmt(tot)}</div>
                          {Math.round(pend)>0 ? <div style={{color:T.orange,fontSize:10,fontFamily:FS}}>Saldo: {fmt(pend)}</div> : <div style={{color:T.green,fontSize:10,fontFamily:FS,fontWeight:600}}>PAGADO</div>}
                        </div>
                        {p.fechaEntrega && (
                          <div style={{textAlign:"right"}}>
                            <div style={{color:T.textFade,fontSize:10,fontFamily:FS}}>{fmtD(p.fechaEntrega)}</div>
                            {dias!==null && !["Entregado","Bodega"].includes(p.estado) && (
                              <div style={{display:"inline-block",background:colorDia,color:"#fff",borderRadius:4,padding:"1px 6px",fontSize:9,fontFamily:FS,fontWeight:700,marginTop:2}}>{textoDia}</div>
                            )}
                          </div>
                        )}
                      </div>
                      {est === "Listo" && (
                        <button onClick={(ev) => { ev.stopPropagation(); ev.preventDefault(); cambiar(p.id,"Entregado"); }} style={{width:"100%",background:T.green,color:"#fff",border:"none",borderRadius:6,padding:"6px 0",fontSize:11,cursor:"pointer",fontFamily:FS,fontWeight:700,marginBottom:5}}>✓ Marcar Entregado</button>
                      )}
                      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                        {ESTADOS_K.filter(e => e!==est&&e!=="Bodega"&&!(est==="Listo"&&e==="Entregado")).slice(0,2).map(e => <button key={e} onClick={(ev) => { ev.stopPropagation(); ev.preventDefault(); cambiar(p.id,e); }} style={{background:"rgba(0,0,0,0.05)",color:T.textSub,border:"1px solid "+T.border,borderRadius:4,padding:"2px 5px",fontSize:9,cursor:"pointer",fontFamily:FS,fontWeight:600}}>→{e}</button>)}
                        <button onClick={() => setMD(normalizarPedido(p))} style={{background:T.greenBg,color:T.green,border:"1px solid "+T.green+"30",borderRadius:4,padding:"2px 6px",fontSize:9,cursor:"pointer"}}>Ver</button>
                        <button onClick={() => editarPedido(p)} style={{background:T.bgDark,color:T.textSub,border:"1px solid "+T.border,borderRadius:4,padding:"2px 5px",fontSize:9,cursor:"pointer"}}>Editar</button>
                      </div>
                    </div>
                  );
                })}
                <button onClick={() => openForm(null)} style={{width:"100%",background:"transparent",border:"1px dashed "+T.border,borderRadius:7,padding:"7px",color:T.textFade,cursor:"pointer",fontSize:11,fontFamily:FS,marginTop:4}}>+ Agregar</button>
              </div>
            );
          })}
        </div>
      ) : (
        <div>
          {pedidosFil.map(function(p) {
            const tot = calcularTotal(p);
            const pend = calcularSaldo(p);
            const col = META_K[p.estado] || {};
            const dias = diasParaEntrega(p.fechaEntrega);
            const colorDia = colorDiasEntrega(dias);
            const textoDia = textoDiasEntrega(dias);
            const entregadoConSaldo = p.estado === "Entregado" && Math.round(pend) > 0;
            return (
              <Card key={p.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,padding:"10px 14px",borderLeft:"3px solid "+(entregadoConSaldo?T.red:col.dot),background:entregadoConSaldo?"#FFEBEE":undefined}}>
                {p.imagen && <img src={p.imagen} alt="" style={{width:40,height:40,objectFit:"cover",borderRadius:5}}/>}
                <div style={{width:46,color:T.textFade,fontSize:11,fontFamily:FS}}>#{p.folio}</div>
                <div style={{flex:2}}>
                  <div style={{fontWeight:700,fontSize:13,fontFamily:FONT}}>{p.cliente}</div>
                  <div style={{color:entregadoConSaldo?T.red:T.textFade,fontSize:11,fontFamily:FS,fontWeight:entregadoConSaldo?700:400}}>
                    {p.estado}{entregadoConSaldo && " · 💰 CON SALDO"} · {p.tel||""}
                  </div>
                </div>
                <div style={{flex:1,color:T.textFade,fontSize:11,fontFamily:FS}}>
                  <div>{fmtD(p.fechaEntrega)}</div>
                  {dias!==null && !["Entregado","Bodega"].includes(p.estado) && (
                    <div style={{display:"inline-block",background:colorDia,color:"#fff",borderRadius:4,padding:"1px 6px",fontSize:9,fontFamily:FS,fontWeight:700,marginTop:2}}>{textoDia}</div>
                  )}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:T.amber,fontWeight:700,fontSize:14,fontFamily:FONT}}>{fmt(tot)}</div>
                  {Math.round(pend)>0 ? <div style={{color:entregadoConSaldo?T.red:T.orange,fontSize:10,fontFamily:FS,fontWeight:entregadoConSaldo?700:400}}>Saldo: {fmt(pend)}</div> : <div style={{color:T.green,fontSize:10,fontFamily:FS,fontWeight:600}}>PAGADO</div>}
                </div>
                <div style={{display:"flex",gap:5}}>
                  <Btn size="sm" variant="success" onClick={() => setMD(normalizarPedido(p))}>Ver</Btn>
                  <Btn size="sm" variant="ghost" onClick={() => editarPedido(p)}>Editar</Btn>
                  <Btn size="sm" variant="danger" onClick={() => { if(confirmar("¿Eliminar pedido #"+p.folio+" de "+p.cliente+"?")) setPedidos(pedidos.filter(x => x.id !== p.id)); }}>Eliminar</Btn>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {modalForm && (
        <Modal title={editId?"Editar #"+form.folio:"Nuevo pedido #"+form.folio} onClose={cerrarModalForm} wide={true}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
            <div>
              <Inp label="Cliente *" value={form.cliente||""} onChange={e => setForm(Object.assign({},form,{cliente:e.target.value}))}/>
              <Inp label="Telefono" value={form.tel||""} onChange={e => setForm(Object.assign({},form,{tel:e.target.value}))} type="tel"/>
              <Inp label="Fecha de entrega *" value={form.fechaEntrega||""} onChange={e => setForm(Object.assign({},form,{fechaEntrega:e.target.value}))} type="date"/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <Inp label="Anticipo ($)" value={form.anticipo||""} onChange={e => setForm(Object.assign({},form,{anticipo:e.target.value}))} type="number"/>
                <Inp label="Descuento (%)" value={form.descuentoPct||""} onChange={e => setForm(Object.assign({},form,{descuentoPct:e.target.value}))} type="number"/>
              </div>
              <Sel label="Metodo de pago" value={form.metodoPago||"Efectivo"} onChange={e => setForm(Object.assign({},form,{metodoPago:e.target.value}))}>{METODOS.map(m => <option key={m}>{m}</option>)}</Sel>
              <Sel label="Estado" value={form.estado||"Pendiente"} onChange={e => setForm(Object.assign({},form,{estado:e.target.value}))}>{ESTADOS_K.map(e => <option key={e}>{e}</option>)}</Sel>
              <Inp label="Nota" value={form.nota||""} onChange={e => setForm(Object.assign({},form,{nota:e.target.value}))}/>
              {/* Resumen visual con descuento aplicado */}
              {(function(){
                const sub = (function(){
                  const items = form.items || [];
                  const productos = form.productos || [];
                  if (productos.length === 0) return totI(items);
                  const productoIds = new Set(productos.map(function(p){return p.id;}));
                  let s = 0;
                  productos.forEach(function(prod){
                    const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
                    const subProd = itemsProd.reduce(function(ss,it){return ss + (parseFloat(it.precio)||0);},0);
                    s += subProd * (parseFloat(prod.cantidad)||1);
                  });
                  const sueltos = items.filter(function(it){return !productoIds.has(it.productoId);});
                  s += sueltos.reduce(function(ss,it){return ss + (parseFloat(it.precio)||0) * (parseFloat(it.cantidad)||1);},0);
                  return s;
                })();
                const pct = parseFloat(form.descuentoPct)||0;
                const desMonto = pct > 0 ? (sub * pct/100) : (parseFloat(form.descuento)||0);
                const totalF = Math.max(0, sub - desMonto);
                const antF = parseFloat(form.anticipo)||0;
                const saldoF = Math.max(0, totalF - antF);
                return (
                  <div style={{background:T.bgDark,borderRadius:7,padding:"8px 12px",marginTop:8,fontSize:11,fontFamily:FS}}>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span>Subtotal</span><span>{fmt(sub)}</span></div>
                    {desMonto>0 && <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0",color:T.textFade}}><span>Descuento {pct>0?"("+pct+"%)":""}</span><span>−{fmt(desMonto)}</span></div>}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontWeight:700,color:T.amber,borderTop:"1px solid "+T.border,marginTop:3,paddingTop:5}}><span>TOTAL</span><span>{fmt(totalF)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0",color:T.green}}><span>Anticipo</span><span>{fmt(antF)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"2px 0",color:saldoF>0?T.orange:T.green,fontWeight:700}}><span>Saldo</span><span>{fmt(saldoF)}</span></div>
                  </div>
                );
              })()}
            </div>
            <div>
              <div style={{color:T.textSub,fontSize:11,fontFamily:FS,fontWeight:600,marginBottom:6}}>Productos del pedido</div>

              {/* Buscador con filtro en vivo para agregar desde stock */}
              <div style={{position:"relative",marginBottom:10}}>
                <input
                  value={stockBuscar}
                  onChange={e=>setStockBuscar(e.target.value)}
                  onFocus={()=>setStockFocus(true)}
                  onBlur={()=>setTimeout(function(){setStockFocus(false);},150)}
                  placeholder="🔍 Buscar en stock para agregar..."
                  style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 12px",color:T.text,fontFamily:FS,fontSize:12,outline:"none",boxSizing:"border-box"}}
                />
                {stockFocus && (function(){
                  const term = stockBuscar.trim().toLowerCase();
                  const opciones = [];
                  (stock||[]).forEach(function(p){
                    const temas = p.temas||[];
                    if (temas.length === 0) return;
                    temas.forEach(function(t){
                      const texto = (p.nombre+" "+t.nombre).toLowerCase();
                      if (term === "" || texto.indexOf(term) !== -1) {
                        opciones.push({producto:p, tema:t});
                      }
                    });
                  });
                  const mostrar = opciones.slice(0,8);
                  if (mostrar.length === 0) {
                    return (
                      <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,marginTop:3,padding:"10px 12px",fontSize:12,color:T.textFade,fontFamily:FS,zIndex:20}}>
                        Sin resultados
                      </div>
                    );
                  }
                  return (
                    <div style={{position:"absolute",top:"100%",left:0,right:0,background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,marginTop:3,maxHeight:260,overflowY:"auto",zIndex:20,boxShadow:"0 4px 14px rgba(0,0,0,0.15)"}}>
                      {mostrar.map(function(o){
                        const stk = parseInt(o.tema.stock)||0;
                        return (
                          <div key={o.producto.id+"|"+o.tema.id}
                            onClick={function(){
                              agregarProductoStock(o.producto, o.tema.nombre);
                              setStockBuscar("");
                              setStockFocus(false);
                            }}
                            style={{padding:"8px 12px",cursor:"pointer",fontSize:12,fontFamily:FS,borderBottom:"1px solid "+T.border,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}
                          >
                            <span>{o.producto.nombre} — {o.tema.nombre} <span style={{color:T.textFade}}>· {o.producto.alto||"?"}x{o.producto.ancho||"?"}cm</span></span>
                            <span style={{color:stk>0?T.green:T.red,fontWeight:700,whiteSpace:"nowrap"}}>{stk} pzas</span>
                          </div>
                        );
                      })}
                      {opciones.length > 8 && (
                        <div style={{padding:"6px 12px",fontSize:11,color:T.textFade,fontFamily:FS,fontStyle:"italic"}}>
                          Sigue escribiendo para acotar ({opciones.length} resultados)…
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>

              {/* Productos del pedido agrupados */}
              {(form.productos||[]).length === 0 ? (
                <div style={{background:T.bgDark,borderRadius:8,padding:"15px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:11,marginBottom:8}}>Sin productos. Agrega desde el catálogo de stock o crea uno manual.</div>
              ) : (form.productos||[]).map(function(prod) {
                const itemsProd = (form.items||[]).map(function(it,idx){return Object.assign({},it,{_idx:idx});}).filter(function(it){return it.productoId === prod.id;});
                const subProd = itemsProd.reduce(function(s,it){return s+(parseFloat(it.precio)||0);},0);
                return (
                  <div key={prod.id} style={{background:"#FFF8F0",border:"1px solid "+T.amber+"30",borderRadius:9,padding:"10px 12px",marginBottom:9}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                          <input value={prod.titulo||""} onChange={e => actualizarProducto(prod.id,"titulo",e.target.value)} placeholder="Nombre del producto" style={{flex:1,background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 8px",color:T.text,fontFamily:FS,fontSize:12,fontWeight:700,outline:"none"}}/>
                          <span style={{fontFamily:FONT,fontWeight:700,color:T.amber,fontSize:13,whiteSpace:"nowrap"}}>{fmt(subProd)}</span>
                          <button onClick={() => eliminarProducto(prod.id)} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:13}}>✕</button>
                        </div>
                        <input value={prod.nota||""} onChange={e => actualizarProducto(prod.id,"nota",e.target.value)} placeholder="Nota del producto (color, detalles, instrucciones...)" style={{width:"100%",background:T.bgCard,border:"1px solid "+T.amber+"40",borderRadius:5,padding:"4px 8px",color:T.textSub,fontFamily:FS,fontSize:11,outline:"none",boxSizing:"border-box"}}/>
                      </div>
                    </div>

                    {/* Items del producto (componentes) */}
                    {itemsProd.map(function(it) {
                      const i = it._idx;
                      const cant = parseFloat(it.cantidad)||1;
                      const precio = parseFloat(it.precio)||0;
                      const subtotal = cant * precio;
                      return (
                        <div key={i} style={{display:"flex",gap:6,marginBottom:4,paddingLeft:8,alignItems:"center"}}>
                          <input value={it.nombre} onChange={e => updateItem(i,"nombre",e.target.value)} placeholder="Componente" style={{flex:2,background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 8px",color:T.text,fontFamily:FS,fontSize:11,outline:"none"}}/>
                          <input value={it.descripcion||""} onChange={e => updateItem(i,"descripcion",e.target.value)} placeholder="Detalle" style={{flex:1,background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 8px",color:T.textSub,fontFamily:FS,fontSize:11,outline:"none"}}/>
                          <input type="number" min="1" step="1" value={it.cantidad||1} onChange={e => updateItem(i,"cantidad",e.target.value)} title="Cantidad" style={{width:42,background:T.bgCard,border:"1px solid "+T.blue+"40",borderRadius:5,padding:"4px 7px",color:T.blue,fontFamily:FS,fontSize:11,fontWeight:700,outline:"none",textAlign:"center"}}/>
                          <span style={{color:T.textFade,fontSize:10}}>×</span>
                          <input type="number" value={it.precio} onChange={e => updateItem(i,"precio",e.target.value)} placeholder="$" title="Precio unitario" style={{width:58,background:T.bgCard,border:"1px solid "+T.amber+"40",borderRadius:5,padding:"4px 7px",color:T.amber,fontFamily:FS,fontSize:11,fontWeight:700,outline:"none"}}/>
                          <span style={{color:T.green,fontSize:11,fontWeight:700,fontFamily:FS,minWidth:55,textAlign:"right"}}>={fmt(subtotal)}</span>
                          <button onClick={() => removeItem(i)} style={{background:"none",border:"none",color:T.textFade,cursor:"pointer",fontSize:11}}>✕</button>
                        </div>
                      );
                    })}
                    <button onClick={function(){
                      const newItem = {nombre:"",descripcion:"",precio:"",cantidad:1,productoId:prod.id,notaProd:""};
                      setForm(Object.assign({},form,{items:(form.items||[]).concat([newItem])}));
                    }} style={{marginLeft:8,background:"transparent",border:"1px dashed "+T.amber+"50",borderRadius:5,padding:"3px 10px",color:T.textFade,cursor:"pointer",fontFamily:FS,fontSize:10,marginTop:3}}>+ Agregar componente</button>

                    {/* Imagen del producto (full width abajo) */}
                    <div style={{marginTop:10}}>
                      <label style={{display:"block",cursor:prod.subiendo?"not-allowed":"pointer",opacity:prod.subiendo?0.6:1}}>
                        {prod.subiendo ? (
                          <div style={{background:T.bgCard,border:"2px dashed "+T.amber+"60",borderRadius:8,padding:"30px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:12}}>⏳ Subiendo imagen...</div>
                        ) : prod.imagen ? (
                          <div style={{position:"relative"}}>
                            <img src={prod.imagen} alt="" style={{width:"100%",maxHeight:280,objectFit:"contain",background:T.bgCard,border:"1px solid "+T.amber+"40",borderRadius:8,display:"block"}}/>
                            <div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,0.6)",color:"#fff",padding:"3px 8px",borderRadius:5,fontSize:10,fontFamily:FS}}>Click para reemplazar</div>
                          </div>
                        ) : (
                          <div style={{background:T.bgCard,border:"2px dashed "+T.amber+"60",borderRadius:8,padding:"22px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:12}}>
                            <div style={{fontSize:24,marginBottom:4}}>📷</div>
                            <div style={{fontWeight:600,color:T.amber}}>Subir imagen del producto</div>
                            <div style={{fontSize:10,marginTop:2}}>Click para seleccionar archivo</div>
                          </div>
                        )}
                        <input type="file" accept="image/*" onChange={e => handleImgProducto(prod.id, e)} disabled={prod.subiendo} style={{display:"none"}}/>
                      </label>
                      {prod.imagen && !prod.subiendo && <button onClick={() => eliminarImagenProducto(prod.id)} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:11,fontFamily:FS,marginTop:4}}>Quitar imagen</button>}
                    </div>
                  </div>
                );
              })}

              <button onClick={agregarItemSuelto} style={{width:"100%",background:"transparent",border:"1.5px dashed "+T.border,borderRadius:7,padding:"7px",color:T.textFade,cursor:"pointer",fontFamily:FS,fontSize:12,marginBottom:10}}>+ Producto manual</button>
              <div style={{background:"#FFF8E0",border:"1px solid "+T.amber+"30",borderRadius:8,padding:"10px 12px",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontFamily:FONT,fontWeight:700}}>Total</span>
                <span style={{fontFamily:FONT,color:T.amber,fontWeight:700,fontSize:16}}>{fmt(totI(form.items||[]))}</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn variant="ghost" onClick={cerrarModalForm}>Cancelar</Btn>
            <Btn onClick={save} disabled={!form.cliente || !form.fechaEntrega}>Guardar</Btn>
          </div>
        </Modal>
      )}
      {modalDoc && <ErrorBoundary><ModalDetallePedido
        pedido={modalDoc}
        onClose={() => setMD(null)}
        onEditar={() => { setMD(null); editarPedido(modalDoc); }}
        onEliminar={() => { if(confirmar("¿Eliminar pedido #"+modalDoc.folio+" de "+modalDoc.cliente+"?")) { setPedidos(pedidos.filter(p => String(p.folio) !== String(modalDoc.folio))); setMD(null); } }}
        onPago={() => { setMP(modalDoc); setNP(""); setNPM("Efectivo"); }}
        generarPDF={generarPDF}
        stock={stock}
      /></ErrorBoundary>}
      {modalPago && <ModalPago
        pedido={modalPago}
        nuevoPago={nuevoPago}
        setNP={setNP}
        nuevoPagoMet={nuevoPagoMet}
        setNPM={setNPM}
        onClose={() => setMP(null)}
        onAplicar={() => {
          const tot2 = calcularTotal(modalPago);
          const pago = parseFloat(nuevoPago)||0;
          if (!pago) return;
          const nuevoAnticipo = Math.min(tot2, (modalPago.anticipo||0) + pago);
          const updates = {anticipo:nuevoAnticipo,metodoPago:nuevoPagoMet};
          updates.ultimoPago = {
            fecha: HOY_ACTUAL(),
            monto: pago,
            tipo: nuevoAnticipo >= tot2 ? "saldo" : "anticipo",
            metodo: nuevoPagoMet,
        hora: HORA_ACTUAL()
          };
          if (nuevoAnticipo >= tot2 && tot2 > 0) updates.fechaSaldo = HOY;
          else updates.fechaAnticipo = HOY;
          const updated = Object.assign({},modalPago,updates);
          
          // PROTECCIÓN: verificar que el folio existe en el array
          if (!modalPago.folio) {
            alert("❌ ERROR: La nota no tiene folio. No se puede guardar el pago.");
            return;
          }
          
          // Buscar por folio primero, luego por id como fallback
          const existeIdx = pedidos.findIndex(function(p){
            return String(p.folio) === String(modalPago.folio) || p.id === modalPago.id;
          });
          
          if (existeIdx < 0) {
            alert("❌ ERROR: No encontré la nota #" + modalPago.folio + " en la base de datos. El pago NO se guardó. Recarga e intenta de nuevo.");
            return;
          }
          
          // Actualizar solo esa nota específica
          const nuevosPedidos = pedidos.slice();
          nuevosPedidos[existeIdx] = updated;
          setPedidos(nuevosPedidos);
          setMD(updated);
          setMP(null);
        }}
      />}
    </div>
  );
}

// ── PUNTO DE VENTA ────────────────────────────────────────────
function TabPOS({stock, setStock, nextFolio, setNextFolio, onVentaCreada}) {
  const [carrito, setCarrito] = useState([]);
  const [cliente, setCli] = useState("Publico General");
  const [tel, setTel] = useState("");
  const [metodo, setMet] = useState("Efectivo");
  const [recibo, setRecibo] = useState(null);
  const [temasSel, setTemasSel] = useState({}); // {productId: temaId}
  const total = carrito.reduce((s,c) => s + c.precio*c.qty, 0);
  const cats = [];
  (stock||[]).forEach(function(p) {
    const c = p.categoria || "Sin categoría";
    if (cats.indexOf(c) < 0) cats.push(c);
  });

  // Stock disponible de un tema
  function stockTema(prod, temaNombre) {
    if (!prod) return 0;
    const temas = parsearJSON(prod.temas);
    const t = temas.find(function(x){return x.nombre === temaNombre;});
    return t ? (parseInt(t.stock)||0) : 0;
  }

  // Cantidad ya en carrito de ese producto+tema
  function enCarrito(prodId, temaNombre) {
    const ex = carrito.find(function(c){return c.id === prodId && c.tema === temaNombre;});
    return ex ? ex.qty : 0;
  }

  function addProd(prod, temaNombre) {
    const ex = carrito.find(function(c){return c.id === prod.id && c.tema === temaNombre;});
    if (ex) {
      setCarrito(carrito.map(function(x){return (x.id === prod.id && x.tema === temaNombre) ? Object.assign({},x,{qty:x.qty+1}) : x;}));
    } else {
      setCarrito(carrito.concat([{
        id: prod.id,
        nombre: prod.nombre,
        medidas: (prod.alto||"")+"x"+(prod.ancho||"")+"cm",
        precio: parseFloat(prod.precio)||0,
        tema: temaNombre,
        qty: 1
      }]));
    }
  }

  function ajustarQty(itemKey, delta) {
    const item = carrito.find(function(c){return c.id+"|"+c.tema === itemKey;});
    if (!item) return;
    const newQty = item.qty + delta;
    if (newQty < 1) return;
    setCarrito(carrito.map(function(x){return (x.id+"|"+x.tema === itemKey) ? Object.assign({},x,{qty:newQty}) : x;}));
  }

  function quitar(itemKey) {
    setCarrito(carrito.filter(function(x){return (x.id+"|"+x.tema) !== itemKey;}));
  }

  function cobrar() {
    if (!carrito.length) return;
    // Detectar items sin stock para marcarlos
    const items = carrito.map(function(c){
      const prod = stock.find(function(p){return p.id === c.id;});
      const disp = stockTema(prod, c.tema);
      const sinStockReal = c.qty > disp;
      return {
        nombre: c.nombre,
        descripcion: c.medidas + (c.tema?" — "+c.tema:"") + (c.qty>1?" x"+c.qty:"") + (sinStockReal?" ⚠️ SIN STOCK":""),
        precio: c.precio*c.qty,
        stockId: c.id,
        tema: c.tema || "",
        sinStock: sinStockReal
      };
    });
    setStock(stock.map(function(p) {
      const itemsProd = carrito.filter(function(c){return c.id === p.id;});
      if (!itemsProd.length) return p;
      const temas = parsearJSON(p.temas).map(function(t){
        const it = itemsProd.find(function(c){return c.tema === t.nombre;});
        if (!it) return t;
        return Object.assign({},t,{stock: Math.max(0, (parseInt(t.stock)||0) - it.qty)});
      });
      return Object.assign({},p,{temas:temas});
    }));
    const venta = {folio:nextFolio,cliente:cliente,tel:tel,items:items,anticipo:total,metodoPago:metodo,estado:"Entregado",nota:"POS",imagen:null,fecha:HOY};
    onVentaCreada(venta);
    setRecibo(Object.assign({},venta,{total:total,carrito:carrito.slice()}));
    setCarrito([]);
    setCli("Publico General");
    setTel("");
  }

  if (recibo) return (
    <div style={{maxWidth:420,margin:"0 auto"}}>
      <Card style={{textAlign:"center",border:"2px solid "+T.green+"40"}}>
        <div style={{fontSize:40,marginBottom:8}}>✅</div>
        <div style={{fontFamily:FONT,fontWeight:700,fontSize:20,marginBottom:4}}>Nota #{recibo.folio}</div>
        <div style={{color:T.textFade,fontFamily:FS,marginBottom:16}}>{recibo.cliente} · {recibo.metodoPago}</div>
        <div style={{background:T.bgDark,borderRadius:8,padding:14,marginBottom:16,textAlign:"left"}}>
          {recibo.carrito.map((it,i) => <div key={i} style={{display:"flex",justifyContent:"space-between",fontFamily:FS,fontSize:13,marginBottom:4}}><span>{it.nombre} x{it.qty}</span><span style={{color:T.amber,fontWeight:700,fontFamily:FONT}}>{fmt(it.precio*it.qty)}</span></div>)}
          <div style={{borderTop:"1px solid "+T.border,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontFamily:FONT,fontWeight:700,fontSize:16}}><span>Total</span><span style={{color:T.amber}}>{fmt(recibo.total)}</span></div>
        </div>
        <Btn onClick={() => setRecibo(null)} style={{width:"100%"}}>Nueva venta</Btn>
      </Card>
    </div>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:20,alignItems:"start"}}>
      <div>
        <ST>Productos en Stock</ST>
        {(stock||[]).length === 0 && (
          <div style={{padding:"30px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:13}}>No hay productos en stock. Crea productos en Bases → Stock.</div>
        )}
        {cats.map(function(cat) {
          const productosCat = (stock||[]).filter(function(p){return (p.categoria||"Sin categoría") === cat;});
          if (productosCat.length === 0) return null;
          return (
            <div key={cat} style={{marginBottom:18}}>
              <div style={{fontFamily:FS,fontWeight:700,fontSize:11,color:T.textFade,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{cat}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
                {productosCat.map(function(prod) {
                  const temas = parsearJSON(prod.temas);
                  const stockTotal = temas.reduce(function(s,t){return s + (parseInt(t.stock)||0);},0);
                  const temaSelNombre = temasSel[prod.id] || (temas[0] && temas[0].nombre) || "General";
                  const temaActual = temas.find(function(t){return t.nombre === temaSelNombre;}) || temas[0];
                  const stkActual = temaActual ? (parseInt(temaActual.stock)||0) : 0;
                  const sinStock = stockTotal === 0;
                  const sinStockTema = stkActual === 0;
                  return (
                    <div key={prod.id} style={{background:sinStock?"#f9f9f9":T.bgCard,border:"1px solid "+(sinStock?"#e0e0e0":T.border),borderRadius:9,padding:"11px 12px"}}>
                      <div style={{fontFamily:FS,fontWeight:700,fontSize:12,marginBottom:3}}>{prod.nombre}</div>
                      <div style={{fontFamily:FS,fontSize:10,color:T.textFade,marginBottom:6}}>{(prod.alto||"")+"x"+(prod.ancho||"")+"cm"}</div>
                      {temas.length > 1 ? (
                        <select
                          value={temaSelNombre}
                          onChange={function(e){ const ns=Object.assign({},temasSel); ns[prod.id]=e.target.value; setTemasSel(ns); }}
                          style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 6px",fontFamily:FS,fontSize:11,marginBottom:6,outline:"none",color:T.text}}
                        >
                          {temas.map(function(t){ return <option key={t.id||t.nombre} value={t.nombre}>{t.nombre} ({parseInt(t.stock)||0} pzas)</option>; })}
                        </select>
                      ) : temas.length === 1 ? (
                        <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:4}}>{temaSelNombre}</div>
                      ) : (
                        <div style={{fontSize:10,color:T.red,fontFamily:FS,marginBottom:4}}>Sin temas</div>
                      )}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontFamily:FONT,fontWeight:700,fontSize:15,color:T.amber}}>{fmt(parseFloat(prod.precio)||0)}</div>
                          <div style={{fontFamily:FS,fontSize:10,color:sinStockTema?T.red:T.green,fontWeight:600}}>{sinStockTema?"⚠️ Sin stock":(stkActual+" en stock")}</div>
                        </div>
                        <button
                          onClick={function(){ if(temaActual) addProd(prod, temaSelNombre); }}
                          style={{background:sinStockTema?T.orange:T.header,color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:600}}
                          title={sinStockTema?"Producto sin stock — se venderá igual y notificará en Corte":""}
                        >Agregar</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <Card style={{position:"sticky",top:0}}>
        <div style={{fontFamily:FONT,fontWeight:700,fontSize:15,marginBottom:12}}>🛒 Venta al contado #{nextFolio}</div>
        <Inp label="Cliente" value={cliente} onChange={e => setCli(e.target.value)}/>
        <Inp label="Telefono" value={tel} onChange={e => setTel(e.target.value)} type="tel"/>
        {carrito.length === 0 ? (
          <div style={{color:T.textFade,textAlign:"center",padding:"20px 0",fontSize:13,fontFamily:FS}}>Selecciona productos</div>
        ) : (
          <div style={{marginBottom:10}}>
            {carrito.map(function(c) {
              const itemKey = c.id+"|"+c.tema;
              return (
                <div key={itemKey} style={{background:T.bgDark,borderRadius:7,padding:"7px 9px",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:FS,fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.nombre}</div>
                      <div style={{fontFamily:FS,fontSize:9,color:T.textFade}}>{c.tema} · {c.medidas}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={() => ajustarQty(itemKey, -1)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:4,width:22,height:22,cursor:"pointer",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                      <span style={{fontWeight:700,fontSize:12,minWidth:16,textAlign:"center"}}>{c.qty}</span>
                      <button onClick={() => ajustarQty(itemKey, 1)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:4,width:22,height:22,cursor:"pointer",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                    <span style={{fontFamily:FONT,fontWeight:700,fontSize:12,color:T.amber,minWidth:55,textAlign:"right"}}>{fmt(c.precio*c.qty)}</span>
                    <button onClick={() => quitar(itemKey)} style={{background:"none",border:"none",color:T.textFade,cursor:"pointer",fontSize:13}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <Sel label="Metodo de pago" value={metodo} onChange={e => setMet(e.target.value)}>{METODOS.map(m => <option key={m}>{m}</option>)}</Sel>
        <div style={{background:"#FFF8E0",border:"1px solid "+T.amber+"30",borderRadius:8,padding:"10px 12px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontFamily:FONT,fontWeight:700}}>Total a cobrar</span>
          <span style={{fontFamily:FONT,color:T.amber,fontWeight:700,fontSize:20}}>{fmt(total)}</span>
        </div>
        <Btn onClick={cobrar} disabled={!carrito.length} style={{width:"100%",padding:"11px 0",fontSize:14}}>Cobrar #{nextFolio}</Btn>
      </Card>
    </div>
  );
}

// ── COSTOS / GASTOS ───────────────────────────────────────────
function TabRegistros({tipo, registros, setRegistros, categorias, proveedores}) {
  const [modal, setModal] = useState(false);
  const [editId, setEid] = useState(null);
  const [form, setForm] = useState({concepto:"",categoria:categorias[0],monto:"",fecha:HOY,proveedor:"",nota:""});
  const [nid, setNid] = useState(100);
  const [filMes, setFM] = useState("todos");
  const [filCat, setFC] = useState("Todos");
  const esCosto = tipo === "costo";

  function openReg(g) {
    if (g) { setForm(Object.assign({},g,{monto:String(g.monto)})); setEid(g.id); }
    else { setForm({concepto:"",categoria:categorias[0],monto:"",fecha:HOY,proveedor:"",nota:""}); setEid(null); }
    setModal(true);
  }
  function save() {
    if (!form.concepto || !form.monto) return;
    const idFinal = (editId !== null && editId !== undefined && editId !== "") ? editId : nid;
    const item = Object.assign({},form,{id:idFinal,monto:parseFloat(form.monto)||0});
    const existe = registros.some(r => r.id===idFinal);
    if (editId && existe) {
      setRegistros(registros.map(r => r.id===editId?item:r));
    } else {
      setRegistros(registros.concat([item]));
      setNid(n => n+1);
    }
    setModal(false);
  }

  const meses = [];
  registros.forEach(function(g) { const m = (g.fecha||"").slice(0,7); if (m && meses.indexOf(m)<0) meses.push(m); });
  meses.sort().reverse();

  const listaMes = registros.filter(g => (filMes==="todos"||(g.fecha||"").startsWith(filMes)));
  const lista = listaMes.filter(g => (filCat==="Todos"||g.categoria===filCat));
  const total = lista.reduce((s,g) => s+g.monto, 0);
  const totalMes = listaMes.reduce((s,g) => s+g.monto, 0);
  const porCat = categorias.map(function(c) { return {cat:c,total:listaMes.filter(g => g.categoria===c).reduce((s,g) => s+g.monto,0)}; }).filter(c => c.total>0);
  const maxC = Math.max.apply(null, porCat.map(c => c.total).concat([1]));

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>{esCosto?"Costos de Produccion":"Gastos Operativos"}</div>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS,marginTop:2}}>{esCosto?"Materiales e insumos":"Operativos y fijos"}</div>
        </div>
        <Btn onClick={() => openReg(null)}>+ Agregar</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filMes} onChange={e => setFM(e.target.value)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"7px 12px",color:T.text,fontFamily:FS,fontSize:12,outline:"none"}}>
          <option value="todos">Todos los meses</option>
          {meses.map(function(m) { const p=m.split("-"); return <option key={m} value={m}>{MESES[parseInt(p[1])-1]} {p[0]}</option>; })}
        </select>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {["Todos"].concat(categorias).map(function(c) {
            return <button key={c} onClick={() => setFC(c)} style={{background:filCat===c?T.header:"transparent",color:filCat===c?"#fff":T.textSub,border:"1px solid "+(filCat===c?T.header:T.border),borderRadius:14,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:FS,fontWeight:filCat===c?700:400}}>{c}</button>;
          })}
        </div>
        <div style={{marginLeft:"auto",fontFamily:FONT,fontWeight:700,fontSize:16}}>Total: {fmt(total)}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 230px",gap:16,alignItems:"start"}}>
        <div>
          {lista.length===0 ? (
            <div style={{color:T.textFade,textAlign:"center",padding:"40px",fontFamily:FS}}>Sin registros para este filtro.</div>
          ) : lista.slice().sort((a,b) => new Date(b.fecha)-new Date(a.fecha)).map(function(g) {
            return (
              <Card key={g.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:7,padding:"10px 14px",borderLeft:"3px solid "+(esCosto?"#E65100":"#1565C0")}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:FS,fontWeight:700,fontSize:13}}>{g.concepto}</div>
                  <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap"}}>
                    <Badge label={g.categoria} color={esCosto?T.orange:T.blue} bg={esCosto?T.orangeBg:T.blueBg}/>
                    {g.proveedor && <span style={{color:T.textFade,fontSize:11,fontFamily:FS}}>📦 {g.proveedor}</span>}
                    <span style={{color:T.textFade,fontSize:11,fontFamily:FS}}>📅 {fmtD(g.fecha)}</span>
                    {g.nota && <span style={{color:T.textFade,fontSize:11,fontFamily:FS,fontStyle:"italic"}}>· {g.nota}</span>}
                  </div>
                </div>
                <div style={{fontFamily:FONT,fontWeight:700,fontSize:17}}>{fmt(g.monto)}</div>
                <Btn size="sm" variant="ghost" onClick={() => openReg(g)}>Editar</Btn>
                <Btn size="sm" variant="danger" onClick={() => { if(confirmar("¿Eliminar este registro?")) setRegistros(registros.filter(x => x.id!==g.id)); }}>Eliminar</Btn>
              </Card>
            );
          })}
        </div>
        <div style={{position:"sticky",top:0}}>
          <Card>
            <ST>Por categoria</ST>
            {porCat.length===0 ? <div style={{color:T.textFade,fontSize:12,fontFamily:FS}}>Sin datos</div> : porCat.map(function(item) {
              const activo = filCat === item.cat;
              return (
                <div key={item.cat} onClick={function(){ setFC(activo ? "Todos" : item.cat); }} title={activo?"Clic para quitar el filtro":"Clic para filtrar por "+item.cat} style={{marginBottom:9,cursor:"pointer",borderRadius:6,padding:"4px 6px",margin:"-4px -6px 5px",background:activo?(esCosto?T.orangeBg:T.blueBg):"transparent",border:"1px solid "+(activo?(esCosto?T.orange+"50":T.blue+"50"):"transparent")}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,alignItems:"center"}}>
                    <span style={{color:activo?(esCosto?T.orange:T.blue):T.textSub,fontSize:12,fontFamily:FS,fontWeight:activo?700:400}}>{activo?"✓ ":""}{item.cat}</span>
                    <span style={{fontSize:12,fontWeight:700,fontFamily:FS}}>{fmt(item.total)}</span>
                  </div>
                  <div style={{background:T.bgDark,borderRadius:4,height:7,overflow:"hidden"}}>
                    <div style={{width:(item.total/maxC*100)+"%",height:"100%",background:esCosto?T.orange:T.blue,borderRadius:4}}/>
                  </div>
                </div>
              );
            })}
            {filCat !== "Todos" && (
              <button onClick={function(){ setFC("Todos"); }} style={{width:"100%",marginTop:4,marginBottom:6,background:"transparent",border:"1px solid "+T.border,borderRadius:6,padding:"5px 0",cursor:"pointer",fontFamily:FS,fontSize:11,color:T.textSub,fontWeight:600}}>✕ Quitar filtro «{filCat}»</button>
            )}
            <div style={{borderTop:"1px solid "+T.border,marginTop:10,paddingTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontFamily:FONT,fontWeight:700}}>Total {filMes!=="todos"?"del mes":""}</span>

          <Inp label="Nota" value={form.nota} onChange={e => setForm(Object.assign({},form,{nota:e.target.value}))}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>

      )}
    </div>
  );
}

// Calcula el costo total de un paquete de stock basado en su composición + medidas
function calcularCostoStock(producto, molduras, insumos) {
  const alto = parseFloat(producto.alto) || 0;
  const ancho = parseFloat(producto.ancho) || 0;
  if (alto <= 0 || ancho <= 0) return 0;
  const m2 = (alto * ancho) / 10000;
  const perimetro_cm = 2 * (alto + ancho);
  let total = 0;
  (producto.composicion || []).forEach(function(c) {
    if (c.tipo === "moldura") {
      const m = molduras.find(function(x){return x.id === c.refId;});
      if (!m) return;
      const desp = parseFloat(m.desperdicio) || 0;
      const ml = (perimetro_cm + desp*4) / 100;
      total += ml * (parseFloat(m.costo_ml) || 0);
    } else if (c.tipo === "insumo") {
      const i = insumos.find(function(x){return x.id === c.refId;});
      if (!i) return;
      total += m2 * (parseFloat(i.costo) || 0);
    }
  });
  return Math.round(total);
}

  const precio = parseFloat(form.precio) || 0;
  const margenPct = precio > 0 && costo > 0 ? Math.round(((precio-costo)/precio)*100) : 0;
  const stockTotal = (form.temas||[]).reduce(function(s,t){return s + (parseInt(t.stock)||0);}, 0);

  function set(f, v) { setForm(Object.assign({},form,{[f]:v})); }

    setForm(Object.assign({},form,{temas:(form.temas||[]).concat([{id:uid(),nombre:"",stock:0}])}));

    setForm(Object.assign({},form,{temas:(form.temas||[]).map(function(t){return t.id===id?Object.assign({},t,{[campo]:valor}):t;})}));

    });

      id: form.id || ("st"+uid()),
      nombre: form.nombre,
      categoria: form.categoria,
      alto: parseFloat(form.alto),
      ancho: parseFloat(form.ancho),

    <div>

                  {temas.length === 0 ? <span style={{color:T.textFade}}>Sin temas</span> :

      {editando && <FormProductoStock inicial={editando} molduras={molduras} insumos={insumos} temas={temas} onGuardar={guardarEditado} onCancelar={() => setEditando(null)}/>}
    </div>
  );
