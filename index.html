// ── NOTAS POS — Historial y detalle de ventas POS ──────────────
function TabNotasPOS({ventasPOS}) {
  const [busq, setBusq] = useState("");
  const [filtroFecha, setFiltroFecha] = useState("hoy"); // hoy, semana, mes, todo, custom
  const [fechaCustom, setFechaCustom] = useState(HOY);
  const [filtroMetodo, setFiltroMetodo] = useState("todos"); // todos, Efectivo, Tarjeta, Transferencia
  const [notaSel, setNotaSel] = useState(null);

  // Calcular categoría de un item POS basándose en descripción
  function categoriaItem(it) {
    const desc = String(it.descripcion||it.nombre||"").toLowerCase();
    if (desc.includes("bastidor")) return "Bastidor";
    if (desc.includes("cartel")) return "Cartel";
    if (desc.includes("canva") || desc.includes("canvas")) return "Canva";
    if (desc.includes("espejo")) return "Espejo";
    if (desc.includes("marco pvc") || desc.includes("pvc")) return "Marco PVC";
    if (desc.includes("enmarca") || desc.includes("marco")) return "Enmarcado";
    return "Otros";
  }

  // Resumen de categorías de una nota
  function resumenCategorias(nota) {
    const categorias = {};
    (nota.items||[]).forEach(function(it){
      const cat = categoriaItem(it);
      categorias[cat] = (categorias[cat]||0) + 1;
    });
    return Object.entries(categorias).map(function([c,n]){return n+"× "+c;}).join(", ");
  }

  // Filtrar ventas
  const ventasFiltradas = useMemo(function(){
    let lista = ventasPOS.slice();
    
    // Filtro por fecha
    if (filtroFecha === "hoy") {
      lista = lista.filter(function(v){return v.fecha === HOY_ACTUAL();});
    } else if (filtroFecha === "semana") {
      const d = new Date(); d.setDate(d.getDate()-7);
      const limite = d.toISOString().slice(0,10);
      lista = lista.filter(function(v){return v.fecha >= limite;});
    } else if (filtroFecha === "mes") {
      const d = new Date(); d.setDate(d.getDate()-30);
      const limite = d.toISOString().slice(0,10);
      lista = lista.filter(function(v){return v.fecha >= limite;});
    } else if (filtroFecha === "custom") {
      lista = lista.filter(function(v){return v.fecha === fechaCustom;});
    }
    
    // Filtro por método
    if (filtroMetodo !== "todos") {
      lista = lista.filter(function(v){return (v.metodoPago||"") === filtroMetodo;});
    }
    
    // Filtro por búsqueda
    if (busq) {
      const bL = busq.toLowerCase();
      lista = lista.filter(function(v){
        return (v.cliente||"").toLowerCase().includes(bL) ||
               String(v.tel||"").includes(busq) ||
               String(v.folio||"").includes(busq);
      });
    }
    
    // Ordenar descendente por folio (más reciente arriba)
    return lista.sort(function(a,b){
      const fa = parseInt(String(a.folio||"").replace(/\D/g,""))||0;
      const fb = parseInt(String(b.folio||"").replace(/\D/g,""))||0;
      return fb - fa;
    });
  }, [ventasPOS, filtroFecha, fechaCustom, filtroMetodo, busq]);

  // Métricas del filtro actual
  const totalVentas = ventasFiltradas.reduce(function(s,v){return s + (parseFloat(v.anticipo)||0);},0);
  const cantidadVentas = ventasFiltradas.length;
  const ticketPromedio = cantidadVentas > 0 ? totalVentas / cantidadVentas : 0;
  
  // Desglose por método de pago
  const porMetodo = {};
  ventasFiltradas.forEach(function(v){
    const m = v.metodoPago || "—";
    porMetodo[m] = (porMetodo[m] || 0) + (parseFloat(v.anticipo)||0);
  });

  // Desglose por categoría
  const porCategoria = {};
  ventasFiltradas.forEach(function(v){
    (v.items||[]).forEach(function(it){
      const cat = categoriaItem(it);
      porCategoria[cat] = (porCategoria[cat]||0) + (parseFloat(it.precio)||0);
    });
  });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:FONT,fontSize:18,fontWeight:700,color:T.text}}>🧾 Historial de Notas POS</div>
          <div style={{fontFamily:FS,fontSize:11,color:T.textFade,marginTop:2}}>{cantidadVentas} venta{cantidadVentas!==1?"s":""} · Total {fmt(totalVentas)} · Ticket promedio {fmt(ticketPromedio)}</div>
        </div>
      </div>

      {/* MÉTRICAS RÁPIDAS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Total ventas</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:FONT,color:T.green,marginTop:3}}>{fmt(totalVentas)}</div>
        </Card>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Cant. notas</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:FONT,color:T.text,marginTop:3}}>{cantidadVentas}</div>
        </Card>
        <Card style={{padding:"12px 14px"}}>
          <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Ticket promedio</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:FONT,color:T.amber,marginTop:3}}>{fmt(ticketPromedio)}</div>
        </Card>
        {Object.keys(porMetodo).length > 0 && Object.entries(porMetodo).slice(0,3).map(function([m,t]){
          return (
            <Card key={m} style={{padding:"12px 14px"}}>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>{m}</div>
              <div style={{fontSize:18,fontWeight:700,fontFamily:FONT,color:T.textSub,marginTop:3}}>{fmt(t)}</div>
            </Card>
          );
        })}
      </div>

      {/* DESGLOSE POR CATEGORÍA */}
      {Object.keys(porCategoria).length > 0 && (
        <Card style={{padding:14,marginBottom:14}}>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,color:T.text,marginBottom:10}}>📊 Desglose por categoría</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
            {Object.entries(porCategoria).sort(function(a,b){return b[1]-a[1];}).map(function([c,t]){
              const pct = totalVentas > 0 ? (t/totalVentas*100).toFixed(0) : 0;
              return (
                <div key={c} style={{padding:"8px 10px",background:T.bgDark,borderRadius:6}}>
                  <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase"}}>{c}</div>
                  <div style={{fontSize:14,fontWeight:700,fontFamily:FONT,color:T.text,marginTop:2}}>{fmt(t)}</div>
                  <div style={{fontSize:9,color:T.textSub,fontFamily:FS}}>{pct}% del total</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* FILTROS */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,overflow:"hidden"}}>
          {[{id:"hoy",l:"Hoy"},{id:"semana",l:"7 días"},{id:"mes",l:"30 días"},{id:"todo",l:"Todo"},{id:"custom",l:"Fecha"}].map(function(f){
            return (
              <button key={f.id} onClick={() => setFiltroFecha(f.id)} style={{background:filtroFecha===f.id?T.bgDark:"transparent",color:filtroFecha===f.id?T.text:T.textFade,border:"none",padding:"6px 12px",cursor:"pointer",fontFamily:FS,fontSize:11,fontWeight:filtroFecha===f.id?700:400}}>{f.l}</button>
            );
          })}
        </div>
        {filtroFecha === "custom" && (
          <input type="date" value={fechaCustom} onChange={e => setFechaCustom(e.target.value)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"6px 10px",fontFamily:FS,fontSize:11,outline:"none"}}/>
        )}
        <select value={filtroMetodo} onChange={e => setFiltroMetodo(e.target.value)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"6px 10px",fontFamily:FS,fontSize:11,outline:"none",cursor:"pointer"}}>
          <option value="todos">Todos los métodos</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="Transferencia">Transferencia</option>
        </select>
        <input value={busq} onChange={e => setBusq(e.target.value)} placeholder="🔍 Buscar por cliente, teléfono o folio..." style={{flex:1,minWidth:200,background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"7px 12px",fontFamily:FS,fontSize:12,outline:"none"}}/>
      </div>

      {/* TABLA DE NOTAS */}
      <Card style={{padding:0,overflow:"hidden"}}>
        {ventasFiltradas.length === 0 ? (
          <div style={{padding:30,textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:13}}>
            No hay ventas POS con los filtros actuales
          </div>
        ) : (
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:FS,fontSize:12}}>
            <thead>
              <tr style={{background:T.bgDark,borderBottom:"2px solid "+T.border}}>
                <th style={{padding:"10px 12px",textAlign:"left",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>FOLIO</th>
                <th style={{padding:"10px 12px",textAlign:"left",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>FECHA</th>
                <th style={{padding:"10px 12px",textAlign:"left",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>CLIENTE</th>
                <th style={{padding:"10px 12px",textAlign:"left",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>RESUMEN</th>
                <th style={{padding:"10px 12px",textAlign:"left",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>MÉTODO</th>
                <th style={{padding:"10px 12px",textAlign:"right",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>TOTAL</th>
                <th style={{padding:"10px 12px",textAlign:"center",color:T.textFade,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>VER</th>
              </tr>
            </thead>
            <tbody>
              {ventasFiltradas.map(function(v){
                const cantItems = (v.items||[]).length;
                return (
                  <tr key={v.id||v.folio} onClick={() => setNotaSel(v)} style={{borderBottom:"1px solid "+T.border,cursor:"pointer",transition:"background .1s"}} onMouseEnter={e=>{e.currentTarget.style.background=T.bgDark;}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}>
                    <td style={{padding:"9px 12px",fontWeight:600,color:T.text}}>#{v.folio}</td>
                    <td style={{padding:"9px 12px",color:T.textSub,fontSize:11}}>{fmtD(v.fecha)}</td>
                    <td style={{padding:"9px 12px",color:T.text}}>{v.cliente||"—"}</td>
                    <td style={{padding:"9px 12px",color:T.textSub,fontSize:11}}>{resumenCategorias(v) || cantItems+" item"+(cantItems!==1?"s":"")}</td>
                    <td style={{padding:"9px 12px"}}>
                      <span style={{fontSize:10,padding:"2px 8px",borderRadius:6,background:T.bgDark,color:T.textSub,fontWeight:600}}>{v.metodoPago||"—"}</span>
                    </td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontWeight:700,color:T.green}}>{fmt(v.anticipo)}</td>
                    <td style={{padding:"9px 12px",textAlign:"center",color:T.amber,fontSize:14}}>👁️</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>

      {/* MODAL DETALLE */}
      {notaSel && <ModalDetalleVentaPOS venta={notaSel} onClose={() => setNotaSel(null)} categoriaItem={categoriaItem}/>}
    </div>
  );
}

function ModalDetalleVentaPOS({venta, onClose, categoriaItem}) {
  const total = (venta.items||[]).reduce(function(s,it){return s + (parseFloat(it.precio)||0);},0);
  // Agrupar items por categoría
  const grupos = {};
  (venta.items||[]).forEach(function(it){
    const cat = categoriaItem(it);
    if (!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(it);
  });

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
      <div onClick={e => e.stopPropagation()} style={{background:T.bg,borderRadius:12,maxWidth:560,width:"100%",maxHeight:"90vh",overflowY:"auto",padding:0}}>
        {/* HEADER */}
        <div style={{padding:"18px 22px",background:T.bgDark,borderBottom:"1px solid "+T.border,borderRadius:"12px 12px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",gap:10}}>
            <div>
              <div style={{fontSize:11,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.8}}>Nota POS</div>
              <div style={{fontSize:24,fontWeight:700,fontFamily:FONT,color:T.text,marginTop:2}}>#{venta.folio}</div>
            </div>
            <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer",color:T.textFade,padding:0,lineHeight:1}}>×</button>
          </div>
        </div>

        {/* DATOS DEL CLIENTE */}
        <div style={{padding:"14px 22px",borderBottom:"1px solid "+T.border}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Cliente</div>
              <div style={{fontSize:14,fontWeight:600,fontFamily:FONT,color:T.text,marginTop:2}}>{venta.cliente||"—"}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Teléfono</div>
              <div style={{fontSize:13,color:T.textSub,fontFamily:FS,marginTop:2}}>{venta.tel||"—"}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Fecha</div>
              <div style={{fontSize:13,color:T.textSub,fontFamily:FS,marginTop:2}}>{fmtD(venta.fecha)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,textTransform:"uppercase",letterSpacing:0.5}}>Método de pago</div>
              <div style={{fontSize:13,color:T.textSub,fontFamily:FS,marginTop:2,fontWeight:600}}>{venta.metodoPago||"—"}</div>
            </div>
          </div>
        </div>

        {/* ITEMS POR CATEGORÍA */}
        <div style={{padding:"14px 22px"}}>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,color:T.text,marginBottom:10}}>📦 Productos vendidos</div>
          {Object.entries(grupos).map(function([cat, items]){
            const subtotalCat = items.reduce(function(s,it){return s + (parseFloat(it.precio)||0);},0);
            return (
              <div key={cat} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:T.bgDark,borderRadius:5,marginBottom:5}}>
                  <span style={{fontSize:11,fontWeight:700,fontFamily:FS,color:T.textSub,textTransform:"uppercase",letterSpacing:0.5}}>{cat} ({items.length})</span>
                  <span style={{fontSize:12,fontWeight:700,fontFamily:FONT,color:T.text}}>{fmt(subtotalCat)}</span>
                </div>
                {items.map(function(it, idx){
                  return (
                    <div key={idx} style={{padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"start",gap:10,fontSize:12,fontFamily:FS}}>
                      <div style={{flex:1,color:T.text}}>
                        <div style={{fontWeight:500}}>{it.descripcion||it.nombre||"Item"}</div>
                        {it.medida && <div style={{fontSize:10,color:T.textFade,marginTop:1}}>{it.medida}</div>}
                      </div>
                      <div style={{color:T.textSub,fontWeight:600}}>{fmt(it.precio)}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* TOTAL */}
        <div style={{padding:"14px 22px",background:T.bgDark,borderTop:"2px solid "+T.border,borderRadius:"0 0 12px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:14,fontFamily:FONT,fontWeight:700,color:T.text}}>TOTAL COBRADO</div>
            <div style={{fontSize:24,fontWeight:700,fontFamily:FONT,color:T.green}}>{fmt(venta.anticipo||total)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── BASES DE DATOS ────────────────────────────────────────────
function TabBases({insumos, setInsumos, molduras, setMolduras, stock, setStock, temas, setTemas}) {
  const [sub, setSub] = useState("stock");
  const IS = {background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 7px",color:T.text,fontFamily:FS,fontSize:12,outline:"none",width:"100%"};

  function updMol(id,f,v) {
    setMolduras(molduras.map(function(x) {
      if (x.id !== id) return x;
      const nx = Object.assign({},x);
      if (f === "nombre") {
        nx.nombre = v;
      } else if (f === "margen") {
        // v llega como porcentaje (ej: 53), guardamos como decimal (0.53)
        const pct = Math.min(99, Math.max(1, parseFloat(v)||0));
        nx.margen = pct / 100;
        nx.precio_ml = nx.costo_ml > 0 ? Math.round(nx.costo_ml / (1 - nx.margen)) : 0;
      } else if (f === "costo_ml") {
        nx.costo_ml = parseFloat(v)||0;
        nx.precio_ml = nx.margen > 0 ? Math.round(nx.costo_ml / (1 - nx.margen)) : nx.costo_ml;
      } else {
        nx[f] = parseFloat(v)||0;
      }
      return nx;
    }));
  }
  function updIns(id,f,v) {
    setInsumos(insumos.map(function(x) {
      if (x.id !== id) return x;
      const nx = Object.assign({},x);
      if (f === "nombre" || f === "cat") {
        nx[f] = v;
      } else if (f === "margen") {
        // v llega como porcentaje (ej: 40), guardamos como decimal (0.40)
        const pct = Math.min(99, Math.max(1, parseFloat(v)||0));
        nx.margen = pct / 100;
        nx.precio = nx.costo > 0 ? Math.round(nx.costo / (1 - nx.margen)) : 0;
      } else if (f === "costo") {
        nx.costo = parseFloat(v)||0;
        nx.precio = nx.margen > 0 ? Math.round(nx.costo / (1 - nx.margen)) : nx.costo;
      } else {
        nx[f] = parseFloat(v)||0;
      }
      return nx;
    }));
  }
  function updSt(id,f,v) {
    const strFields = ["nombre","tema","categoria","medidas"];
    setStock(stock.map(function(x) {
      if (x.id !== id) return x;
      const nx = Object.assign({},x);
      nx[f] = strFields.indexOf(f)>=0 ? v : (parseFloat(v)||0);
      return nx;
    }));
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Bases de Datos</div>
        <div style={{display:"flex",border:"1px solid "+T.border,borderRadius:7,overflow:"hidden"}}>
          {[["stock","Stock"],["molduras","Molduras"],["insumos","Insumos"],["temas","Temas"]].map(function(item) {
            return <button key={item[0]} onClick={() => setSub(item[0])} style={{background:sub===item[0]?T.bgDark:"transparent",color:sub===item[0]?T.text:T.textFade,border:"none",padding:"7px 14px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:sub===item[0]?700:400}}>{item[1]}</button>;
          })}
        </div>
      </div>
      {sub==="stock" && <StockAgrupado stock={stock} setStock={setStock} IS={IS} updSt={updSt} molduras={molduras} insumos={insumos} temas={temas}/>}
      {sub==="molduras" && (
        <div style={{overflowX:"auto"}}>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
            <button onClick={function(){
              const nuevo = {id:"m"+uid(),nombre:"Nueva moldura",costo_ml:0,margen:0.50,precio_ml:0,desperdicio:15};
              setMolduras(function(prev){ return [nuevo].concat(Array.isArray(prev)?prev:[]); });
            }} style={{background:T.header,color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:600}}>+ Agregar moldura</button>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:FS,fontSize:12}}>
            <thead><tr style={{background:T.bgDark}}>{["Nombre","Costo/ML ($)","Margen %","Precio/ML","Desperdicio cm",""].map(h => <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:T.textSub,borderBottom:"1px solid "+T.border,fontSize:11}}>{h}</th>)}</tr></thead>
            <tbody>
              {molduras.length === 0 && (
                <tr><td colSpan={6} style={{padding:"20px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:12}}>Sin molduras. Haz clic en <strong>+ Agregar moldura</strong> para comenzar.</td></tr>
              )}
              {molduras.map(function(m) {
                const margenPct = Math.round((m.margen||0)*100);
                return (
                  <tr key={m.id} style={{borderBottom:"1px solid "+T.border}}>
                    <td style={{padding:"6px 8px"}}><input value={m.nombre} onChange={e => updMol(m.id,"nombre",e.target.value)} style={IS}/></td>
                    <td style={{padding:"6px 8px"}}><input type="number" value={m.costo_ml} onChange={e => updMol(m.id,"costo_ml",e.target.value)} style={Object.assign({},IS,{color:T.orange})}/></td>
                    <td style={{padding:"6px 8px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <input key={m.id+"-mg-"+margenPct} type="number" defaultValue={margenPct} onBlur={function(e){const raw=parseInt(e.target.value);const v=isNaN(raw)?1:Math.min(99,Math.max(1,raw));e.target.value=v;updMol(m.id,"margen",v);}} style={Object.assign({},IS,{color:T.blue,width:64,textAlign:"center",fontWeight:600})}/>
                        <span style={{color:T.textFade,fontSize:12}}>%</span>
                      </div>
                    </td>
                    <td style={{padding:"6px 8px"}}><div style={{padding:"5px 10px",background:T.bgDark,borderRadius:5,color:T.amber,fontWeight:700,fontSize:13,textAlign:"right"}}>{fmt(m.precio_ml)}</div></td>
                    <td style={{padding:"6px 8px"}}><input type="number" value={m.desperdicio} onChange={e => updMol(m.id,"desperdicio",e.target.value)} style={IS}/></td>
                    <td style={{padding:"6px 8px"}}><button onClick={() => { if(confirmar("¿Eliminar moldura \""+m.nombre+"\"?")) setMolduras(molduras.filter(x => x.id!==m.id)); }} style={{background:T.redBg,color:T.red,border:"1px solid "+T.red+"30",borderRadius:5,padding:"4px 8px",cursor:"pointer",fontSize:11}}>Eliminar</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>

// ── INVENTARIO ────────────────────────────────────────────────
function TabInventario({stock, setStock}) {
  const [expandidos, setExpandidos] = useState({});
  const [busqueda, setBusqueda] = useState("");

  function toggle(id) {
    setExpandidos(function(ex){const nx=Object.assign({},ex); nx[id]=!nx[id]; return nx;});
  }
  function ajustarStockTema(prodId, temaId, delta) {
    setStock(stock.map(function(p) {
      if (p.id !== prodId) return p;
      const temas = (p.temas||[]).map(function(t) {
        if (t.id !== temaId) return t;
        return Object.assign({},t,{stock:Math.max(0,(parseInt(t.stock)||0)+delta)});
      });
      return Object.assign({},p,{temas:temas});
    }));
  }
  function setStockTema(prodId, temaId, valor) {
    setStock(stock.map(function(p) {
      if (p.id !== prodId) return p;
      const temas = (p.temas||[]).map(function(t) {
        if (t.id !== temaId) return t;
        return Object.assign({},t,{stock:Math.max(0,parseInt(valor)||0)});
      });
      return Object.assign({},p,{temas:temas});
    }));
  }

  const lista = stock.filter(function(p) {
    if (!busqueda) return true;
    return (p.nombre||"").toLowerCase().indexOf(busqueda.toLowerCase()) >= 0;
  });

  // Resumen
  const totalProductos = stock.length;
  const totalPzas = stock.reduce(function(s,p){return s+(p.temas||[]).reduce(function(ss,t){return ss+(parseInt(t.stock)||0);},0);},0);
  const valorTotal = stock.reduce(function(s,p){
    const stk = (p.temas||[]).reduce(function(ss,t){return ss+(parseInt(t.stock)||0);},0);
    return s + stk*(parseFloat(p.precio)||0);
  },0);
  const bajoStock = stock.filter(function(p){
    const stk = (p.temas||[]).reduce(function(ss,t){return ss+(parseInt(t.stock)||0);},0);
    return stk <= (parseInt(p.stockMin)||0);
  }).length;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Inventario</div>
        <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>Para crear/editar productos: <strong>Bases de Datos → Stock</strong></div>
      </div>

      {/* Resumen */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:10,marginBottom:18}}>
        <Card>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,marginBottom:4}}>Productos</div>
          <div style={{color:T.amber,fontWeight:700,fontSize:22,fontFamily:FONT}}>{totalProductos}</div>
        </Card>
        <Card>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,marginBottom:4}}>Piezas totales</div>
          <div style={{color:T.green,fontWeight:700,fontSize:22,fontFamily:FONT}}>{totalPzas}</div>
        </Card>
        <Card>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,marginBottom:4}}>Valor inventario</div>
          <div style={{color:T.blue,fontWeight:700,fontSize:18,fontFamily:FONT}}>{fmt(valorTotal)}</div>
        </Card>
        <Card>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,marginBottom:4}}>Bajo stock</div>
          <div style={{color:bajoStock>0?T.red:T.green,fontWeight:700,fontSize:22,fontFamily:FONT}}>{bajoStock}</div>
        </Card>
      </div>

      {/* Búsqueda */}
      <div style={{marginBottom:12}}>
        <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="🔍 Buscar producto..." style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 12px",color:T.text,fontFamily:FS,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
      </div>

      {lista.length === 0 ? (
        <Card style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{color:T.textFade,fontSize:13,fontFamily:FS,lineHeight:1.6}}>
            {stock.length === 0 ? "No hay productos. Crea productos en Bases de Datos → Stock." : "Sin resultados para tu búsqueda."}
          </div>
        </Card>
      ) : (
        <div>
          {lista.map(function(p) {
            const temas = p.temas || [];
            const stockTotal = temas.reduce(function(s,t){return s+(parseInt(t.stock)||0);},0);
            const bajo = stockTotal <= (parseInt(p.stockMin)||0);
            const abierto = expandidos[p.id];
            return (
              <div key={p.id} style={{marginBottom:8,border:"1px solid "+(bajo?T.red+"40":T.border),borderRadius:9,overflow:"hidden",background:T.bgCard}}>
                <div onClick={()=>toggle(p.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",cursor:"pointer",userSelect:"none",background:abierto?T.bgDark:"transparent"}}>
                  <div style={{fontSize:14,color:T.textFade,width:14}}>{abierto?"▼":"▶"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:FONT,fontWeight:700,fontSize:14}}>{p.nombre}</div>
                    <div style={{fontSize:11,color:T.textFade,fontFamily:FS}}>{p.categoria||"—"} · {p.alto||"?"}x{p.ancho||"?"}cm · {temas.length} tema{temas.length!==1?"s":""}</div>
                  </div>
                  <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,color:T.amber}}>{fmt(p.precio)}</div>
                  <span style={{background:bajo?T.redBg:T.greenBg,color:bajo?T.red:T.green,border:"1px solid "+(bajo?T.red+"30":T.green+"30"),borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,fontFamily:FS}}>{stockTotal} pzas{bajo?" ⚠️":""}</span>
                </div>
                {abierto && (
                  <div style={{borderTop:"1px solid "+T.border,padding:"10px 14px",background:"#FAFAFA"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontFamily:FS,fontSize:12}}>
                      <thead><tr style={{background:T.bgDark}}>
                        {["Tema","Stock actual","Ajustar"].map(function(h){return <th key={h} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:T.textSub,fontSize:11}}>{h}</th>;})}
                      </tr></thead>
                      <tbody>
                        {temas.map(function(t) {
                          const stk = parseInt(t.stock)||0;
                          const min = parseInt(p.stockMin)||0;
                          const bajoT = stk <= min;
                          return (
                            <tr key={t.id} style={{borderBottom:"1px solid "+T.border}}>
                              <td style={{padding:"8px 10px",fontWeight:600}}>{t.nombre||"—"}</td>
                              <td style={{padding:"8px 10px"}}>
                                <input type="number" value={stk} onChange={e=>setStockTema(p.id,t.id,e.target.value)} style={{width:80,background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 8px",color:bajoT?T.red:T.green,fontFamily:FS,fontSize:13,fontWeight:700,outline:"none",textAlign:"center"}}/>
                                {bajoT && <span style={{marginLeft:8,fontSize:10,color:T.red,fontWeight:600}}>⚠️ bajo</span>}
                              </td>
                              <td style={{padding:"8px 10px"}}>
                                <div style={{display:"flex",gap:5}}>
                                  <button onClick={()=>ajustarStockTema(p.id,t.id,-1)} style={{background:T.redBg,border:"1px solid "+T.red+"30",borderRadius:5,width:28,height:28,cursor:"pointer",fontWeight:700,fontSize:16,color:T.red,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                                  <button onClick={()=>ajustarStockTema(p.id,t.id,1)} style={{background:T.greenBg,border:"1px solid "+T.green+"30",borderRadius:5,width:28,height:28,cursor:"pointer",fontWeight:700,fontSize:16,color:T.green,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <div style={{color:T.textFade,fontSize:10,fontFamily:FS,marginTop:8,fontStyle:"italic"}}>💡 Para agregar/quitar temas o cambiar la composición del producto, ve a Bases de Datos → Stock</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── CORTE DEL DIA ─────────────────────────────────────────────
function TabCorte({pedidos, ventasPOS, stock}) {
  const [fecha, setFecha] = useState(HOY);
  
  // PEDIDOS CREADOS HOY (capturados con esta fecha)
  const pedDia = pedidos.filter(p => p.estado!=="Bodega" && (p.fecha||"").slice(0,10)===fecha);
  
  // VENTAS POS DE HOY
  const posDia = ventasPOS.filter(v => (v.fecha||"").slice(0,10)===fecha);
  
  // PAGOS REGISTRADOS HOY (a cualquier pedido) — usa ultimoPago.fecha
  const todosPagosHoy = pedidos.filter(function(p){
    return p.ultimoPago && (p.ultimoPago.fecha||"").slice(0,10) === fecha && (parseFloat(p.ultimoPago.monto)||0) > 0;
  });
  // Pagos a pedidos viejos (creados antes de hoy) — se cuentan separados de pedDia
  const pagosAViejos = todosPagosHoy.filter(function(p){return (p.fecha||"").slice(0,10) !== fecha;});
  
  // Anticipos parciales y saldos cobrados hoy (a pedidos viejos)
  const anticiposHoy = pagosAViejos.filter(function(p){return p.ultimoPago.tipo === "anticipo";});
  const cobrosCXC = pagosAViejos.filter(function(p){return p.ultimoPago.tipo === "saldo";});
  const montoAnticiposHoy = anticiposHoy.reduce(function(s,p){return s + (parseFloat(p.ultimoPago.monto)||0);},0);
  const montoCobrosCXC = cobrosCXC.reduce(function(s,p){return s + (parseFloat(p.ultimoPago.monto)||0);},0);
  
  // SUMA POR MÉTODO DE PAGO (TODO el dinero entrado hoy)
  function montoPorMetodo(metodo) {
    let total = 0;
    // Anticipos de pedidos creados hoy con ese método
    pedDia.forEach(function(p){
      if ((p.metodoPago||"") === metodo) {
        total += parseFloat(p.anticipo) || 0;
      }
    });
    // POS de hoy con ese método (POS cobra el total)
    posDia.forEach(function(v){
      if ((v.metodoPago||"") === metodo) {
        total += totI(v.items);
      }
    });
    // Pagos a pedidos viejos con ese método
    pagosAViejos.forEach(function(p){
      if ((p.ultimoPago.metodo||"") === metodo) {
        total += parseFloat(p.ultimoPago.monto) || 0;
      }
    });
    return total;
  }
  
  const totalE = montoPorMetodo("Efectivo");
  const totalT = montoPorMetodo("Tarjeta");
  const totalTr = montoPorMetodo("Transferencia");
  const totalDia = totalE + totalT + totalTr;
  
  // Lista de todos los movimientos del día (para tabla "Ventas del día")
  const todas = pedDia.concat(posDia);
  
  // CXC actual (no del corte, sino general)
  const cxc = pedidos.filter(p => !["Entregado","Bodega"].includes(p.estado) && Math.round(saldoPedido(p)) > 0);
  const totalCXC = cxc.reduce(function(s,p){return s + saldoPedido(p);},0);

  // Alertas: ventas POS con productos vendidos sin stock o que ya no existen
  const stockIds = (stock||[]).map(function(s){return s.id;});
  const ventasNoStock = [];
  posDia.forEach(function(v){
    const items = Array.isArray(v.items) ? v.items : (function(){try{return JSON.parse(v.items)||[];}catch(e){return [];}})();
    items.forEach(function(it){
      if (it.sinStock) {
        ventasNoStock.push({folio:v.folio, cliente:v.cliente, item:it.nombre, tema:it.tema||"", motivo:"vendido sin stock"});
      } else if (it.stockId && stockIds.indexOf(it.stockId) < 0) {
        ventasNoStock.push({folio:v.folio, cliente:v.cliente, item:it.nombre, tema:it.tema||"", motivo:"producto eliminado del catálogo"});
      }
    });
  });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Corte del Dia</div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <input type="date" value={fecha} onChange={e => setFecha(e.target.value)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"7px 12px",color:T.text,fontFamily:FS,fontSize:13,outline:"none"}}/>
          <button onClick={function(){
            const win = window.open("","_blank","width=700,height=900");
            if(!win)return;
            win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Corte '+fecha+'</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Lucida Bright",Georgia,serif;padding:36px 44px;color:#1a1a1a;font-size:13px}.logo-box{border:2.5px solid #1a1a1a;padding:10px 36px;display:inline-block}.logo{font-size:26px;font-weight:700;letter-spacing:6px}h2{font-size:14px;margin:16px 0 8px;border-bottom:1.5px solid #1a1a1a;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin-bottom:14px}th{background:#f0f0f0;border:1px solid #ccc;padding:6px 8px;text-align:left;font-size:11px}td{border:1px solid #ddd;padding:5px 8px;font-size:12px}.tot{font-weight:700;background:#f5f5f5}.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.kbox{border:1.5px solid #ccc;padding:10px;text-align:center}.kbox .v{font-size:20px;font-weight:700;margin-top:4px}</style></head><body>'+
            '<div style="text-align:center;margin-bottom:18px"><div class="logo-box"><div class="logo">LA MARQUERIA</div></div></div>'+
            '<h2>CORTE DEL DIA — '+fmtD(fecha)+'</h2>'+
            '<div class="kpi">'+
            '<div class="kbox"><div>Efectivo</div><div class="v" style="color:#2E7D32">'+fmt(totalE)+'</div></div>'+
            '<div class="kbox"><div>Tarjeta</div><div class="v" style="color:#1565C0">'+fmt(totalT)+'</div></div>'+
            '<div class="kbox"><div>Transferencia</div><div class="v" style="color:#C8860A">'+fmt(totalTr)+'</div></div>'+
            '<div class="kbox"><div>Total del dia</div><div class="v">'+fmt(totalDia)+'</div></div>'+
            '</div>'+
            '<h2>VENTAS DEL DIA</h2>'+
            '<table><thead><tr><th>Folio</th><th>Cliente</th><th>Metodo</th><th style="text-align:right">Importe</th></tr></thead><tbody>'+
            todas.map(function(v){return '<tr><td>#'+v.folio+'</td><td>'+v.cliente+'</td><td>'+(v.metodoPago||"—")+'</td><td style="text-align:right">'+fmt(totI(v.items))+'</td></tr>';}).join("")+
            '<tr class="tot"><td colspan="3">TOTAL</td><td style="text-align:right">'+fmt(totalDia)+'</td></tr>'+
            '</tbody></table>'+
            '<h2>CUENTAS POR COBRAR</h2>'+
            '<table><thead><tr><th>Folio</th><th>Cliente</th><th>Estado</th><th style="text-align:right">Saldo</th></tr></thead><tbody>'+
            cxc.map(function(p){const s=totI(p.items)-(p.anticipo||0);return '<tr><td>#'+p.folio+'</td><td>'+p.cliente+'</td><td>'+p.estado+'</td><td style="text-align:right;color:#C62828">'+fmt(s)+'</td></tr>';}).join("")+
            '<tr class="tot"><td colspan="3">TOTAL CxC</td><td style="text-align:right;color:#C62828">'+fmt(totalCXC)+'</td></tr>'+
            '</tbody></table>'+
            '<div style="font-size:10px;color:#999;margin-top:20px;text-align:center">Jose Maria Morelos 745 Nte. · Culiacan · 667 160 1160</div>'+
            '</body></html>');
            win.document.close();
            setTimeout(function(){win.print();},400);
          }} style={{background:T.header,color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:600}}>Imprimir PDF</button>
        </div>
      </div>
      {ventasNoStock.length > 0 && (
        <div style={{background:"#FFEBEE",border:"1.5px solid "+T.red,borderRadius:9,padding:"12px 16px",marginBottom:14}}>

// ── CUENTAS POR COBRAR ────────────────────────────────────────
function TabCXC({pedidos, setPedidos}) {
  const [modalPago, setMP] = useState(null);
  const [nuevoPago, setNP] = useState("");
  const [nuevoPagoMet, setNPM] = useState("Efectivo");
  // Pedidos con saldo > 0 y no cancelados
  const pendientes = pedidos.filter(function(p){
    if (p.estado === "Bodega") return false;
    return Math.round(saldoPedido(p)) > 0;
  });
  // Ordenar: entregados primero (urgente cobrar), luego por fecha de entrega
  pendientes.sort(function(a,b){
    const aE = a.estado === "Entregado" ? 0 : 1;
    const bE = b.estado === "Entregado" ? 0 : 1;
    if (aE !== bE) return aE - bE;
    const aF = a.fechaEntrega || "9999-99-99";
    const bF = b.fechaEntrega || "9999-99-99";
    return aF.localeCompare(bF);
  });

  const totalPorCobrar = pendientes.reduce(function(s,p){return s+saldoPedido(p);},0);
  const entregadosCount = pendientes.filter(function(p){return p.estado==="Entregado";}).length;

  function aplicarPago() {
    const mp = normalizarPedido(modalPago);
    const tot2 = calcularTotal(mp);
    const pago = parseFloat(nuevoPago)||0;
    if (!pago) return;
    const nuevoAnticipo = Math.min(tot2, (parseFloat(mp.anticipo)||0) + pago);
    const updates = {anticipo:nuevoAnticipo,metodoPago:nuevoPagoMet};
    updates.ultimoPago = {
      fecha: HOY_ACTUAL(),
      monto: pago,
      tipo: nuevoAnticipo >= tot2 ? "saldo" : "anticipo",
      metodo: nuevoPagoMet,
        hora: HORA_ACTUAL()
    };
    if (nuevoAnticipo >= tot2 && tot2 > 0) updates.fechaSaldo = HOY;
    else updates.fechaAnticipo = HOY;
    const updated = Object.assign({},mp,updates);
    
    // PROTECCIÓN: verificar que el folio existe
    if (!modalPago.folio) {
      alert("❌ ERROR: La nota no tiene folio. No se puede guardar el pago.");
      return;
    }
    
    // Buscar el índice por folio o id
    const existeIdx = pedidos.findIndex(function(p){
      return String(p.folio) === String(modalPago.folio) || p.id === modalPago.id;
    });
    
    if (existeIdx < 0) {
      alert("❌ ERROR: No encontré la nota #" + modalPago.folio + " en la base de datos. El pago NO se guardó.");
      return;
    }
    
    // Actualizar en el índice exacto
    const nuevosPedidos = pedidos.slice();
    nuevosPedidos[existeIdx] = updated;
    setPedidos(nuevosPedidos);
    setMP(null);
    setNP("");
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Cuentas por Cobrar</div>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS,marginTop:2}}>
            {pendientes.length} pedido{pendientes.length!==1?"s":""} con saldo pendiente · {entregadosCount} ya entregado{entregadosCount!==1?"s":""}
          </div>
        </div>
        <div style={{background:T.orangeBg,border:"1px solid "+T.orange+"40",borderRadius:8,padding:"7px 14px"}}>
          <div style={{fontSize:10,color:T.textFade,fontFamily:FS}}>Total por cobrar</div>
          <div style={{color:T.orange,fontFamily:FONT,fontWeight:700,fontSize:18}}>{fmt(totalPorCobrar)}</div>
        </div>
      </div>

      {pendientes.length === 0 ? (
        <Card style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{color:T.green,fontFamily:FONT,fontWeight:700,fontSize:18,marginBottom:6}}>✓ Todo cobrado</div>
          <div style={{color:T.textFade,fontSize:13,fontFamily:FS}}>No hay pedidos con saldo pendiente.</div>
        </Card>
      ) : (
        <div>
          {pendientes.map(function(p) {
            const tot = calcularTotal(p);
            const saldo = saldoPedido(p);
            const dias = dRest(p.fechaEntrega);
            const entregado = p.estado === "Entregado";
            const anticipoNum = parseFloat(p.anticipo)||0;
            const pct = tot > 0 ? (anticipoNum/tot)*100 : 0;
            return (
              <Card key={p.id} style={{marginBottom:9,borderLeft:"4px solid "+(entregado?T.red:T.orange)}}>
                <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                  <div style={{flex:2,minWidth:180}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <span style={{fontFamily:FONT,fontWeight:700,fontSize:14}}>{p.cliente}</span>
                      {entregado ? (
                        <span style={{background:T.red,color:"#fff",borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:700,fontFamily:FS}}>ENTREGADO · DEBE</span>
                      ) : (
                        <span style={{background:T.orangeBg,color:T.orange,border:"1px solid "+T.orange+"40",borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:700,fontFamily:FS}}>{p.estado}</span>
                      )}
                    </div>
                    <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>#{p.folio} · {p.tel||"sin teléfono"} · Entrega: {fmtD(p.fechaEntrega)}{dias!==null && !entregado && " · "+(dias<0?Math.abs(dias)+"d tarde":dias===0?"Hoy":dias+"d")}</div>
                  </div>
                  <div style={{flex:1,minWidth:140}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:3}}>
                      <span>Pagado: {fmt(anticipoNum)}</span>
                      <span>{pct.toFixed(0)}%</span>
                    </div>
                    <div style={{background:T.bgDark,borderRadius:4,height:6,overflow:"hidden"}}>
                      <div style={{width:pct+"%",height:"100%",background:T.green,borderRadius:4}}/>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:10,color:T.textFade,fontFamily:FS}}>Total {fmt(tot)}</div>
                    <div style={{color:T.orange,fontWeight:700,fontFamily:FONT,fontSize:18}}>{fmt(saldo)}</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <Btn size="sm" onClick={() => { setMP(p); setNP(String(saldo)); setNPM("Efectivo"); }}>Registrar pago</Btn>
                    {p.tel && <a href={"https://wa.me/52"+String(p.tel||"").replace(/\D/g,"")+"?text="+encodeURIComponent("Hola "+p.cliente+", le recordamos que tiene un saldo pendiente de "+fmt(saldo)+" en su nota #"+p.folio+" en La Marquería. Gracias!")} target="_blank" rel="noreferrer" style={{display:"inline-block",background:"#25D366",color:"#fff",borderRadius:6,padding:"6px 12px",textDecoration:"none",fontWeight:600,fontSize:11,fontFamily:FS}}>📱 Recordar</a>}
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {modalPago && <ModalPago
        pedido={modalPago}
        nuevoPago={nuevoPago}
        setNP={setNP}
        nuevoPagoMet={nuevoPagoMet}
        setNPM={setNPM}
        onClose={() => { setMP(null); setNP(""); }}
        onAplicar={aplicarPago}
      />}
    </div>
  );
}

// ── FLUJO DE TRABAJO ──────────────────────────────────────────
function clasificarItem(item, molduras, insumos, stock) {
  if (!item) return null;
  const n = ((item.nombre || "") + "").toLowerCase().trim();
  if (!n) return null;
  // Moldura → Carpinteria
  if ((molduras||[]).some(function(m){return m && m.nombre && (m.nombre+"").toLowerCase().trim() === n;})) return "carpinteria";
  // Insumo por categoria
  const ins = (insumos||[]).find(function(i){return i && i.nombre && (i.nombre+"").toLowerCase().trim() === n;});
  if (ins) {
    if (ins.cat === "impresion") return "impresion";
    if (ins.cat === "base") return "carpinteria";
    if (ins.cat === "vidrio" || ins.cat === "maria_luisa" || ins.cat === "armado") return "detallado";
  }
  // Stock por categoria
  const st = (stock||[]).find(function(s){return s && s.nombre && (s.nombre+"").toLowerCase().trim() === n;});
  if (st) {
    const c = ((st.categoria || "") + "").toLowerCase();
    if (c === "cartel" || c === "espejo" || c === "canva") return "detallado";
    if (c === "bastidor" || c === "marco pvc") return "carpinteria";
  }
  // Fallback: buscar palabras clave en el nombre
  if (n.indexOf("armado") >= 0) return "detallado";
  if (n.indexOf("moldura") >= 0 || n.indexOf("mdf") >= 0 || n.indexOf("bastidor") >= 0 || n.indexOf("marco") >= 0 || n.indexOf("pvc") >= 0) return "carpinteria";
  if (n.indexOf("vinil") >= 0 || n.indexOf("canva") >= 0 || n.indexOf("cartel") >= 0 || n.indexOf("impres") >= 0) {
    if (n.indexOf("cartel") >= 0 && !ins) return "detallado";
    return "impresion";
  }
  if (n.indexOf("vidrio") >= 0 || n.indexOf("espejo") >= 0 || n.indexOf("maria") >= 0 || n.indexOf("paspart") >= 0) return "detallado";
  return "detallado";
}

function obtenerTareasPedido(pedido, molduras, insumos, stock) {
  const out = {carpinteria:[], impresion:[], detallado:[]};
  const pn = normalizarPedido(pedido);
  (pn.items || []).forEach(function(it, i) {
    if (!it) return;
    const stage = clasificarItem(it, molduras, insumos, stock);
    if (stage && out[stage]) {
      out[stage].push({id: stage.slice(0,4)+"_"+i, item: it, itemIndex: i, productoId: it.productoId || "default"});
    }
  });
  return out;
}

function todasTareasCompletas(pedido, molduras, insumos, stock) {
  const todas = obtenerTareasPedido(pedido, molduras, insumos, stock);
  const all = todas.carpinteria.concat(todas.impresion, todas.detallado);
  if (all.length === 0) return false;
  const pn = normalizarPedido(pedido);
  const done = pn.tareas || {};
  return all.every(function(t){ return done[t.id] === true; });
}

function TabFlujo({pedidos, setPedidos, molduras, insumos, stock}) {
  const enProduccion = pedidos.filter(function(p){ return p.estado === "Produccion"; });
  const stages = [
    {id:"carpinteria", label:"Carpintería", color:"#8B6914", bg:"#FFF8E0", border:"#E0C080"},
    {id:"impresion",   label:"Impresión",   color:"#C8860A", bg:"#FFF3E0", border:"#F0B060"},
    {id:"detallado",   label:"Detallado",   color:"#6A1B9A", bg:"#F3E5F5", border:"#C090D0"}
  ];

  function toggleTarea(pedidoId, tareaKey) {
    setPedidos(pedidos.map(function(p) {
      if (p.id !== pedidoId) return p;
      const pn = normalizarPedido(p);
      const tareas = Object.assign({}, pn.tareas || {});
      tareas[tareaKey] = !tareas[tareaKey];
      const actualizado = Object.assign({}, pn, {tareas: tareas});
      // Auto-mover a Listo si todas las tareas completas
      if (todasTareasCompletas(actualizado, molduras, insumos, stock)) {
        return Object.assign(actualizado, {estado: "Listo"});
      }
      return actualizado;
    }));
  }

  // Estado: qué pedido está abierto en el modal (solo guardamos el id para leer siempre la versión viva)
  const [modalPedidoId, setModalPedidoId] = useState(null);

  // Calcular progreso general por pedido
  const resumenPedidos = enProduccion.map(function(p) {
    const pn = normalizarPedido(p);
    const t = obtenerTareasPedido(pn, molduras, insumos, stock);
    const all = t.carpinteria.concat(t.impresion, t.detallado);
    const done = pn.tareas || {};
    const completas = all.filter(function(x){return done[x.id];}).length;
    return {pedido:pn, tareas:t, total:all.length, completas:completas};
  });

  // Agrupar por urgencia de entrega
  const cubetas = [
    {id:"hoy",      label:"Hoy / Atrasado", color:"#D32F2F", bg:"#FFEBEE", border:"#E0A0A0", test:function(d){return d!==null && d<=1;}},
    {id:"proximos", label:"Próximos (2-3 días)", color:"#F57C00", bg:"#FFF3E0", border:"#F0C080", test:function(d){return d!==null && d>1 && d<=3;}},
    {id:"despues",  label:"Después (4+ días)", color:"#388E3C", bg:"#E8F5E9", border:"#A0C0A0", test:function(d){return d===null || d>3;}}
  ];
  const porCubeta = cubetas.map(function(cb){
    const items = resumenPedidos
      .filter(function(r){ return cb.test(diasParaEntrega(r.pedido.fechaEntrega)); })
      .sort(function(a,b){
        const da = diasParaEntrega(a.pedido.fechaEntrega);
        const db = diasParaEntrega(b.pedido.fechaEntrega);
        const va = da===null ? 9999 : da;
        const vb = db===null ? 9999 : db;
        return va - vb;
      });
    return {cubeta:cb, items:items};
  });

  // Pedido vivo para el modal (leído de la lista actual, no de un snapshot)
  const resumenModal = modalPedidoId ? resumenPedidos.find(function(r){return r.pedido.id === modalPedidoId;}) : null;

            {enProduccion.length} pedido{enProduccion.length!==1?"s":""} en producción · Toca una tarjeta para ver y palomear sus tareas
          </div>
        </div>
      </div>

      {enProduccion.length === 0 ? (
        <Card style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{color:T.textFade,fontSize:14,fontFamily:FS,lineHeight:1.6}}>
            No hay pedidos en producción.<br/>
            Mueve pedidos a la columna <strong>Producción</strong> en la pestaña Pedidos para verlos aquí.
          </div>
        </Card>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,alignItems:"start"}}>

            const cb = col.cubeta;
            return (

                  <div style={{color:T.textFade,fontSize:13,fontFamily:FS,textAlign:"center",padding:"24px 0"}}>Este pedido no tiene tareas de producción.</div>

                  const tareasEtapa = resumenModal.tareas[stage.id];
                  if (tareasEtapa.length === 0) return null;

                        <div style={{flex:1,fontFamily:FONT,fontWeight:700,fontSize:14,color:stage.color}}>{stage.label}</div>

                      </div>
                      {ordenIds.map(function(pid, gi){
                        const meta = productosMeta.find(function(m){return m.id === pid;});

                            {stage.id === "impresion" && meta && meta.imagen && (
                              <div style={{marginBottom:8}}>
                                {meta.fileId ? (
                                  <a href={'https://drive.google.com/uc?export=download&id='+meta.fileId} download={"pedido_"+pedido.folio+"_"+((meta.titulo||"img").replace(/[^a-z0-9]/gi,"_"))+".jpg"} target="_blank" rel="noreferrer" style={{display:"block"}}>
                                    <img src={meta.imagen} alt="ref" style={{width:"100%",maxHeight:200,objectFit:"contain",background:"#fff",borderRadius:6,border:"1px solid "+stage.border,cursor:"pointer"}}/>
                                  </a>
                                ) : (
                                  <img src={meta.imagen} alt="ref" style={{width:"100%",maxHeight:200,objectFit:"contain",background:"#fff",borderRadius:6,border:"1px solid "+stage.border}}/>

                                {meta.fileId && <div style={{fontSize:9,color:T.textFade,fontFamily:FS,marginTop:3,textAlign:"center"}}>📥 Click para descargar / abrir</div>}
                              </div>
                            )}
                            {notaProd && <div style={{fontSize:11,color:T.amber,fontFamily:FS,fontStyle:"italic",marginBottom:6,padding:"4px 8px",background:"#FFF8E0",borderRadius:5}}>📝 {notaProd}</div>}
                            {grupos[pid].map(function(t){
                              const checked = !!done[t.id];
                              return (
                                <label key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"7px 8px",cursor:"pointer",borderRadius:6,background:checked?"rgba(0,0,0,0.03)":T.bgCard,border:"1px solid "+T.border,marginBottom:5}}>
                                  <input
                                    type="checkbox"
                                    checked={checked}
                                    onChange={function(){ toggleTarea(pedido.id, t.id); }}
                                    style={{width:18,height:18,marginTop:1,cursor:"pointer",accentColor:stage.color,flexShrink:0}}
                                  />
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontFamily:FS,fontSize:13,fontWeight:600,color:checked?T.textFade:T.text,textDecoration:checked?"line-through":"none"}}>{t.item.nombre}</div>
                                    {t.item.descripcion && <div style={{fontSize:11,color:T.textFade,fontFamily:FS,textDecoration:checked?"line-through":"none"}}>{t.item.descripcion}</div>}
                                  </div>
                                </label>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                {resumenModal.total > 0 && resumenModal.completas === resumenModal.total && (
                  <div style={{background:T.greenBg,border:"1px solid "+T.green+"40",borderRadius:8,padding:"10px 14px",textAlign:"center",fontFamily:FS,fontSize:13,color:T.green,fontWeight:700}}>
                    ✓ Todas las tareas completas — el pedido pasó a Listo
                  </div>
                )}
              </div>
            );
          })()}
        </Modal>
      )}
    </div>
  );
}
