<script type="text/babel">
const { useState, useMemo } = React;

// ── TEMA ──────────────────────────────────────────────────────
const T = {
  bg:"#F5F0E8", bgCard:"#FFFFFF", bgDark:"#F0EAE0", header:"#1A1A1A",
  border:"#D4C9B0", text:"#1A1A1A", textSub:"#6B5E4E", textFade:"#A09080",
  amber:"#C8860A", green:"#2E7D32", greenBg:"#E8F5E9", red:"#C62828",
  redBg:"#FFEBEE", blue:"#1565C0", blueBg:"#E3F2FD", orange:"#E65100", orangeBg:"#FFF3E0"
};
const FONT = "'Inter','Segoe UI',system-ui,sans-serif";
const SERIF = "'Lucida Bright','Lucida Serif',Georgia,serif";
const FS = "'Inter','Segoe UI',system-ui,sans-serif";

// fechaHoyLocal: devuelve YYYY-MM-DD en hora LOCAL del dispositivo.
// Antes se usaba new Date().toISOString() que devuelve UTC y causaba que
// ventas hechas despues de las 5pm en Culiacan (UTC-7) se guardaran con
// la fecha del dia siguiente, rompiendo el Corte del Dia.
function fechaHoyLocal() {
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, "0");
  var dd = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + dd;
}
let FECHA_SERVIDOR = fechaHoyLocal();
let HORA_SERVIDOR = new Date().toTimeString().slice(0,5);

// HOY como variable global (dispositivo) - usa hora local
const HOY = fechaHoyLocal();

// HOY se recalcula cuando se obtiene fecha del servidor
const obtenerHOY = () => FECHA_SERVIDOR;
const obtenerHORA = () => HORA_SERVIDOR;

// Para override manual
let FECHA_OVERRIDE = null;
let HORA_OVERRIDE = null;

const HOY_ACTUAL = () => FECHA_OVERRIDE || HOY;
const HORA_ACTUAL = () => HORA_OVERRIDE || new Date().toTimeString().slice(0,5);
const fmt = n => "$" + Number(n||0).toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD = d => {
  if(!d) return "—";
  if (typeof d !== "string") d = String(d);
  if (d.indexOf("-") < 0) return d;
  const p = d.split("-");
  if (p.length < 3) return d;
  return parseInt(p[2])+"/"+parseInt(p[1])+"/"+p[0];
};
const dRest = d => { if(!d || typeof d !== "string") return null; try { return Math.ceil((new Date(d+"T00:00:00") - new Date(new Date().toDateString())) / 86400000); } catch(e) { return null; } };
const totI = items => {
  let arr = items;
  if (!arr) return 0;
  if (typeof arr === "string") {
    try { arr = JSON.parse(arr); } catch(e) { return 0; }
  }
  if (!Array.isArray(arr)) return 0;
  return arr.reduce((s,i) => {
    const precio = parseFloat(i && i.precio)||0;
    const cantidad = parseFloat(i && i.cantidad)||1;
    return s + (precio * cantidad);
  }, 0);
};

// Calcular total con descuento (% nuevo o pesos histórico)
function calcularTotal(pedido) {
  if (!pedido) return 0;
  // Subtotal: si hay productos con cantidad, multiplicar; sino suma simple de items
  const items = pedido.items || [];
  const productos = pedido.productos || [];
  let sub = 0;
  if (productos.length > 0) {
    // Agrupar items por productoId y multiplicar por cantidad del producto
    const productoIds = new Set(productos.map(function(p){return p.id;}));
    productos.forEach(function(prod){
      const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
      const subProd = itemsProd.reduce(function(s,it){return s + (parseFloat(it.precio)||0);},0);
      sub += subProd * (parseFloat(prod.cantidad)||1);
    });
    // Items sueltos (sin productoId que coincida)
    const itemsSueltos = items.filter(function(it){return !productoIds.has(it.productoId);});
    sub += itemsSueltos.reduce(function(s,it){return s + (parseFloat(it.precio)||0) * (parseFloat(it.cantidad)||1);},0);
  } else {
    sub = totI(items);
  }
  // Aplicar descuento (% nuevo tiene prioridad sobre $ histórico)
  const pct = parseFloat(pedido.descuentoPct);
  if (pct && pct > 0) {
    return Math.max(0, sub * (1 - pct/100));
  }
  const des = parseFloat(pedido.descuento) || 0;
  return Math.max(0, sub - des);
}

// Calcular saldo
function calcularSaldo(pedido) {
  if (!pedido) return 0;
  const total = calcularTotal(pedido);
  const anticipo = parseFloat(pedido.anticipo) || 0;
  return Math.max(0, total - anticipo);
}
const uid = () => Math.random().toString(36).slice(2,8);
const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const confirmar = (msg) => window.confirm(msg);
function gruposProducto(pedido) {
  const p = normalizarPedido(pedido);
  const items = p.items || [];
  const productos = p.productos || [];
  if (productos.length === 0) {
    if (items.length === 0) return [];
    return [{id:"default", titulo:"Producto", nota:"", items: items.map((it,i)=>Object.assign({},it,{_idx:i}))}];
  }
  const itemsConIdx = items.map((it,i) => Object.assign({},it,{_idx:i}));
  return productos.map(function(p){
    return Object.assign({},p,{items: itemsConIdx.filter(function(it){return it.productoId === p.id;})});
  });
}
function parsearJSON(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === "string") { try { return JSON.parse(v); } catch(e) { return []; } }
  return [];
}
function normalizarPedido(p) {
  if (!p) return p;
  return Object.assign({}, p, {
    items: parsearJSON(p.items),
    productos: parsearJSON(p.productos),
    tareas: (p.tareas && typeof p.tareas === "string") ? (() => { try { return JSON.parse(p.tareas); } catch(e) { return {}; } })() : (p.tareas || {})
  });
}
function saldoPedido(p) {
  const n = normalizarPedido(p);
  const tot = calcularTotal(n);
  return Math.max(0, tot - (parseFloat(n.anticipo)||0));
}

// Días restantes para la entrega y color semáforo
function diasParaEntrega(fechaEntrega) {
  if (!fechaEntrega) return null;
  const hoy = new Date(HOY_ACTUAL() + "T00:00:00");
  const ent = new Date(String(fechaEntrega).split("T")[0] + "T00:00:00");
  if (isNaN(ent.getTime())) return null;
  const ms = ent.getTime() - hoy.getTime();
  return Math.round(ms / (1000 * 60 * 60 * 24));
}

function colorDiasEntrega(dias) {
  if (dias === null || dias === undefined) return null;
  if (dias <= 1) return "#D32F2F";   // Rojo: hoy o falta 1 día (o ya pasó)
  if (dias <= 3) return "#F57C00";   // Amarillo: 2-3 días
  return "#388E3C";                  // Verde: 4+ días
}

function textoDiasEntrega(dias) {
  if (dias === null || dias === undefined) return "";
  if (dias < 0) return Math.abs(dias) + " día" + (Math.abs(dias)===1?"":"s") + " vencido";
  if (dias === 0) return "HOY";
  if (dias === 1) return "Mañana";
  return "En " + dias + " días";
}

// ── GENERADOR PDF ────────────────────────────────────────────
function generarPDF({folio, tipo, cliente, clienteTel, clienteCorreo, fecha, fechaEntrega, items, productos, stock, anticipo, descuento, descuentoPct, iva}) {
  // Calcular subtotal considerando cantidad por producto si existe
  productos = productos || [];
  const productoIds = new Set(productos.map(function(p){return p.id;}));
  let sub = 0;
  if (productos.length > 0) {
    productos.forEach(function(prod){
      const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
      const subProd = itemsProd.reduce(function(s,it){return s + (parseFloat(it.precio)||0);},0);
      sub += subProd * (parseFloat(prod.cantidad)||1);
    });
    const itemsSueltos = items.filter(function(it){return !productoIds.has(it.productoId);});
    sub += itemsSueltos.reduce(function(s,it){return s + (parseFloat(it.precio)||0) * (parseFloat(it.cantidad)||1);},0);
  } else {
    sub = totI(items);
  }
  const ivaA = iva ? sub * 0.16 : 0;
  // Descuento: priorizar % si está definido, sino usar pesos (histórico)
  const desPct = parseFloat(descuentoPct) || 0;
  const desA = desPct > 0 ? (sub * desPct / 100) : (parseFloat(descuento) || 0);
  const tot = Math.max(0, sub + ivaA - desA);
  const ant = parseFloat(anticipo) || 0;
  const sal = Math.max(0, tot - ant);
  const esCot = tipo === "cotizacion";
  const win = window.open("","_blank","width=700,height=950");
  if (!win) { alert("Permite ventanas emergentes para imprimir"); return; }

  // Agrupar items por productoId, respetando el orden de productos
  stock = stock || [];

  // Si no hay productos meta, generar uno por cada productoId único en items
  let prodList = productos.slice();
  if (prodList.length === 0) {
    const idsVistos = [];
    items.forEach(function(it) {
      const pid = it.productoId || "_solo";
      if (idsVistos.indexOf(pid) < 0) {
        idsVistos.push(pid);
        prodList.push({id:pid, titulo:it.nombre||"Producto"});
      }
    });
  }

  // Determinar categoria/tipo de cada producto
  function detectarTipo(prod) {
    // Buscar en stock por stockId
    const ref = prod.stockId ? stock.find(function(s){return s.id===prod.stockId;}) : null;
    let cat = "";
    if (ref) cat = (ref.categoria||"").toLowerCase();
    else cat = (prod.categoria||"").toLowerCase();
    // Por título si aún no se detecta
    const titulo = (prod.titulo||"").toLowerCase();
    if (cat.indexOf("bastidor") >= 0 || titulo.indexOf("bastidor") >= 0) return "bastidor";
    if (cat.indexOf("cartel") >= 0 || titulo.indexOf("cartel") >= 0) return "cartel";
    return "cuadro"; // default
  }

  // Contadores por tipo
  const contadores = {cuadro:0, bastidor:0, cartel:0};

  // Construir filas HTML de productos
  const filasHTML = prodList.map(function(prod) {
    const tipoP = detectarTipo(prod);
    contadores[tipoP] += 1;
    const num = contadores[tipoP];
    const itemsProd = items.filter(function(it){return (it.productoId||"_solo") === prod.id;});
    const cantProd = parseFloat(prod.cantidad) || 1;
    const subtotalBase = itemsProd.reduce(function(s,it){return s+(parseFloat(it.precio)||0);},0);
    const subtotalP = subtotalBase * cantProd;
    const precioUnit = subtotalBase;

    // Buscar referencia en stock
    const ref = prod.stockId ? stock.find(function(s){return s.id===prod.stockId;}) : null;
    const alto = ref ? ref.alto : "";
    const ancho = ref ? ref.ancho : "";
    const medidas = (alto && ancho) ? (alto+"x"+ancho+"cm") : (ref && ref.medidas ? ref.medidas : "");
    // Si no hay medidas en stock, intentar extraer del titulo "Cuadro 50x60cm"
    let medidasFinal = medidas;
    if (!medidasFinal && prod.titulo) {
      const m = String(prod.titulo).match(/(\d+\s*x\s*\d+(?:cm)?)/i);
      if (m) medidasFinal = m[1];
    }

    let nombreFila = "";
    let descripcionFila = "";

    if (tipoP === "cuadro") {
      nombreFila = "CUADRO " + num;
      let moldura = "";
      const insumos = [];
      if (itemsProd.length > 0 && itemsProd.some(function(it){return it.tipo;})) {
        itemsProd.forEach(function(it) {
          const nom = (it.nombre||"").toLowerCase();
          if (it.tipo === "moldura") moldura = it.nombre;
          else if (it.tipo === "insumo" && nom.indexOf("armado") < 0) insumos.push(it.nombre);
        });
      } else if (ref && (ref.composicion||[]).length) {
        ref.composicion.forEach(function(c) {
          const nom = (c.nombre||"").toLowerCase();
          if (c.tipo === "moldura") moldura = c.nombre;
          else if (c.tipo === "insumo" && nom.indexOf("armado") < 0) insumos.push(c.nombre);
        });
      } else {
        // Sin tipo: usar todos los nombres como descripción
        itemsProd.forEach(function(it){
          if (it.nombre) insumos.push(it.nombre);
        });
      }
      const partesDesc = [];
      if (moldura) partesDesc.push(moldura);
      if (insumos.length) partesDesc.push(insumos.join(", "));
      descripcionFila = partesDesc.join(" · ");
    } else {
      nombreFila = (tipoP === "bastidor" ? "BASTIDOR" : "CARTEL") + " " + num;
      descripcionFila = "";
    }

    // Renglones del PDF
    // 1: NOMBRE — MEDIDAS (cuadro 1, 50x60cm)
    // 2: Descripción molduras e insumos sin precios
    // 3: Imagen miniatura
    // Nota del cliente (si tiene)
    const renglon1 = '<div style="font-weight:700;font-size:11.5px">'+nombreFila + (medidasFinal ? ' — '+medidasFinal : '')+'</div>';
    const renglon2 = descripcionFila ? '<div style="color:#555;font-size:10.5px;margin-top:3px;line-height:1.35">'+descripcionFila+'</div>' : '';
    const renglon3 = prod.imagen ? '<div style="margin-top:5px"><img src="'+prod.imagen+'" style="width:54px;height:54px;object-fit:cover;border:1px solid #bbb;border-radius:3px"/></div>' : '';
    const notaHTML = prod.nota ? '<div style="font-size:9.5px;color:#888;font-style:italic;margin-top:3px">Nota: '+prod.nota+'</div>' : '';

    return '<tr><td class="c">'+cantProd+'</td><td>'+renglon1+renglon2+renglon3+notaHTML+'</td><td class="r">'+fmt(precioUnit)+'</td><td class="r">'+fmt(subtotalP)+'</td></tr>';
  }).join("");

  // Filas vacías de relleno
  const minFilas = 8;
  const vacias = Math.max(0, minFilas - prodList.length);
  let vaciasHTML = "";
  for (let i = 0; i < vacias; i++) {
    vaciasHTML += '<tr><td class="c"></td><td></td><td class="r" style="color:#ddd">$0.00</td><td class="r" style="color:#ddd">$0.00</td></tr>';
  }

  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>${esCot?"Cotizacion":"Nota"} #${folio}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;background:#fff;color:#111;padding:32px 44px;font-size:11.5px;font-weight:400}
    .logo-wrap{text-align:center;margin-bottom:18px}
    .logo-box{display:inline-block;border:2px solid #111;padding:10px 40px}
    .logo{font-size:22px;font-weight:700;letter-spacing:10px;color:#111;font-family:'Lucida Bright','Lucida Serif',Georgia,serif}
    .tipo{font-size:9px;font-weight:600;letter-spacing:4px;color:${esCot?"#B07000":"#555"};text-align:center;margin-bottom:16px;text-transform:uppercase}
    .hdr{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #111}
    .addr{font-size:10.5px;line-height:2;color:#444;font-weight:400}
    .addr strong{font-weight:600;color:#111}
    .fbox{border:1px solid #ccc;min-width:170px}
    .fr{display:flex;justify-content:space-between;align-items:center;padding:5px 11px;border-bottom:1px solid #eee;font-size:10.5px}
    .fr:last-child{border-bottom:none}
    .fnum{color:${esCot?"#B07000":"#CC0000"};font-weight:700;font-size:17px;letter-spacing:1px}
    .cg{display:grid;grid-template-columns:80px 1fr;border:1px solid #ccc;margin-bottom:16px}
    .cl{background:#f7f7f7;padding:5px 9px;font-weight:600;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-right:1px solid #ccc;border-bottom:1px solid #eee;display:flex;align-items:center;color:#555}
    .cv{padding:5px 11px;border-bottom:1px solid #eee;font-size:11px;display:flex;align-items:center;color:#111;font-weight:500}
    .cl.l,.cv.l{border-bottom:none}
    table{width:100%;border-collapse:collapse}
    th{background:#f7f7f7;border-bottom:1.5px solid #111;border-top:1px solid #ccc;border-left:1px solid #eee;border-right:1px solid #eee;padding:6px 9px;font-size:10px;text-align:left;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#444}
    th.r,td.r{text-align:right}
    th.c,td.c{text-align:center;width:44px}
    td{border-bottom:1px solid #eee;border-left:1px solid #f0f0f0;border-right:1px solid #f0f0f0;padding:7px 9px;font-size:11px;color:#222;vertical-align:top}
    tbody tr:last-child td{border-bottom:1px solid #ccc}

    .tbl tr{border-bottom:1px solid #eee}
    .tbl td{padding:5px 11px;font-size:11px}
    .lb{text-align:right;color:#666;font-weight:500;width:110px}
    .vl{text-align:right;color:#111;font-weight:500}
    .big .lb{font-weight:700;color:#111;background:#f3f3f3}
    .big .vl{font-weight:700;color:#111;background:#f3f3f3;font-size:13px}
    .bot{display:grid;grid-template-columns:1fr auto;gap:24px;margin-top:16px;align-items:start}
    .hor{font-size:10px;line-height:2.2;color:#666;font-weight:400}
    .hor strong{font-weight:600;color:#333;display:block;margin-bottom:4px}
  </style></head><body>
  <div class="logo-wrap"><div class="logo-box"><div class="logo">LA&nbsp;&nbsp;MARQUERIA</div></div></div>
  <div class="tipo">${esCot?"Cotización":"Nota de venta"}</div>
  <div class="hdr">
    <div class="addr">
      José María Morelos y Pavón 745 Norte,<br>
      Primer Cuadro, 80000 Culiacán Rosales, Sin.<br>
      <strong>Cel.</strong> 667 160 1160 &nbsp; <strong>Correo:</strong> lamarqueria2@gmail.com
    </div>
    <div class="fbox">
      <div class="fr"><span style="font-weight:600;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.06em">Folio</span><span class="fnum">${folio}</span></div>
      <div class="fr"><span style="font-weight:600;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.06em">Fecha</span><span>${fmtD(fecha||HOY)}</span></div>
      <div class="fr"><span style="font-weight:600;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.06em">${esCot?"Válida hasta":"Entrega"}</span><span>${fechaEntrega?fmtD(fechaEntrega):"—"}</span></div>
    </div>
  </div>
  <div class="cg">
    <div class="cl">Cliente</div><div class="cv">${cliente||""}</div>
    <div class="cl">Cel</div><div class="cv">${clienteTel||""}</div>
    <div class="cl l">Correo</div><div class="cv l">${clienteCorreo||""}</div>
  </div>
  <table>
    <thead><tr><th class="c">Cant.</th><th>Descripción</th><th class="r" style="width:110px">Precio unit.</th><th class="r" style="width:100px">Importe</th></tr></thead>
    <tbody>${filasHTML}${vaciasHTML}</tbody>
  </table>
  <div class="bot">
    <div class="hor">
      <strong>Horario</strong>
      Lunes a viernes: 10:00 am – 6:00 pm<br>
      Sábado: 10:00 am – 2:00 pm
    </div>
    <table class="tbl">
      <tr><td class="lb">Subtotal</td><td class="vl">${fmt(sub)}</td></tr>
      <tr><td class="lb">IVA</td><td class="vl">${ivaA>0?fmt(ivaA):""}</td></tr>
      <tr><td class="lb">Descuento${desPct>0?" ("+desPct+"%)":""}</td><td class="vl">${desA>0?fmt(desA):""}</td></tr>
      <tr class="big"><td class="lb">Total</td><td class="vl">${fmt(tot)}</td></tr>
      <tr><td class="lb">Anticipo</td><td class="vl">${fmt(ant)}</td></tr>
      <tr class="big"><td class="lb">Saldo</td><td class="vl">${fmt(sal)}</td></tr>
    </table>
  </div>
  </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

  return <div style={Object.assign({background:T.bgCard,border:"1px solid "+T.border,borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"},style||{})}>{children}</div>;
}
function ST({children}) {
  return <div style={{fontFamily:FONT,fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:T.textFade,textTransform:"uppercase",marginBottom:12,paddingBottom:8,borderBottom:"1px solid "+T.border}}>{children}</div>;
}
function Badge({label, color, bg}) {
  return <span style={{display:"inline-block",background:bg||T.bgDark,color:color||T.text,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20}}>{label}</span>;
}
function Btn({children, onClick, variant, style, disabled, size}) {
  const v = variant || "primary";
  const s = size || "md";
  const pad = s === "sm" ? "4px 10px" : "8px 16px";
  const fsz = s === "sm" ? 11 : 13;
  const styles = {
    primary: {background:T.header,color:"#fff",border:"none"},
    ghost: {background:"transparent",color:T.text,border:"1px solid "+T.border},
    danger: {background:T.redBg,color:T.red,border:"1px solid "+T.red+"30"},
    success: {background:T.greenBg,color:T.green,border:"1px solid "+T.green+"30"},
    amber: {background:"#FFF8E0",color:T.amber,border:"1px solid "+T.amber+"50"},
    info: {background:T.blueBg,color:T.blue,border:"1px solid "+T.blue+"30"}
  };
  const vs = styles[v] || styles.primary;
  return <button onClick={onClick} disabled={!!disabled} style={Object.assign({borderRadius:7,padding:pad,fontSize:fsz,cursor:disabled?"not-allowed":"pointer",fontFamily:FS,fontWeight:600,opacity:disabled?0.4:1},vs,style||{})}>{children}</button>;
}
function Inp({label, hint, value, onChange, type, placeholder, styleExtra}) {
  return (
    <div style={{marginBottom:10}}>
      {label && <label style={{color:T.textSub,fontSize:11,display:"block",marginBottom:3,fontFamily:FS,fontWeight:600}}>{label}</label>}
      <input value={value||""} onChange={onChange} type={type||"text"} placeholder={placeholder||""} style={Object.assign({width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 11px",color:T.text,fontFamily:FS,fontSize:13,outline:"none",boxSizing:"border-box"},styleExtra||{})} />
      {hint && <div style={{color:T.textFade,fontSize:10,marginTop:2}}>{hint}</div>}
    </div>
  );
}
function Sel({label, children, value, onChange}) {
  return (
    <div style={{marginBottom:10}}>
      {label && <label style={{color:T.textSub,fontSize:11,display:"block",marginBottom:3,fontFamily:FS,fontWeight:600}}>{label}</label>}
      <select value={value} onChange={onChange} style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 11px",color:T.text,fontFamily:FS,fontSize:13,outline:"none"}}>{children}</select>
    </div>
  );
}
function Modal({title, onClose, children, wide}) {
  const mw = wide ? 800 : 480;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:12}}>
      <div style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:14,padding:"22px 22px 18px",width:"100%",maxWidth:mw,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{margin:0,color:T.text,fontSize:17,fontFamily:FONT}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.textFade,fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function KPI({icon, label, value, color, accent}) {
  const c = color || T.text;
  const border = accent ? "2px solid "+c+"30" : "1px solid "+T.border;
  return (
    <Card style={{textAlign:"center",padding:"14px 10px",border:border}}>
      <div style={{color:c,fontSize:17,fontWeight:700,fontFamily:FONT}}>{value}</div>
      <div style={{color:T.textFade,fontSize:11,marginTop:4,fontFamily:FS}}>{label}</div>
    </Card>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function TabDashboard({pedidos, cotizaciones, costos, gastos, stock, ventasPOS}) {
  const anoActual = new Date().getFullYear();
  const [mesFiltro, setMesFiltro] = useState("todos");

  function filtrarPorMes(lista, campo) {
    if (mesFiltro === "todos") return lista;
    return lista.filter(function(x) { return (x[campo]||"").startsWith(mesFiltro); });
  }

  const pedidosFil = filtrarPorMes(pedidos, "fecha");
  const ventasPOSFil = filtrarPorMes(ventasPOS, "fecha");
  const costosFil = filtrarPorMes(costos, "fecha");
  const gastosFil = filtrarPorMes(gastos, "fecha");

  const activos = pedidos.filter(p => !["Entregado","Bodega"].includes(p.estado));
  const totalVentas = pedidosFil.filter(p => p.estado !== "Bodega").reduce((s,p) => s+totI(p.items), 0);
  const totalPOS = ventasPOSFil.reduce((s,v) => s+totI(v.items), 0);
  const totalCobrado = pedidosFil.filter(p => p.estado !== "Bodega").reduce((s,p) => s+(p.anticipo||0), 0) + totalPOS;
  const totalCostos = costosFil.reduce((s,c) => s+c.monto, 0);
  const totalGastos = gastosFil.reduce((s,g) => s+g.monto, 0);
  const utilBruta = totalCobrado - totalCostos;
  const utilNeta = utilBruta - totalGastos;
  const porCobrar = totalVentas - totalCobrado;
  const urgentes = pedidos.filter(p => { const d = dRest(p.fechaEntrega); return d !== null && d <= 2 && !["Entregado","Bodega"].includes(p.estado); });
  const bajoStock = stock.filter(p => p.stock <= p.stockMin);
  const cotPend = cotizaciones.filter(c => c.estado === "Pendiente").length;

  const pedAno = pedidos.filter(p => (p.fecha||"").startsWith(String(anoActual)));
  const posAno = ventasPOS.filter(v => (v.fecha||"").startsWith(String(anoActual)));
  const costosAno = costos.filter(c => (c.fecha||"").startsWith(String(anoActual)));
  const gastosAno = gastos.filter(g => (g.fecha||"").startsWith(String(anoActual)));
  const ingresosAno = pedAno.filter(p=>p.estado!=="Bodega").reduce((s,p)=>s+totI(p.items),0) + posAno.reduce((s,v)=>s+totI(v.items),0);
  const costosAnoT = costosAno.reduce((s,c)=>s+c.monto,0);
  const gastosAnoT = gastosAno.reduce((s,g)=>s+g.monto,0);
  const utilBrutaAno = ingresosAno - costosAnoT;
  const utilNetaAno = utilBrutaAno - gastosAnoT;

  const mesesConDatos = [];
  [...pedidos,...ventasPOS,...costos,...gastos].forEach(function(x){
    const m = (x.fecha||"").slice(0,7);
    if(m && mesesConDatos.indexOf(m)<0) mesesConDatos.push(m);
  });
  mesesConDatos.sort().reverse();

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontFamily:FONT,fontSize:19,fontWeight:700}}>Resumen del Negocio</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <select value={mesFiltro} onChange={e => setMesFiltro(e.target.value)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"7px 12px",color:T.text,fontFamily:FS,fontSize:12,outline:"none"}}>
            <option value="todos">Todos los meses</option>
            {mesesConDatos.map(function(m){ const p=m.split("-"); return <option key={m} value={m}>{MESES[parseInt(p[1])-1]} {p[0]}</option>; })}
          </select>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>{fmtD(HOY)}</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:18}}>
        <KPI label="Ventas servicio" value={fmt(totalVentas)} accent={true} color={T.amber}/>
        <KPI label="Ventas POS" value={fmt(totalPOS)} color={T.blue}/>
        <KPI label="Cobrado" value={fmt(totalCobrado)} color={T.green}/>
        <KPI label="Por cobrar" value={fmt(porCobrar)} color={porCobrar>0?T.orange:T.green}/>
        <KPI label="Util. bruta" value={fmt(utilBruta)} color={utilBruta>=0?T.green:T.red} accent={utilBruta>=0}/>
        <KPI label="Util. neta" value={fmt(utilNeta)} color={utilNeta>=0?T.green:T.red} accent={utilNeta>=0}/>
        <KPI label="Pedidos activos" value={activos.length} color={T.blue}/>
        <KPI label="Urgentes" value={urgentes.length} color={urgentes.length>0?T.red:T.green}/>
        <KPI label="Cot. pendientes" value={cotPend} color={cotPend>0?T.amber:T.green}/>
        <KPI label="Bajo stock" value={bajoStock.length} color={bajoStock.length>0?T.red:T.green}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:20}}>
        <Card>
          <ST>Resultados — {mesFiltro==="todos"?"Acumulado":MESES[parseInt(mesFiltro.split("-")[1])-1]+" "+mesFiltro.split("-")[0]}</ST>
          {[["Ingresos totales",fmt(totalVentas+totalPOS),T.amber,true],["(-) Costos de produccion","("+fmt(totalCostos)+")",T.orange,false],["Utilidad bruta",fmt(utilBruta),utilBruta>=0?T.green:T.red,true],["(-) Gastos operativos","("+fmt(totalGastos)+")",T.blue,false]].map(function(row) {
            return (
              <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:(row[3]?"8":"4")+"px 0",borderTop:row[3]?"1px solid "+T.border:"none",marginTop:row[3]?4:0}}>
                <span style={{color:T.textSub,fontSize:row[3]?13:12,fontFamily:FS}}>{row[0]}</span>
                <span style={{color:row[2],fontWeight:700,fontSize:row[3]?14:12,fontFamily:row[3]?FONT:FS}}>{row[1]}</span>
              </div>
            );
          })}
          <div style={{background:utilNeta>=0?T.greenBg:T.redBg,border:"1px solid "+(utilNeta>=0?T.green:T.red)+"30",borderRadius:8,padding:"12px 14px",marginTop:12}}>
            <div style={{color:T.textFade,fontSize:10,fontFamily:FS,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.08em"}}>Utilidad Neta</div>
            <div style={{color:utilNeta>=0?T.green:T.red,fontSize:22,fontWeight:700,fontFamily:FONT}}>{fmt(utilNeta)}</div>
            <div style={{color:T.textFade,fontSize:10,fontFamily:FS,marginTop:3}}>Margen: {(totalVentas+totalPOS)>0?((utilNeta/(totalVentas+totalPOS))*100).toFixed(1):0}%</div>
          </div>
        </Card>
        <Card>
          <ST>Estado de Pedidos</ST>
          {ESTADOS_K.map(function(e) {
            const cnt = pedidos.filter(p => p.estado === e).length;
            const col = META_K[e] || {};
            const pct = pedidos.length ? (cnt/pedidos.length)*100 : 0;
            return (
              <div key={e} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:col.dot,flexShrink:0}}/>
                <span style={{fontSize:12,flex:1,fontFamily:FS}}>{e}</span>
                <div style={{flex:2,background:T.bgDark,borderRadius:4,height:7,overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:col.dot,borderRadius:4}}/>
                </div>
                <span style={{fontSize:12,minWidth:18,textAlign:"right",fontFamily:FS,fontWeight:700}}>{cnt}</span>
              </div>
            );
          })}
        </Card>
        <Card>
          <ST>Alertas</ST>
          {urgentes.length===0 && bajoStock.length===0 && porCobrar===0 && <div style={{color:T.green,fontSize:12,fontFamily:FS}}>Sin alertas.</div>}
          {urgentes.map(function(p) {
            const d = dRest(p.fechaEntrega);
            return (
              <div key={p.id} style={{background:T.redBg,border:"1px solid "+T.red+"30",borderRadius:7,padding:"7px 10px",marginBottom:7}}>
                <div style={{color:T.red,fontWeight:600,fontSize:12,fontFamily:FS}}>Entrega urgente #{p.folio} {p.cliente}</div>
                <div style={{color:T.textFade,fontSize:11,fontFamily:FS}}>{d<0?Math.abs(d)+"d tarde":d===0?"Hoy":d+"d"}</div>
              </div>
            );
          })}
          {bajoStock.map(function(p) {
            return (
              <div key={p.id} style={{background:T.orangeBg,border:"1px solid "+T.orange+"30",borderRadius:7,padding:"6px 10px",marginBottom:5}}>
                <div style={{color:T.orange,fontWeight:600,fontSize:11,fontFamily:FS}}>Stock bajo — {p.nombre}: {p.stock} pzas</div>
              </div>
            );
          })}
          {porCobrar > 0 && (
            <div style={{background:"#FFF8E0",border:"1px solid "+T.amber+"30",borderRadius:7,padding:"7px 10px",marginTop:8}}>
              <div style={{color:T.amber,fontWeight:600,fontSize:12,fontFamily:FS}}>Por cobrar</div>
              <div style={{fontWeight:700,fontSize:16,fontFamily:FONT}}>{fmt(porCobrar)}</div>
            </div>
          )}
        </Card>
      </div>
      <Card>
        <ST>Estado de Resultados — Enero a Diciembre {anoActual}</ST>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:12,marginBottom:16}}>
          {Array.from({length:12},function(_,i){
            const m = String(anoActual)+"-"+String(i+1).padStart(2,"0");
            const pedM = pedidos.filter(p=>p.estado!=="Bodega"&&(p.fecha||"").startsWith(m));
            const posM = ventasPOS.filter(v=>(v.fecha||"").startsWith(m));
            const ingM = pedM.reduce((s,p)=>s+totI(p.items),0)+posM.reduce((s,v)=>s+totI(v.items),0);
            const cosM = costos.filter(c=>(c.fecha||"").startsWith(m)).reduce((s,c)=>s+c.monto,0);
            const gasM = gastos.filter(g=>(g.fecha||"").startsWith(m)).reduce((s,g)=>s+g.monto,0);
            const utilM = ingM-cosM-gasM;
            const activo = mesFiltro===m;
            return (
              <div key={i} onClick={()=>setMesFiltro(activo?"todos":m)} style={{background:activo?T.header:T.bgDark,borderRadius:8,padding:"10px",textAlign:"center",cursor:"pointer",border:"1px solid "+(activo?T.header:T.border)}}>
                <div style={{fontSize:11,fontWeight:600,color:activo?"#fff":T.textSub,fontFamily:FS,marginBottom:4}}>{MESES[i]}</div>
                <div style={{fontSize:13,fontWeight:700,fontFamily:FONT,color:activo?"#FFF8E0":utilM>=0?T.green:T.red}}>{ingM>0?fmt(utilM):"—"}</div>
                {ingM>0&&<div style={{fontSize:9,color:activo?"rgba(255,255,255,0.6)":T.textFade,fontFamily:FS,marginTop:2}}>ing: {fmt(ingM)}</div>}
              </div>
            );
          })}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,borderTop:"1px solid "+T.border,paddingTop:14}}>
          {[["Ingresos del año",fmt(ingresosAno),T.amber],["Costos del año","("+fmt(costosAnoT)+")",T.orange],["Gastos del año","("+fmt(gastosAnoT)+")",T.blue],["Utilidad neta del año",fmt(utilNetaAno),utilNetaAno>=0?T.green:T.red]].map(function(row){
            return(
              <div key={row[0]} style={{textAlign:"center"}}>
                <div style={{color:T.textFade,fontSize:10,fontFamily:FS,marginBottom:4}}>{row[0]}</div>
                <div style={{color:row[2],fontWeight:700,fontSize:16,fontFamily:FONT}}>{row[1]}</div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* AVANCE DIARIO POS */}
      <Card style={{marginTop:16,borderTop:"3px solid "+T.amber}}>
        <ST>📈 Avance de Ventas POS — Hoy ({fmtD(HOY)})</ST>
        {(function(){
          const ventasHoy = (ventasPOS||[]).filter(function(v){return v.fecha === HOY_ACTUAL();});
          if (ventasHoy.length === 0) {
            return <div style={{padding:"20px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:13}}>Sin ventas POS registradas hoy</div>;
          }
          const tipos = {Bastidor:{n:0,m:0},Cartel:{n:0,m:0},Canva:{n:0,m:0},Espejo:{n:0,m:0},"Marco PVC":{n:0,m:0},Otros:{n:0,m:0}};
          let totGeneral = 0, totTickets = ventasHoy.length;
          ventasHoy.forEach(function(v){
            const items = parsearJSON(v.items);
            items.forEach(function(it){
              const cat = (it.descripcion||"").indexOf("Bastidor") >= 0 ? "Bastidor" :
                          (it.descripcion||"").indexOf("Cartel") >= 0 ? "Cartel" :
                          (it.descripcion||"").indexOf("Canva") >= 0 ? "Canva" :
                          (it.descripcion||"").indexOf("Espejo") >= 0 ? "Espejo" :
                          (it.descripcion||"").indexOf("Marco PVC") >= 0 ? "Marco PVC" : "Otros";
              tipos[cat].n += 1;
              tipos[cat].m += parseFloat(it.precio)||0;
              totGeneral += parseFloat(it.precio)||0;
            });
          });
          const cats = [
            {key:"Bastidor",color:"#E65100"},
            {key:"Cartel",color:"#1565C0"},
            {key:"Canva",color:"#6A1B9A"},
            {key:"Espejo",color:"#00838F"},
            {key:"Marco PVC",color:"#558B2F"},
            {key:"Otros",color:"#757575"},
          ];
          return (
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr) 1.2fr",gap:8,marginBottom:8}}>
                {cats.map(function(c){
                  const t = tipos[c.key];
                  return (
                    <div key={c.key} style={{textAlign:"center",borderLeft:"3px solid "+c.color,paddingLeft:8}}>
                      <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:2}}>{c.key}</div>
                      <div style={{fontSize:14,fontWeight:700,fontFamily:FONT,color:c.color}}>{fmt(t.m)}</div>
                      <div style={{fontSize:9,color:T.textFade,fontFamily:FS}}>{t.n} pza{t.n!==1?"s":""}</div>
                    </div>
                  );
                })}
                <div style={{textAlign:"center",background:"#FFF8E0",borderRadius:6,padding:"6px 8px",border:"1px solid "+T.amber+"50"}}>
                  <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:2,fontWeight:600}}>TOTAL HOY</div>
                  <div style={{fontSize:16,fontWeight:700,fontFamily:FONT,color:T.amber}}>{fmt(totGeneral)}</div>
                  <div style={{fontSize:9,color:T.textFade,fontFamily:FS}}>{totTickets} ticket{totTickets!==1?"s":""}</div>
                </div>
              </div>
            </div>
          );
        })()}
      </Card>

      {/* ÚLTIMAS NOTAS POS DE HOY */}
      {(function(){
        const ultimasHoy = (ventasPOS||[]).filter(function(v){return v.fecha === HOY_ACTUAL();}).slice().sort(function(a,b){
          const fa = parseInt(String(a.folio||"").replace(/\D/g,""))||0;
          const fb = parseInt(String(b.folio||"").replace(/\D/g,""))||0;
          return fb - fa;
        }).slice(0,3);
        if (ultimasHoy.length === 0) return null;
        return (
          <Card style={{marginTop:16,borderTop:"3px solid #00838F"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <ST>🧾 Últimas notas POS</ST>
              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,fontStyle:"italic"}}>Las {ultimasHoy.length} más recientes de hoy</div>
            </div>
            <div style={{display:"grid",gap:8}}>
              {ultimasHoy.map(function(v){
                const cantItems = (v.items||[]).length;
                const cats = {};
                (v.items||[]).forEach(function(it){
                  const desc = String(it.descripcion||it.nombre||"").toLowerCase();
                  let cat = "Otros";
                  if (desc.includes("bastidor")) cat = "Bastidor";
                  else if (desc.includes("cartel")) cat = "Cartel";
                  else if (desc.includes("canva")) cat = "Canva";
                  else if (desc.includes("espejo")) cat = "Espejo";
                  else if (desc.includes("marco pvc") || desc.includes("pvc")) cat = "Marco PVC";
                  else if (desc.includes("enmarca") || desc.includes("marco")) cat = "Enmarcado";
                  cats[cat] = (cats[cat]||0) + 1;
                });
                const resumen = Object.entries(cats).map(function([c,n]){return n+"× "+c;}).join(", ");
                return (
                  <div key={v.id||v.folio} style={{padding:"10px 12px",background:T.bgDark,borderRadius:7,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,fontFamily:FONT,color:T.text}}>#{v.folio} · {v.cliente||"Publico General"}</div>
                      <div style={{fontSize:11,color:T.textSub,fontFamily:FS,marginTop:2}}>{resumen || cantItems+" item"+(cantItems!==1?"s":"")}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:14,fontWeight:700,fontFamily:FONT,color:T.green}}>{fmt(v.anticipo)}</div>
                      <div style={{fontSize:9,color:T.textFade,fontFamily:FS,marginTop:2}}>{v.metodoPago||"—"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })()}

      {/* HISTÓRICO DE VENTAS POS POR MES Y TIPO */}
      <Card style={{marginTop:16}}>
        <ST>📊 Histórico de Ventas POS por Mes y Tipo</ST>
        {(function(){
          const totales = {bastidor:0,cartel:0,canva:0,enmarcado:0,otros:0,total:0};
          HISTORICO_POS.forEach(function(m){
            totales.bastidor += m.bastidor;
            totales.cartel += m.cartel;
            totales.canva += m.canva;
            totales.enmarcado += m.enmarcado;
            totales.otros += m.otros;
            totales.total += m.total;
          });
          const tipos = [
            {key:"bastidor",label:"Bastidor",color:"#E65100"},
            {key:"cartel",label:"Cartel",color:"#1565C0"},
            {key:"canva",label:"Canva",color:"#6A1B9A"},
            {key:"enmarcado",label:"Enmarcado",color:"#2E7D32"},
            {key:"otros",label:"Otros",color:"#757575"},
          ];
          return (
            <div>
              {/* Resumen totales */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:14,paddingBottom:12,borderBottom:"1px solid "+T.border}}>
                {tipos.map(function(t){
                  const pct = totales.total ? (totales[t.key]/totales.total)*100 : 0;
                  return (
                    <div key={t.key} style={{textAlign:"center",borderLeft:"3px solid "+t.color,paddingLeft:8}}>
                      <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:2}}>{t.label}</div>
                      <div style={{fontSize:14,fontWeight:700,fontFamily:FONT,color:t.color}}>{fmt(totales[t.key])}</div>
                      <div style={{fontSize:9,color:T.textFade,fontFamily:FS}}>{pct.toFixed(1)}%</div>
                    </div>
                  );
                })}
                <div style={{textAlign:"center",borderLeft:"3px solid "+T.amber,paddingLeft:8,background:"#FFF8E0",borderRadius:5,padding:"4px 8px"}}>
                  <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginBottom:2}}>TOTAL</div>
                  <div style={{fontSize:14,fontWeight:700,fontFamily:FONT,color:T.amber}}>{fmt(totales.total)}</div>
                </div>
              </div>

              {/* Tabla detallada por mes */}
              <table style={{width:"100%",borderCollapse:"collapse",fontFamily:FS,fontSize:12}}>
                <thead>
                  <tr style={{background:T.bgDark}}>
                    <th style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:T.textFade,fontSize:10,letterSpacing:"0.05em"}}>MES</th>
                    {tipos.map(function(t){
                      return <th key={t.key} style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:t.color,fontSize:10,letterSpacing:"0.05em"}}>{t.label.toUpperCase()}</th>;
                    })}
                    <th style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:T.amber,fontSize:10,letterSpacing:"0.05em"}}>TOTAL</th>
                  </tr>
                </thead>
                <tbody>
                  {HISTORICO_POS.map(function(m){
                    return (
                      <tr key={m.mes} style={{borderBottom:"1px solid "+T.border}}>
                        <td style={{padding:"8px 10px",fontWeight:600}}>{m.mes} {m.anio}</td>
                        {tipos.map(function(t){
                          return <td key={t.key} style={{padding:"8px 10px",textAlign:"right",color:m[t.key]?T.text:T.textFade}}>{m[t.key]?fmt(m[t.key]):"—"}</td>;
                        })}
                        <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:T.amber}}>{fmt(m.total)}</td>
                      </tr>
                    );
                  })}
                  <tr style={{background:T.bgDark,fontWeight:700}}>
                    <td style={{padding:"10px",fontWeight:700,color:T.text}}>TOTAL ACUMULADO</td>
                    {tipos.map(function(t){
                      return <td key={t.key} style={{padding:"10px",textAlign:"right",color:t.color,fontWeight:700}}>{fmt(totales[t.key])}</td>;
                    })}
                    <td style={{padding:"10px",textAlign:"right",color:T.amber,fontWeight:700,fontSize:14}}>{fmt(totales.total)}</td>
                  </tr>
                </tbody>
              </table>

              <div style={{fontSize:10,color:T.textFade,fontFamily:FS,marginTop:10,fontStyle:"italic"}}>* Datos históricos importados desde respaldo</div>
            </div>
          );
        })()}
      </Card>
    </div>
  );
}

// ── COTIZADOR ─────────────────────────────────────────────────
function TabCotizador({insumos, molduras, nextFolio, setNextFolio, nextFolioQ, setNextFolioQ, onPedidoCreado, onCotizacionCreada, setCotizadorDirty, stock, cotizacionAEditar, onLimpiarEdicion, setCotizaciones, pedidoAEditar, onLimpiarEdicionPedido, onPedidoActualizado, onVolverAPedidos}) {
  const [alto, setAlto] = useState("");
  const [ancho, setAncho] = useState("");
  const [cat, setCat] = useState("impresion");
  const [lineas, setLineas] = useState([]);
  const [molSel, setMolSel] = useState(null);
  const [molBusq, setMolBusq] = useState("");
  const [stkBusq, setStkBusq] = useState("");
  const [productos, setProductos] = useState([]);
  const [modalNota, setModalNota] = useState(false);
  const [modalCot, setModalCot] = useState(false);
  const [cliCot, setCliCot] = useState("");
  const [telCot, setTelCot] = useState("");
  const [valCot, setValCot] = useState("");
  const [notaCot, setNotaCot] = useState("");
  const [descCot, setDescCot] = useState("");
  const [editandoFolio, setEditandoFolio] = useState(null); // folio que estamos editando
  const [editandoPedidoOriginal, setEditandoPedidoOriginal] = useState(null); // pedido completo (no cotización) que estamos editando

  // Cargar cotización para edición
  React.useEffect(function() {
    if (cotizacionAEditar) {
      const items = parsearJSON(cotizacionAEditar.items);
      const prods = parsearJSON(cotizacionAEditar.productos);
      // Reconstruir productos con sus líneas
      const productosReconstruidos = prods.map(function(prod){
        const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
        // Detectar alto/ancho del titulo "Cuadro 50x60cm"
        const match = String(prod.titulo||"").match(/(\d+)\s*x\s*(\d+)/i);
        const alto = match ? match[1] : "";
        const ancho = match ? match[2] : "";
        return {
          id: prod.id,
          alto: alto,
          ancho: ancho,
          nota: prod.nota || "",
          imagen: prod.imagen || null,
          fileId: prod.fileId || null,
          cantidad: parseFloat(prod.cantidad) || 1,
          lineas: itemsProd.map(function(it){
            return {
              id: uid(),
              nombre: it.nombre,
              descripcion: it.descripcion || "",
              precio: parseFloat(it.precio) || 0,
              costo: 0,
              tipo: it.tipo || "insumo",
              cat: it.cat || "impresion"
            };
          })
        };
      });
      setProductos(productosReconstruidos);
      setCliCot(cotizacionAEditar.cliente || "");
      setTelCot(cotizacionAEditar.tel || "");
      setValCot(cotizacionAEditar.fechaEntrega || cotizacionAEditar.validez || "");
      setNotaCot(cotizacionAEditar.nota || "");
      setDescCot(cotizacionAEditar.descuentoPct ? String(cotizacionAEditar.descuentoPct) : "");
      setEditandoFolio(cotizacionAEditar.folio);
      setLineas([]);
      setMolSel(null);
      setAlto("");
      setAncho("");
      if (onLimpiarEdicion) onLimpiarEdicion();
    }
  }, [cotizacionAEditar]);

  // Cargar pedido existente para edición (reconstrucción cuidadosa: no perder datos de pedidos viejos)
  React.useEffect(function() {
    if (pedidoAEditar) {
      const pn = normalizarPedido(pedidoAEditar);
      // Rehidratar items: si a un item le falta productoId (pedidos viejos), se le asigna uno estable aquí mismo
      const items = (pn.items || []).map(function(it){ return Object.assign({}, it, {productoId: it.productoId || uid()}); });
      let prods = pn.productos || [];
      if (!prods.length && items.length) {
        // Pedido viejo sin metadata de productos: uno por cada productoId (ya asignado arriba)
        const vistos = [];
        prods = [];
        items.forEach(function(it){
          if (vistos.indexOf(it.productoId) < 0) { vistos.push(it.productoId); prods.push({id:it.productoId, titulo:it.nombre||"Producto", nota:"", imagen:null}); }
        });
      }
      const productosReconstruidos = prods.map(function(prod){
        const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
        const match = String(prod.titulo||"").match(/(\d+)\s*x\s*(\d+)/i);
        return {
          id: prod.id,
          alto: match ? match[1] : "",
          ancho: match ? match[2] : "",
          nota: prod.nota || "",
          imagen: prod.imagen || null,
          fileId: prod.fileId || null,
          cantidad: parseFloat(prod.cantidad) || 1,
          esStock: !!prod.stockId,
          titulo: prod.titulo || "Producto",
          stockId: prod.stockId || null,
          lineas: itemsProd.length ? itemsProd.map(function(it){
            return {
              id: uid(),
              nombre: it.nombre,
              descripcion: it.descripcion || "",
              precio: parseFloat(it.precio) || 0,
              costo: 0,
              tipo: it.tipo || "insumo",
              cat: it.cat || "impresion"
            };
          }) : [{id:uid(), nombre:prod.titulo||"Producto", descripcion:"", precio:0, costo:0, tipo:"insumo", cat:"impresion"}]
        };
      });
      setProductos(productosReconstruidos);
      setCliCot(pn.cliente || "");
      setTelCot(pn.tel || "");
      setValCot(pn.fechaEntrega || "");
      setNotaCot(pn.nota || "");
      // Descuento: preferir %; si el pedido viejo solo tiene $ de descuento, convertir a % equivalente para no perder el monto
      const subtotalCalc = productosReconstruidos.reduce(function(s,p){
        const subP = p.lineas.reduce(function(s2,l){return s2+(parseFloat(l.precio)||0);},0);
        return s + subP * (parseFloat(p.cantidad)||1);
      },0);
      let descPctFinal = parseFloat(pn.descuentoPct) || 0;
      if (!descPctFinal && parseFloat(pn.descuento) > 0 && subtotalCalc > 0) {
        descPctFinal = (parseFloat(pn.descuento) / subtotalCalc) * 100;
      }
      setDescCot(descPctFinal ? String(descPctFinal) : "");
      setEditandoPedidoOriginal(pn);
      setLineas([]);
      setMolSel(null);
      setAlto("");
      setAncho("");
      if (onLimpiarEdicionPedido) onLimpiarEdicionPedido();
    }
  }, [pedidoAEditar]);

  const ok = alto && ancho && parseFloat(alto) > 0 && parseFloat(ancho) > 0;
  const m2 = ok ? parseFloat(alto) * parseFloat(ancho) / 10000 : 0;
  const totalLineas = lineas.reduce((s,l) => s+(parseFloat(l.precio)||0), 0);
  const costoLineas = lineas.reduce((s,l) => s+(parseFloat(l.costo)||0), 0);
  const margen = totalLineas > 0 ? ((totalLineas-costoLineas)/totalLineas*100).toFixed(1) : 0;
  // Build flat items with productoId tagging + productos metadata array
  const todosItems = productos.flatMap(p => p.lineas.map(l => ({nombre:l.nombre,descripcion:l.descripcion,precio:l.precio,productoId:p.id})))
                      .concat(lineas.map(l => ({nombre:l.nombre,descripcion:l.descripcion,precio:l.precio,productoId:"_curso"})));
  const productosMeta = productos.map(p => ({id:p.id, titulo:(p.esStock ? p.titulo : "Cuadro "+(p.alto)+"x"+(p.ancho)+"cm"), nota:p.nota||"", imagen:p.imagen||null, fileId:p.fileId||null, stockId:p.stockId||null, cantidad: parseFloat(p.cantidad)||1}))
                          .concat(lineas.length ? [{id:"_curso", titulo:"Cuadro "+alto+"x"+ancho+"cm", nota:"", imagen:null, cantidad:1}] : []);
  const totalTotal = productos.reduce(function(s,p){
    const sub = p.lineas.reduce(function(ss,l){return ss+(parseFloat(l.precio)||0);},0);
    return s + sub * (parseFloat(p.cantidad)||1);
  },0) + lineas.reduce(function(s,l){return s+(parseFloat(l.precio)||0);},0);
  const molfil = molduras.filter(m => m && m.nombre && (m.nombre+"").toLowerCase().indexOf(molBusq.toLowerCase()) >= 0);

  // Dirty state for tab switch confirm
  React.useEffect(function() {
    const dirty = (productos.length > 0 || lineas.length > 0 || alto || ancho || cliCot || telCot || notaCot);
    setCotizadorDirty(!!dirty);
    return function() { setCotizadorDirty(false); };
  }, [productos.length, lineas.length, alto, ancho, cliCot, telCot, notaCot]);

  function addIns(m) {
    if (!ok) return;
    const a = parseFloat(alto)/100, b = parseFloat(ancho)/100;
    const precio = a * b * m.precio;
    const costo = a * b * m.costo;
    setLineas(lineas.concat([{id:uid(),nombre:m.nombre,descripcion:alto+"x"+ancho+"cm",precio:precio,cantidad:1,costo:costo,tipo:"insumo",cat:m.cat}]));
  }
  function addMol(mol) {
    if (!ok) return;
    const a = parseFloat(alto)/100, b = parseFloat(ancho)/100;
    const perim = 2*(a+b);
    const des = mol.desperdicio/100;
    const precio = (perim + des*2) * mol.precio_ml;
    const costo = (perim + des*2) * mol.costo_ml;
    setLineas(lineas.concat([{id:uid(),nombre:mol.nombre,descripcion:alto+"x"+ancho+"cm · desp "+mol.desperdicio+"cm",precio:precio,cantidad:1,costo:costo,tipo:"moldura",cat:"moldura"}]));
    setMolSel(mol);
  }
  function agregarProducto() {
    if (!lineas.length) return;
    setProductos(productos.concat([{id:uid(),alto:alto,ancho:ancho,lineas:lineas.slice(),nota:"",cantidad:1}]));
    setLineas([]);
    setMolSel(null);
    setAlto("");
    setAncho("");
  }
  function agregarDeStock(s) {
    const pid = uid();
    const titulo = s.nombre + " " + (s.alto||"") + (s.alto&&s.ancho?"x":"") + (s.ancho||"") + (s.alto||s.ancho?"cm":"");
    setProductos(productos.concat([{
      id: pid,
      esStock: true,
      stockId: s.id,
      titulo: titulo.trim(),
      alto: s.alto||"",
      ancho: s.ancho||"",
      nota: "",
      imagen: null,
      fileId: null,
      cantidad: 1,
      lineas: [{id:uid(), nombre:s.nombre, descripcion:(s.medidas||""), precio:parseFloat(s.precio)||0, costo:0, tipo:"insumo", cat:"stock"}]
    }]));
  }
  function duplicarProducto(pid) {
    setProductos(function(prev) {
      const orig = prev.find(function(p){return p.id === pid;});
      if (!orig) return prev;
      // Copia con nuevo id, sin imagen (para subir otra)
      const copia = Object.assign({}, orig, {
        id: uid(),
        lineas: orig.lineas.map(function(l){return Object.assign({},l,{id:uid()});}),
        imagen: null,
        fileId: null,
        cantidad: 1
      });
      // Insertar justo después del original
      const idx = prev.findIndex(function(p){return p.id === pid;});
      const nuevos = prev.slice();
      nuevos.splice(idx+1, 0, copia);
      return nuevos;
    });
  }
  function updateProductoNota(idx, val) {
    setProductos(function(prev) { return prev.map(function(p,i){ return i===idx ? Object.assign({},p,{nota:val}) : p; }); });
  }
  function actualizarProductoCot(id, field, val) {
    setProductos(function(prev) { return prev.map(function(p){ return p.id===id ? Object.assign({},p,{[field]:val}) : p; }); });
  }
  function handleImgProductoCot(pid, e) {
    const f = e.target.files[0];
    if (!f) return;
    actualizarProductoCot(pid, "subiendo", true);
    const r = new FileReader();
    r.onload = function(ev) {
      const base64Original = ev.target.result;
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxDim = 360;
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
        else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        const thumbnail = canvas.toDataURL('image/jpeg', 0.68);
        setProductos(function(prev){ return prev.map(function(p){ return p.id===pid ? Object.assign({},p,{imagen:thumbnail, subiendo:false}) : p; }); });
        // Subir original a Drive en paralelo
        fetch(API_URL, {
          method:'POST', headers:{"Content-Type":"text/plain"},
          body: JSON.stringify({accion:'subir_imagen', imagen:base64Original, nombre:'cotizacion_producto'})
        }).then(r=>r.json()).then(data=>{
          if (data && data.ok && data.fileId) {
            setProductos(function(prev){ return prev.map(function(p){ return p.id===pid ? Object.assign({},p,{fileId:data.fileId}) : p; }); });
          }
        }).catch(err=>{console.warn("Drive falló: "+err.message);});
      };
      img.onerror = function(){
        actualizarProductoCot(pid, "subiendo", false);
      };
      img.src = base64Original;
    };
    r.readAsDataURL(f);
  }
  function eliminarImagenProductoCot(pid) {
    if (!confirmar("¿Eliminar la imagen?")) return;
    setProductos(function(prev){ return prev.map(function(p){ return p.id===pid ? Object.assign({},p,{imagen:null,fileId:null}) : p; }); });
  }
  function eliminarProducto(id) {
    if (!confirmar("¿Eliminar este producto del cuadro?")) return;
    setProductos(productos.filter(function(x){return x.id !== id;}));
  }
  function guardarCot() {
    if (!cliCot) return;
    const desCotPct = parseFloat(descCot)||0;
    const totalConDesc = Math.max(0, totalTotal - (totalTotal*desCotPct/100));
    if (editandoFolio && setCotizaciones) {
      // Modo edición: actualizar cotización existente
      setCotizaciones(function(prev){
        return prev.map(function(c){
          if (String(c.folio) === String(editandoFolio)) {
            return Object.assign({},c,{cliente:cliCot,tel:telCot,validez:valCot,fechaEntrega:valCot,nota:notaCot,items:todosItems,productos:productosMeta,total:totalConDesc,descuentoPct:desCotPct});
          }
          return c;
        });
      });
      setEditandoFolio(null);
    } else {
      onCotizacionCreada({folio:nextFolioQ,cliente:cliCot,tel:telCot,validez:valCot,nota:notaCot,items:todosItems,productos:productosMeta,total:totalConDesc,descuentoPct:desCotPct,estado:"Pendiente",fecha:HOY});
      setNextFolioQ(f => f+1);
    }
    setModalCot(false);
    setCliCot("");
    setTelCot("");
    setDescCot("");
    setProductos([]);
    setLineas([]);
  }

  function cancelarEdicionPedido() {
    if (editandoPedidoOriginal) {
      if ((productos.length>0 || lineas.length>0) && !confirmar("¿Cancelar la edición de este pedido? Los cambios no guardados se perderán.")) return;
      setProductos([]);
      setLineas([]);
      setMolSel(null);
      setAlto("");
      setAncho("");
      setEditandoPedidoOriginal(null);
      if (onVolverAPedidos) onVolverAPedidos();
    } else {
      setLineas([]);
      setMolSel(null);
      setProductos([]);
      setAlto("");
      setAncho("");
    }
  }

  return (
    <div>
      {editandoPedidoOriginal && (
        <div style={{background:"#FFF3E0",border:"1px solid "+T.amber+"50",borderRadius:9,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:FS,fontSize:13,color:T.text}}>✏️ Editando pedido <b>#{editandoPedidoOriginal.folio}</b>{editandoPedidoOriginal.cliente ? " — "+editandoPedidoOriginal.cliente : ""}</div>
          <div style={{fontFamily:FS,fontSize:11,color:T.textFade}}>El folio, estado y pagos ya hechos se conservan al actualizar.</div>
        </div>
      )}
    <div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:20,alignItems:"start"}}>
      <div>
        <div style={{marginBottom:18}}>
          <ST>Medidas del cuadro</ST>
          <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:100}}>
              <label style={{color:T.textSub,fontSize:12,display:"block",marginBottom:4,fontFamily:FS,fontWeight:600}}>Alto (cm)</label>
              <input type="number" value={alto} onChange={e => setAlto(e.target.value)} placeholder="0" style={{width:"100%",background:T.bgCard,border:"2px solid "+(ok?T.amber:T.border),borderRadius:9,padding:"12px",color:T.text,fontFamily:FONT,fontSize:26,fontWeight:700,outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
            </div>
            <div style={{flex:1,minWidth:100}}>
              <label style={{color:T.textSub,fontSize:12,display:"block",marginBottom:4,fontFamily:FS,fontWeight:600}}>Ancho (cm)</label>
              <input type="number" value={ancho} onChange={e => setAncho(e.target.value)} placeholder="0" style={{width:"100%",background:T.bgCard,border:"2px solid "+(ok?T.amber:T.border),borderRadius:9,padding:"12px",color:T.text,fontFamily:FONT,fontSize:26,fontWeight:700,outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
            </div>
            {ok && (
              <div style={{background:"#FFF8E0",border:"1px solid "+T.amber+"40",borderRadius:9,padding:"10px 16px",textAlign:"center"}}>
                <div style={{color:T.textFade,fontSize:10,marginBottom:2,fontFamily:FS}}>Superficie</div>
                <div style={{color:T.amber,fontWeight:700,fontSize:16,fontFamily:FONT}}>{m2.toFixed(4)} m²</div>
                <div style={{color:T.textFade,fontSize:10,marginTop:2,fontFamily:FS}}>Perim: {(2*(parseFloat(alto)+parseFloat(ancho))/100).toFixed(2)} ml</div>
              </div>
            )}
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <ST>Moldura</ST>
          <input value={molBusq} onChange={e => setMolBusq(e.target.value)} placeholder="Buscar moldura..." style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 12px",color:T.text,fontFamily:FS,fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:7,maxHeight:180,overflowY:"auto"}}>
            {molfil.map(function(mol) {
              const prec = ok ? (2*(parseFloat(alto)/100+parseFloat(ancho)/100)+mol.desperdicio/100*2)*mol.precio_ml : 0;
              const sel = molSel && molSel.id === mol.id;
              return (
                <button key={mol.id} onClick={() => addMol(mol)} disabled={!ok} style={{background:sel?"#FFF8E0":T.bgCard,border:sel?"2px solid "+T.amber:"1px solid "+T.border,borderRadius:8,padding:"8px 10px",textAlign:"left",cursor:ok?"pointer":"not-allowed",opacity:ok?1:0.45,fontFamily:FS}}>
                  <div style={{color:T.text,fontSize:11,fontWeight:600,marginBottom:2}}>{mol.nombre}</div>
                  <div style={{color:T.amber,fontWeight:700,fontSize:14,fontFamily:FONT}}>{ok?fmt(prec):"—"}</div>
                  <div style={{color:T.textFade,fontSize:10}}>{fmt(mol.precio_ml)}/ml</div>
                </button>
              );
            })}
          </div>
        </div>
        {lineas.length > 0 && (
          <div style={{marginTop:18}}>
            <ST>Composicion del producto en curso — {alto}x{ancho}cm</ST>
            <div style={{background:T.bgDark,borderRadius:8,padding:"10px 12px",border:"1px solid "+T.border}}>
              {lineas.map(function(l) {
                return (
                  <div key={l.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,padding:"6px 8px",background:T.bgCard,borderRadius:6,border:"1px solid "+T.border}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600,fontFamily:FS,color:T.text}}>{l.nombre}</div>
                      <div style={{fontSize:10,color:T.textFade,fontFamily:FS}}>{l.descripcion}</div>
                    </div>
                    <div style={{fontFamily:FONT,fontWeight:700,fontSize:13,color:T.text}}>{fmt(l.precio)}</div>
                    <button onClick={() => setLineas(lineas.filter(x => x.id !== l.id))} style={{background:"none",border:"none",color:T.textFade,cursor:"pointer",fontSize:13,padding:"0 4px"}}>x</button>
                  </div>
                );
              })}
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+T.border,marginTop:8,paddingTop:8}}>
                <span style={{fontFamily:FS,fontSize:12,color:T.textSub}}>Subtotal · Margen: {margen}%</span>
                <span style={{fontFamily:FONT,fontWeight:700,color:T.amber,fontSize:14}}>{fmt(totalLineas)}</span>
              </div>
            </div>
          </div>
        )}
        <div style={{marginBottom:18}}>
          <ST>Insumos por m²</ST>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {CATS_INS.map(function(c) {
              return <button key={c.id} onClick={() => setCat(c.id)} style={{background:cat===c.id?c.color:T.bgCard,color:cat===c.id?"#fff":T.textSub,border:cat===c.id?"1px solid "+c.color:"1px solid "+T.border,borderRadius:18,padding:"5px 13px",cursor:"pointer",fontFamily:FS,fontSize:12,fontWeight:600}}>{c.icon} {c.label}</button>;
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:7}}>
            {insumos.filter(m => m.cat === cat).map(function(m) {
              const prec = ok ? (parseFloat(alto)/100)*(parseFloat(ancho)/100)*m.precio : 0;
              const ci = CATS_INS.find(c => c.id === m.cat);
              return (
                <button key={m.id} onClick={() => addIns(m)} disabled={!ok} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:8,padding:"8px 10px",textAlign:"left",cursor:ok?"pointer":"not-allowed",opacity:ok?1:0.45,fontFamily:FS}}>
                  <div style={{color:T.text,fontSize:11,fontWeight:600,marginBottom:2}}>{m.nombre}</div>
                  <div style={{color:(ci?ci.color:T.amber),fontWeight:700,fontSize:14,fontFamily:FONT}}>{ok?fmt(prec):"—"}</div>
                  <div style={{color:T.textFade,fontSize:10}}>{fmt(m.precio)}/m²</div>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <ST>Desde stock</ST>
          <div style={{color:T.textFade,fontSize:11,fontFamily:FS,marginBottom:8}}>Productos ya armados de inventario. Se agregan directo al pedido (sin medidas).</div>
          <input value={stkBusq} onChange={e => setStkBusq(e.target.value)} placeholder="Buscar en stock..." style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:7,padding:"8px 12px",color:T.text,fontFamily:FS,fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:7,maxHeight:200,overflowY:"auto"}}>
            {(stock||[]).filter(function(s){return s && s.nombre && (s.nombre+"").toLowerCase().indexOf(stkBusq.toLowerCase()) >= 0;}).map(function(s) {
              return (
                <button key={s.id} onClick={() => agregarDeStock(s)} style={{background:T.bgCard,border:"1px solid "+T.border,borderRadius:8,padding:"8px 10px",textAlign:"left",cursor:"pointer",fontFamily:FS}}>
                  <div style={{color:T.text,fontSize:11,fontWeight:600,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.nombre}</div>
                  <div style={{color:T.green,fontWeight:700,fontSize:14,fontFamily:FONT}}>{fmt(s.precio||0)}</div>
                  {(s.alto||s.ancho) && <div style={{color:T.textFade,fontSize:10}}>{s.alto||""}{s.alto&&s.ancho?"x":""}{s.ancho||""}{(s.alto||s.ancho)?"cm":""}</div>}
                </button>
              );
            })}
            {(stock||[]).length === 0 && <div style={{color:T.textFade,fontSize:11,fontFamily:FS,fontStyle:"italic",gridColumn:"1/-1",padding:"8px 0"}}>No hay productos en stock todavía.</div>}
          </div>
        </div>
      </div>
      <div style={{position:"sticky",top:0}}>
        <Card>
          <div style={{fontFamily:FONT,fontWeight:700,fontSize:15,color:T.text,marginBottom:12}}>Cotizacion</div>
          {productos.map(function(p, pi) {
            const subBase = p.lineas.reduce((s,l) => s+(parseFloat(l.precio)||0), 0);
            const cant = parseFloat(p.cantidad)||1;
            const sub = subBase * cant;
            const moldura = p.lineas.find(l => l.tipo === "moldura");
            const ins = p.lineas.filter(l => l.tipo === "insumo");
            const partes = [];
            if (moldura) partes.push(moldura.nombre);
            ins.forEach(i => partes.push(i.nombre));
            const desc = partes.join(", ");
            return (
              <div key={p.id} style={{background:"#FFF8F0",border:"1px solid "+T.amber+"30",borderRadius:8,padding:"9px 12px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:FONT,fontSize:12,fontWeight:700,color:T.text,marginBottom:2}}>{p.esStock ? p.titulo : ("Cuadro "+(pi+1)+" — "+p.alto+"x"+p.ancho+"cm")}</div>
                    {desc && <div style={{fontSize:11,color:T.textSub,fontFamily:FS,lineHeight:1.4}}>{desc}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <input type="number" min="1" step="1" value={p.cantidad||1} onChange={e => actualizarProductoCot(p.id, "cantidad", e.target.value)} title="Cantidad" style={{width:42,background:T.bgCard,border:"1px solid "+T.blue+"40",borderRadius:5,padding:"4px 6px",color:T.blue,fontFamily:FS,fontSize:12,fontWeight:700,outline:"none",textAlign:"center"}}/>
                    <span style={{color:T.textFade,fontSize:11}}>×</span>
                    <span style={{fontFamily:FONT,fontWeight:700,color:T.amber,fontSize:14,minWidth:65,textAlign:"right"}}>{fmt(sub)}</span>
                    <button onClick={() => duplicarProducto(p.id)} title="Duplicar producto (mismo precio, nueva imagen)" style={{background:"none",border:"1px solid "+T.green+"60",color:T.green,cursor:"pointer",fontSize:11,fontWeight:700,lineHeight:1,padding:"2px 6px",borderRadius:4}}>+1</button>
                    <button onClick={() => eliminarProducto(p.id)} style={{background:"none",border:"none",color:T.textFade,cursor:"pointer",fontSize:14,lineHeight:1}}>x</button>
                  </div>
                </div>
                <input
                  value={p.nota||""}
                  onChange={e => updateProductoNota(pi, e.target.value)}
                  placeholder="Nota del producto (color, detalles especiales...)"
                  style={{width:"100%",background:T.bgCard,border:"1px solid "+T.border,borderRadius:5,padding:"4px 8px",color:T.textSub,fontFamily:FS,fontSize:11,outline:"none",marginTop:6,boxSizing:"border-box"}}
                />
                {/* Imagen del producto */}
                <div style={{marginTop:8}}>
                  <label style={{display:"block",cursor:p.subiendo?"not-allowed":"pointer",opacity:p.subiendo?0.6:1}}>
                    {p.subiendo ? (
                      <div style={{background:T.bgCard,border:"2px dashed "+T.amber+"60",borderRadius:8,padding:"20px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:11}}>⏳ Subiendo imagen...</div>
                    ) : p.imagen ? (
                      <div style={{position:"relative"}}>
                        <img src={p.imagen} alt="" style={{width:"100%",maxHeight:220,objectFit:"contain",background:T.bgCard,border:"1px solid "+T.amber+"40",borderRadius:7,display:"block"}}/>
                        <div style={{position:"absolute",bottom:5,right:5,background:"rgba(0,0,0,0.6)",color:"#fff",padding:"2px 7px",borderRadius:4,fontSize:9,fontFamily:FS}}>Click para reemplazar</div>
                      </div>
                    ) : (
                      <div style={{background:T.bgCard,border:"2px dashed "+T.amber+"60",borderRadius:7,padding:"14px",textAlign:"center",color:T.textFade,fontFamily:FS,fontSize:11}}>
                        <div style={{fontSize:18,marginBottom:2}}>📷</div>
                        <div style={{fontWeight:600,color:T.amber}}>Subir imagen del producto</div>
                      </div>
                    )}
                    <input type="file" accept="image/*" onChange={e => handleImgProductoCot(p.id, e)} disabled={p.subiendo} style={{display:"none"}}/>
                  </label>
                  {p.imagen && !p.subiendo && <button onClick={() => eliminarImagenProductoCot(p.id)} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:10,fontFamily:FS,marginTop:3}}>Quitar imagen</button>}
                </div>
              </div>
            );
          })}
          {lineas.length > 0 && (
            <div style={{background:T.bgDark,borderRadius:8,padding:"9px 12px",marginBottom:8,border:"1px dashed "+T.amber+"60"}}>
              <div style={{fontFamily:FS,fontSize:11,color:T.textFade,fontWeight:600,marginBottom:5}}>En curso — {alto}x{ancho}cm</div>
              {lineas.map(function(l) {
                return <div key={l.id} style={{fontSize:11,color:T.textSub,fontFamily:FS,marginBottom:2}}>· {l.nombre}</div>;
              })}
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+T.border,marginTop:7,paddingTop:7}}>
                <span style={{fontFamily:FS,fontSize:11,color:T.textFade}}>Margen: {margen}%</span>
                <span style={{fontFamily:FONT,fontWeight:700,color:T.amber}}>{fmt(totalLineas)}</span>
              </div>
              <Btn onClick={agregarProducto} variant="success" style={{width:"100%",marginTop:8,fontSize:12}}>Agregar producto</Btn>
            </div>
          )}
          {(productos.length > 0 || lineas.length > 0) && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",background:"#FFF8E0",border:"1px solid "+T.amber+"30",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                <span style={{fontFamily:FONT,fontWeight:700}}>TOTAL</span>
                <span style={{color:T.amber,fontWeight:700,fontSize:22,fontFamily:FONT}}>{fmt(totalTotal)}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                <Btn onClick={() => setModalNota(true)} style={{width:"100%",padding:"10px 0"}}>{editandoPedidoOriginal ? "Actualizar pedido #"+editandoPedidoOriginal.folio : "Guardar pedido #"+nextFolio}</Btn>
                {!editandoPedidoOriginal && <Btn variant="amber" onClick={() => setModalCot(true)} style={{width:"100%",padding:"9px 0",fontSize:12}}>{editandoFolio ? "Actualizar cotización C-"+editandoFolio : "Guardar como cotización C-"+nextFolioQ}</Btn>}
                <Btn variant="danger" size="sm" style={{width:"100%"}} onClick={cancelarEdicionPedido}>{editandoPedidoOriginal ? "Cancelar edición" : "Limpiar todo"}</Btn>
              </div>
            </div>
          )}
          {productos.length === 0 && lineas.length === 0 && (
            <div style={{color:T.textFade,textAlign:"center",padding:"24px 0",fontSize:13,fontFamily:FS,lineHeight:1.8}}>Ingresa medidas<br/>y agrega materiales</div>
          )}
        </Card>
      </div>
      {modalNota && <ModalNota items={todosItems} productos={productosMeta} stock={stock} pedidoOriginal={editandoPedidoOriginal} descInicial={editandoPedidoOriginal ? descCot : ""} onClose={() => setModalNota(false)} onGuardar={function(p){
        if (editandoPedidoOriginal) {
          if (onPedidoActualizado) onPedidoActualizado(editandoPedidoOriginal, p);
          setEditandoPedidoOriginal(null);
          setLineas([]);setMolSel(null);setProductos([]);setAlto("");setAncho("");
          if (onVolverAPedidos) onVolverAPedidos();
        } else {
          onPedidoCreado(p);
          setNextFolio(f => f+1);
          setLineas([]);setMolSel(null);setProductos([]);setAlto("");setAncho("");
        }
      }} nextFolio={nextFolio}/>}
      {modalCot && (
        <Modal title={"Cotizacion C-"+nextFolioQ} onClose={() => setModalCot(false)}>
          <Inp label="Cliente *" value={cliCot} onChange={e => setCliCot(e.target.value)}/>
          <Inp label="Telefono" value={telCot} onChange={e => setTelCot(e.target.value)} type="tel"/>
          <Inp label="Valida hasta" value={valCot} onChange={e => setValCot(e.target.value)} type="date"/>
          <Inp label="Descuento (%)" value={descCot} onChange={e => setDescCot(e.target.value)} type="number"/>
          <Inp label="Observaciones" value={notaCot} onChange={e => setNotaCot(e.target.value)}/>
          <div style={{background:"#FFF8E0",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
            {(parseFloat(descCot)||0) > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontFamily:FS,fontSize:12,color:T.textSub}}>
                <span>Subtotal · Descuento {parseFloat(descCot)||0}%</span>
                <span>{fmt(totalTotal)} · -{fmt(totalTotal*(parseFloat(descCot)||0)/100)}</span>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontFamily:FONT,fontWeight:700}}>Total</span>
              <span style={{fontFamily:FONT,color:T.amber,fontWeight:700,fontSize:18}}>{fmt(Math.max(0, totalTotal - (totalTotal*(parseFloat(descCot)||0)/100)))}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <Btn variant="ghost" style={{flex:1}} onClick={() => generarPDF({folio:"C-"+nextFolioQ,tipo:"cotizacion",cliente:cliCot,clienteTel:telCot,clienteCorreo:"",fecha:HOY,fechaEntrega:valCot,items:todosItems,productos:productosMeta,stock:stock,anticipo:0,descuento:0,iva:false})}>Vista previa PDF</Btn>
            {telCot && <a href={"https://wa.me/52"+telCot.replace(/\D/g,"")+"?text="+encodeURIComponent("Cotizacion C-"+nextFolioQ+" — La Marqueria\nCliente: "+cliCot+"\nTotal: "+fmt(totalTotal)+"\nValida: "+fmtD(valCot)+"\n\nEn breve le enviamos el PDF. Gracias 🙏")} target="_blank" rel="noreferrer" style={{flex:1,display:"block",background:"#25D366",color:"#fff",borderRadius:7,padding:"8px 0",textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13,fontFamily:FS}}>WhatsApp</a>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={() => setModalCot(false)}>Cancelar</Btn>
            <Btn onClick={guardarCot} disabled={!cliCot}>{editandoFolio ? "Actualizar C-"+editandoFolio : "Guardar C-"+nextFolioQ}</Btn>
          </div>
        </Modal>
      )}
    </div>
    </div>
  );
}

function ModalNota({items, productos, onClose, onGuardar, nextFolio, stock, generarPDF, pedidoOriginal, descInicial}) {
  const [cliente, setCli] = useState(pedidoOriginal ? (pedidoOriginal.cliente||"") : "");
  const [tel, setTel] = useState(pedidoOriginal ? (pedidoOriginal.tel||"") : "");
  const [fechaEnt, setFE] = useState(pedidoOriginal ? (pedidoOriginal.fechaEntrega||"") : "");
  const [anticipo, setAnt] = useState(pedidoOriginal ? String(parseFloat(pedidoOriginal.anticipo)||0) : "");
  const [metodo, setMet] = useState(pedidoOriginal ? (pedidoOriginal.metodoPago||"Efectivo") : "Efectivo");
  const [nota, setNota] = useState(pedidoOriginal ? (pedidoOriginal.nota||"") : "");
  const [descPct, setDescPct] = useState(descInicial || "");
  const pedidoSim = {items: items, productos: productos, descuentoPct: parseFloat(descPct)||0};
  const sub = (productos && productos.length > 0) ? 
    productos.reduce(function(s,prod){
      const itemsProd = items.filter(function(it){return it.productoId === prod.id;});
      const subProd = itemsProd.reduce(function(ss,it){return ss + (parseFloat(it.precio)||0);},0);
      return s + subProd * (parseFloat(prod.cantidad)||1);
    },0) : totI(items);
  const ant = parseFloat(anticipo)||0;
  const desPct = parseFloat(descPct)||0;
  const desMonto = sub * desPct / 100;
  const total = Math.max(0, sub - desMonto);
  const saldo = Math.max(0, total - ant);
  const folioMostrar = pedidoOriginal ? pedidoOriginal.folio : nextFolio;
  function guardar() {
    if (!cliente) { alert("El cliente es obligatorio"); return; }
