/* ============================================================
   TAB GASTOS
   ============================================================ */
function TabGastos({gastos, setGastos, catGastos, setCatGastos, avisar}){
  const [modal, setModal] = useState(false);
  const [modalCat, setModalCat] = useState(false);
  const [nuevaCat, setNuevaCat] = useState('');
  const [filtroCat, setFiltroCat] = useState('');
  const [g, setG] = useState({fecha:hoyISO(), categoria:'', concepto:'', monto:'', metodo:'Efectivo'});

  const guardar = () => {
    if(!g.categoria || !g.monto) return;
    setGastos([{...g, id:uid(), monto:Number(g.monto)}, ...gastos]);
    setModal(false);
    setG({fecha:hoyISO(), categoria:'', concepto:'', monto:'', metodo:'Efectivo'});
    avisar('Gasto registrado');
  };
  const filtrados = filtroCat ? gastos.filter(x=>x.categoria===filtroCat) : gastos;
  const total = filtrados.reduce((s,x)=>s+x.monto,0);

  return (
    <div>
      <div className="titulo">Gastos</div>
      <div className="subtitulo">Registro de gastos con catálogo de categorías editable</div>
      <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap'}}>
        <button className="btn btn-p" onClick={()=>setModal(true)}>+ Registrar gasto</button>
        <button className="btn btn-s" onClick={()=>setModalCat(true)}>Categorías</button>
      </div>
      <div className="chips-rapidos" style={{marginBottom:14}}>
        <button className={'chip-f'+(filtroCat===''?' on':'')} onClick={()=>setFiltroCat('')}>Todas</button>
        {catGastos.map(c=><button key={c} className={'chip-f'+(filtroCat===c?' on':'')} onClick={()=>setFiltroCat(filtroCat===c?'':c)}>{c}</button>)}
      </div>
      <div className="stat" style={{marginBottom:14}}><div className="s-l">Total {filtroCat||'general'}</div><div className="s-v">{dinero(total)}</div><div className="s-x">{filtrados.length} registros</div></div>
      <div className="card">
        <table>
          <thead><tr><th>Fecha</th><th>Categoría</th><th>Concepto</th><th className="td-num">Monto</th></tr></thead>
          <tbody>
            {filtrados.map(x=>(
              <tr key={x.id}>
                <td>{fFecha(x.fecha)}</td>
                <td><span className="tag tag-gris">{x.categoria}</span></td>
                <td>{x.concepto || '—'} <span style={{color:'var(--gris-5)', fontSize:12}}>· {x.metodo}</span></td>
                <td className="td-num" style={{fontWeight:600}}>{dinero(x.monto)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtrados.length===0 && <Vacio t="Sin gastos" x="Aún no hay gastos en esta categoría"/>}
      </div>

      {modal && <Modal titulo="Registrar gasto" onCerrar={()=>setModal(false)}>
        <div className="grid2">
          <div className="campo"><label>Fecha</label><input type="date" value={g.fecha} onChange={e=>setG({...g, fecha:e.target.value})}/></div>
          <div className="campo"><label>Categoría</label>
            <select value={g.categoria} onChange={e=>setG({...g, categoria:e.target.value})}>
              <option value="">Elegir…</option>
              {catGastos.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="campo"><label>Concepto</label><input value={g.concepto} onChange={e=>setG({...g, concepto:e.target.value})} placeholder="Descripción del gasto"/></div>
        <div className="grid2">
          <div className="campo"><label>Monto $</label><input type="number" min="0" value={g.monto} onChange={e=>setG({...g, monto:e.target.value})}/></div>
          <div className="campo"><label>Método</label>
            <div className="metodo-row">
              {['Efectivo','Tarjeta','Transferencia'].map(m=>
                <button key={m} className={'metodo-btn'+(g.metodo===m?' on':'')} onClick={()=>setG({...g, metodo:m})}>{m==='Transferencia'?'Transf.':m}</button>)}
            </div>
          </div>
        </div>
        <button className="btn btn-p btn-block" onClick={guardar} disabled={!g.categoria || !g.monto}>Guardar gasto</button>
      </Modal>}

      {modalCat && <Modal titulo="Categorías de gasto" onCerrar={()=>setModalCat(false)}>
        {catGastos.map(c=>(
          <div key={c} className="carrito-line">
            <div style={{fontWeight:600}}>{c}</div>
            <button className="x-line" onClick={()=>setCatGastos(catGastos.filter(x=>x!==c))}>×</button>
          </div>
        ))}
        <div style={{display:'flex', gap:8, marginTop:12}}>
          <input placeholder="Nueva categoría" value={nuevaCat} onChange={e=>setNuevaCat(e.target.value)}/>
          <button className="btn btn-p" style={{flexShrink:0}} onClick={()=>{ if(nuevaCat && !catGastos.includes(nuevaCat)){ setCatGastos([...catGastos, nuevaCat]); setNuevaCat(''); } }}>Agregar</button>
        </div>
      </Modal>}
    </div>
  );
}

/* ============================================================
   TAB REPORTES
   ============================================================ */
function TabReportes({pedidos, ventas, gastos, productos, materiales, temas, clientes}){
  const [desde, setDesde] = useState(hoyISO());
  const [hasta, setHasta] = useState(hoyISO());
  const [rapido, setRapido] = useState('hoy');

  const setRango = tipo => {
    setRapido(tipo);
    const d = new Date();
    if(tipo==='hoy'){ setDesde(hoyISO()); setHasta(hoyISO()); }
    if(tipo==='semana'){ const s = new Date(); s.setDate(d.getDate()-6); setDesde(s.toISOString().slice(0,10)); setHasta(hoyISO()); }
    if(tipo==='mes'){ setDesde(hoyISO().slice(0,8)+'01'); setHasta(hoyISO()); }
  };
  const enRango = f => f >= desde && f <= hasta;

  // Ventas POS en rango
  const ventasR = ventas.filter(v=>enRango(v.fecha));
  const totalPos = ventasR.reduce((s,v)=>s+v.total,0);

  // Pagos de pedidos en rango (anticipos y liquidaciones)
  const pagosR = pedidos.flatMap(p=>(p.pagos||[]).filter(x=>enRango(x.fecha)));
  const totalPedidos = pagosR.reduce((s,x)=>s+x.monto,0);

  // Por método
  const porMetodo = m =>
    ventasR.filter(v=>v.metodo===m).reduce((s,v)=>s+v.total,0) +
    pagosR.filter(x=>x.metodo===m).reduce((s,x)=>s+x.monto,0);

  // Gastos
  const gastosR = gastos.filter(g=>enRango(g.fecha));
  const totalGastos = gastosR.reduce((s,g)=>s+g.monto,0);

  // Piezas vendidas: pedidos ENTREGADOS en rango + ventas POS
  const piezas = {};
  const temasCount = {};
  const nomTema = id => (temas.find(t=>t.id===id)||{}).nombre || '';
  ventasR.forEach(v=>v.items.forEach(i=>{
    const p = prodDe(i.prodId, productos);
    const k = (p ? prodEtiqueta(p) : 'Otro');
    piezas[k] = (piezas[k]||0) + i.cantidad;
    const tn = nomTema(i.temaId);
    if(tn) temasCount[tn] = (temasCount[tn]||0) + i.cantidad;
  }));
  pedidos.filter(p=>p.estado==='entregado' && p.fechaEntregado && enRango(p.fechaEntregado) && p.destino==='cliente').forEach(p=>{
    p.items.forEach(i=>{
      const pr = prodDe(i.prodId, productos);
      const k = (pr ? prodEtiqueta(pr) : 'Otro');
      piezas[k] = (piezas[k]||0) + 1;
      const tn = nomTema(i.temaId);
      if(tn) temasCount[tn] = (temasCount[tn]||0) + 1;
    });
  });
  const totalPzas = Object.values(piezas).reduce((a,b)=>a+b,0);

  // Costo de producción de lo vendido (utilidad estimada)
  let costoVendido = 0;
  ventasR.forEach(v=>v.items.forEach(i=>{ costoVendido += costoProduccion(prodDe(i.prodId, productos), materiales) * i.cantidad; }));
  pedidos.filter(p=>p.estado==='entregado' && p.fechaEntregado && enRango(p.fechaEntregado) && p.destino==='cliente').forEach(p=>{
    p.items.forEach(i=>{ costoVendido += costoProduccion(prodDe(i.prodId, productos), materiales); });
  });

  const ingresoTotal = totalPos + totalPedidos;

  // Utilidad por pedido entregado en el rango: costo real de materiales vs precio de venta
  const pedidosEntregadosRango = pedidos.filter(p=>p.estado==='entregado' && p.fechaEntregado && enRango(p.fechaEntregado) && p.destino==='cliente');
  const analisisPedidos = pedidosEntregadosRango.map(p=>{
    const costo = (p.items||[]).reduce((s,i)=>s + costoProduccion(prodDe(i.prodId, productos), materiales), 0);
    const util = (p.total||0) - costo;
    const margen = p.total>0 ? Math.round(util/p.total*100) : 0;
    const nc = clientes.find(c=>c.id===p.clienteId)?.nombre || p.clienteNombre || 'Cliente';
    return {p, nc, costo, util, margen};
  });
  const totCostoPed = analisisPedidos.reduce((s,a)=>s+a.costo, 0);
  const totVentaPed = analisisPedidos.reduce((s,a)=>s+a.p.total, 0);
  const totUtilPed = totVentaPed - totCostoPed;

  const [verDesglose, setVerDesglose] = useState('');
  const pedidosConPago = pedidos.filter(p=>p.destino==='cliente' && (p.pagos||[]).some(x=>enRango(x.fecha)));
  const nomTemaR = id => (temas.find(t=>t.id===id)||{}).nombre || 'Sin tema';

  return (
    <div>
      <div className="titulo">Reportes</div>
      <div className="subtitulo">Ventas, métodos de pago, piezas y temas — filtrable por fecha</div>

      <div className="filtros-fecha">
        <div className="chips-rapidos">
          {[['hoy','Hoy'],['semana','7 días'],['mes','Este mes'],['custom','Rango']].map(([k,t])=>
            <button key={k} className={'chip-f'+(rapido===k?' on':'')} onClick={()=>k==='custom'?setRapido('custom'):setRango(k)}>{t}</button>)}
        </div>
        {rapido==='custom' && <>
          <div className="campo"><label>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div className="campo"><label>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </>}
      </div>

      <div className="grid4" style={{marginBottom:14}}>
        <div className="stat"><div className="s-l">Ingreso total</div><div className="s-v">{dinero(ingresoTotal)}</div></div>
        <div className="stat"><div className="s-l">Ventas de pedidos</div><div className="s-v">{dinero(totalPedidos)}</div><div className="s-x">{pagosR.length} pagos</div></div>
        <div className="stat"><div className="s-l">Ventas de stock (POS)</div><div className="s-v">{dinero(totalPos)}</div><div className="s-x">{ventasR.length} ventas</div></div>
        <div className="stat"><div className="s-l">Gastos</div><div className="s-v">{dinero(totalGastos)}</div></div>
      </div>

      <div className="grid3" style={{marginBottom:14}}>
        {['Efectivo','Tarjeta','Transferencia'].map(m=>(
          <div key={m} className="stat"><div className="s-l">{m}</div><div className="s-v">{dinero(porMetodo(m))}</div></div>
        ))}
      </div>

      <div className="grid2" style={{alignItems:'start'}}>
        <div className="card">
          <div className="card-h">Cuadros vendidos por medida</div>
          {totalPzas===0 && <Vacio t="Sin ventas" x="No hay piezas vendidas en el rango"/>}
          <table><tbody>
            {Object.entries(piezas).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
              <tr key={k}><td style={{fontWeight:600}}>{k}</td><td className="td-num" style={{fontWeight:700}}>{v}</td></tr>
            ))}
            {totalPzas>0 && <tr><td style={{color:'var(--gris-5)'}}>Total piezas</td><td className="td-num" style={{fontWeight:700}}>{totalPzas}</td></tr>}
          </tbody></table>
        </div>
        <div className="card">
          <div className="card-h">Temas vendidos</div>
          {Object.keys(temasCount).length===0 && <Vacio t="Sin datos" x="Los temas aparecen al vender piezas con tema registrado"/>}
          <table><tbody>
            {Object.entries(temasCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
              <tr key={k}><td style={{fontWeight:600}}>{k}</td><td className="td-num" style={{fontWeight:700}}>{v}</td></tr>
            ))}
          </tbody></table>
        </div>
      </div>

      <div className="card" style={{marginTop:14}}>
        <div className="card-h">Desglose del periodo</div>
        <div className="chips-rapidos" style={{marginBottom:12}}>
          <button className={'chip-f'+(verDesglose==='pos'?' on':'')} onClick={()=>setVerDesglose(verDesglose==='pos'?'':'pos')}>Ventas de stock ({ventasR.length})</button>
          <button className={'chip-f'+(verDesglose==='pedidos'?' on':'')} onClick={()=>setVerDesglose(verDesglose==='pedidos'?'':'pedidos')}>Pedidos con pagos ({pedidosConPago.length})</button>
          <button className={'chip-f'+(verDesglose==='utilidad'?' on':'')} onClick={()=>setVerDesglose(verDesglose==='utilidad'?'':'utilidad')}>Costo vs venta ({analisisPedidos.length})</button>
        </div>
        {verDesglose==='' && <div style={{fontSize:12.5, color:'var(--gris-5)'}}>Toca una opción para ver el detalle de cada venta o pedido del periodo</div>}
        {verDesglose==='pos' && <>
          {ventasR.length===0 && <Vacio t="Sin ventas de stock" x="No hay ventas POS en el rango"/>}
          {ventasR.map(v=>(
            <div key={v.id} style={{border:'1px solid var(--gris-2)', borderRadius:8, padding:'9px 12px', marginBottom:8}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                <span style={{fontSize:12.5, color:'var(--gris-5)'}}>{fFecha(v.fecha)} · {v.metodo}{v.descuento>0?' · desc '+v.descuento+'%':''}</span>
                <span style={{fontWeight:700}}>{dinero(v.total)}</span>
              </div>
              {v.items.map((i,ix)=>{
                const p = prodDe(i.prodId, productos);
                return <div key={ix} style={{fontSize:13}}>{i.cantidad} × {nomTemaR(i.temaId)} <span style={{color:'var(--gris-5)'}}>· {prodEtiqueta(p)}</span></div>;
              })}
            </div>
          ))}
        </>}
        {verDesglose==='pedidos' && <>
          {pedidosConPago.length===0 && <Vacio t="Sin pedidos" x="No hay pedidos con pagos en el rango"/>}
          {pedidosConPago.map(p=>{
            const pagosRango = (p.pagos||[]).filter(x=>enRango(x.fecha));
            const cobradoRango = pagosRango.reduce((s,x)=>s+x.monto,0);
            const pagadoTotal = (p.pagos||[]).reduce((s,x)=>s+x.monto,0);
            const saldo = p.total - pagadoTotal;
            const nc = clientes.find(c=>c.id===p.clienteId)?.nombre || p.clienteNombre || 'Cliente';
            return (
              <div key={p.id} style={{border:'1px solid var(--gris-2)', borderRadius:8, padding:'9px 12px', marginBottom:8}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                  <span><b>#{p.folio}</b> · {nc}</span>
                  <span style={{fontWeight:700}}>{dinero(cobradoRango)}</span>
                </div>
                <div style={{fontSize:12.5, color:'var(--gris-5)'}}>
                  {pagosRango.map((x,ix)=><span key={ix}>{fFecha(x.fecha)} {x.metodo} {dinero(x.monto)}{ix<pagosRango.length-1?' · ':''}</span>)}
                </div>
                <div style={{fontSize:12.5, marginTop:3}}>
                  Total {dinero(p.total)} · {saldo>0 ? <span style={{color:'var(--rojo)', fontWeight:600}}>saldo {dinero(saldo)}</span> : <span style={{color:'var(--verde)', fontWeight:600}}>saldado</span>}
                  {p.estado==='entregado' ? ' · entregado' : ' · en producción'}
                </div>
              </div>
            );
          })}
        </>}
        {verDesglose==='utilidad' && <>
          {analisisPedidos.length===0 && <Vacio t="Sin pedidos entregados" x="No hay pedidos entregados en el rango para analizar"/>}
          {analisisPedidos.map(({p, nc, costo, util, margen})=>(
            <div key={p.id} style={{border:'1px solid var(--gris-2)', borderRadius:8, padding:'9px 12px', marginBottom:8}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:4}}>
                <span><b>#{p.folio}</b> · {nc}</span>
                <span style={{fontWeight:700, color:util>=0?'var(--verde)':'var(--rojo)'}}>{dinero(util)} · {margen}%</span>
              </div>
              <div style={{fontSize:12.5, color:'var(--gris-5)'}}>
                Venta {dinero(p.total)} · Costo producción {dinero(Math.round(costo))} · {(p.items||[]).length} pza
              </div>
            </div>
          ))}
          {analisisPedidos.length>0 && <div className="total-box" style={{marginTop:4}}>
            <div className="t-row"><span>Venta total ({analisisPedidos.length} pedidos)</span><span>{dinero(totVentaPed)}</span></div>
            <div className="t-row"><span>Costo de producción total</span><span>−{dinero(Math.round(totCostoPed))}</span></div>
            <div className="t-row big"><span>Utilidad total de pedidos</span><span>{dinero(Math.round(totUtilPed))} · {totVentaPed>0?Math.round(totUtilPed/totVentaPed*100):0}%</span></div>
          </div>}
        </>}
      </div>

      <div className="total-box" style={{marginTop:14}}>
        <div className="t-row"><span>Ingreso total</span><span>{dinero(ingresoTotal)}</span></div>
        <div className="t-row"><span>Costo de producción de lo vendido</span><span>−{dinero(Math.round(costoVendido))}</span></div>
        <div className="t-row"><span>Gastos del periodo</span><span>−{dinero(totalGastos)}</span></div>
        <div className="t-row big"><span>Utilidad estimada</span><span>{dinero(Math.round(ingresoTotal - costoVendido - totalGastos))}</span></div>
      </div>
    </div>
  );
}

/* ============================================================
   TAB USUARIOS (permisos por módulo)
   ============================================================ */
function TabUsuarios({usuarios, setUsuarios}){
  const [editando, setEditando] = useState(null);
  const guardar = u => {
    if(u.id) setUsuarios(usuarios.map(x=>x.id===u.id?u:x));
    else setUsuarios([...usuarios, {...u, id:uid()}]);
    setEditando(null);
  };
  const togglePerm = (u, mod) => {
    const tiene = u.modulos.includes(mod);
    setEditando({...u, modulos: tiene ? u.modulos.filter(m=>m!==mod) : [...u.modulos, mod]});
  };
  return (
    <div>
      <div className="titulo">Usuarios</div>
      <div className="subtitulo">Cada usuario ve solo los módulos que le asignes</div>
      <div className="card">
        <div className="card-h">Equipo <button className="btn btn-p btn-mini" onClick={()=>setEditando({nombre:'', rol:'', pin:'', modulos:['hoy','flujo']})}>+ Nuevo usuario</button></div>
        <table>
          <thead><tr><th>Usuario</th><th>Rol</th><th>Módulos</th><th></th></tr></thead>
          <tbody>
            {usuarios.map(u=>(
              <tr key={u.id}>
                <td style={{fontWeight:600}}>{u.nombre}</td>
                <td>{u.rol}</td>
                <td><span className="tag tag-gris">{u.modulos.length} de {MODULOS.length}</span></td>
                <td style={{textAlign:'right'}}><button className="btn btn-s btn-mini" onClick={()=>setEditando({...u, modulos:[...u.modulos]})}>Editar</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {editando && <Modal titulo={editando.id?'Editar usuario':'Nuevo usuario'} onCerrar={()=>setEditando(null)}>
        <div className="grid2">
          <div className="campo"><label>Nombre</label><input value={editando.nombre} onChange={e=>setEditando({...editando, nombre:e.target.value})}/></div>
          <div className="campo"><label>Rol</label><input value={editando.rol} placeholder="Ventas, Producción…" onChange={e=>setEditando({...editando, rol:e.target.value})}/></div>
        </div>
        <div className="campo"><label>PIN (4 dígitos)</label><input maxLength="4" value={editando.pin} onChange={e=>setEditando({...editando, pin:e.target.value.replace(/\D/g,'')})}/></div>
        <div className="campo">
          <label>Módulos con acceso</label>
          <div className="perm-grid">
            {MODULOS.map(m=>(
              <label key={m.id} className="perm-item">
                <input type="checkbox" checked={editando.modulos.includes(m.id)} onChange={()=>togglePerm(editando, m.id)}/>
                {m.nombre}
              </label>
            ))}
          </div>
        </div>
        <button className="btn btn-p btn-block" onClick={()=>guardar(editando)} disabled={!editando.nombre || editando.pin.length!==4}>Guardar usuario</button>
      </Modal>}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [usuarios, setUsuarios] = useState(USUARIOS_INI);
  const [usuario, setUsuario] = useState(null);
  const [tab, setTab] = useState('hoy');

  const [materiales, setMateriales] = useState(MATERIALES_INI);
  const [productos, setProductos] = useState(PRODUCTOS_INI);
  const [temas, setTemas] = useState(TEMAS_INI);
  const [stock, setStock] = useState(STOCK_INI);
  const [clientes, setClientes] = useState(CLIENTES_INI);
  const [pedidos, setPedidos] = useState(PEDIDOS_INI);
  const [ventas, setVentas] = useState(VENTAS_INI);
  const [gastos, setGastos] = useState(GASTOS_INI);
  const [catGastos, setCatGastos] = useState(CAT_GASTOS_INI);
  const [folio, setFolio] = useState(104);

  const [editar, setEditar] = useState(null);
  const [entregando, setEntregando] = useState(null);
  const [toast, setToast] = useState('');
  const [listo, setListo] = useState(API.MODE!=='sheets');
  const [cargando, setCargando] = useState(API.MODE==='sheets');
  const avisar = m => { setToast(m); setTimeout(()=>setToast(''), 2600); };
  const crearTema = nombre => { const t = {id:uid(), nombre}; setTemas(prev=>[...prev, t]); return t.id; };

  // Carga inicial desde Google Sheets (si está conectado)
  useEffect(()=>{
    if(API.MODE!=='sheets') return;
    API.cargar().then(datos=>{
      const vacio = !datos.usuarios || datos.usuarios.length===0;
      if(vacio){
        // Primera vez: sembramos catálogo base para que el login y las bases funcionen de inmediato
        setUsuarios(USUARIOS_INI); setProductos(PRODUCTOS_INI); setMateriales(MATERIALES_INI);
        setTemas(TEMAS_INI); setCatGastos(CAT_GASTOS_INI);
        setPedidos([]); setVentas([]); setGastos([]); setStock([]); setClientes([]); setFolio(101);
        API.guardarTodo({usuarios:USUARIOS_INI, productos:PRODUCTOS_INI, materiales:MATERIALES_INI, temas:TEMAS_INI, catGastos:CAT_GASTOS_INI, pedidos:[], ventas:[], gastos:[], stock:[], clientes:[], folio:101});
      } else {
        setUsuarios(datos.usuarios); setProductos(datos.productos); setMateriales(datos.materiales);
        setTemas(datos.temas); setCatGastos(datos.catGastos && datos.catGastos.length ? datos.catGastos : CAT_GASTOS_INI);
        setPedidos(datos.pedidos||[]); setVentas(datos.ventas||[]); setGastos(datos.gastos||[]);
        setStock(datos.stock||[]); setClientes(datos.clientes||[]); setFolio(datos.folio || 101);
      }
      setListo(true); setCargando(false);
    }).catch(()=>{
      avisar('No se pudo conectar con Google Sheets — revisa la URL del Apps Script');
      setListo(true); setCargando(false);
    });
  }, []);

  // Autoguardado: 2.5s después del último cambio, se sube todo el estado a Sheets
  useEffect(()=>{
    if(!listo || API.MODE!=='sheets') return;
    const t = setTimeout(()=>{
      API.guardarTodo({usuarios, productos, materiales, temas, catGastos, pedidos, ventas, gastos, stock, clientes, folio})
        .then(r=>{ if(r && r.ok===false) avisar('No se pudo guardar en Sheets, se reintentará'); });
    }, 2500);
    return ()=>clearTimeout(t);
  }, [usuarios, productos, materiales, temas, catGastos, pedidos, ventas, gastos, stock, clientes, folio, listo]);

  const crearPedido = (datos, edit) => {
    if(edit){
      setPedidos(pedidos.map(p=>p.id!==edit.id?p:{
        ...p, ...datos,
        pagos: p.pagos, // se conservan pagos históricos
      }));
      avisar('Pedido <b>#'+edit.folio+'</b> actualizado');
      setTab('flujo');
      return;
    }
    const nuevo = {
      id:uid(), folio, fecha:hoyISO(), estado:'produccion', ...datos,
      pagos: datos.anticipo>0 ? [{monto:datos.anticipo, metodo:datos.metodoAnticipo, fecha:hoyISO()}] : [],
    };
    setPedidos([nuevo, ...pedidos]);
    setFolio(folio+1);
    avisar((datos.destino==='stock'?'Producción para stock':'Pedido')+' <b>#'+folio+'</b> creado');
    setTab('flujo');
  };

  const editarPedido = p => { setEditar(p); setTab('pedido'); };

  const cobrarYEntregar = p => setEntregando(p);

  const confirmarEntrega = (p, metodo) => {
    const pagado = (p.pagos||[]).reduce((s,x)=>s+x.monto,0);
    const resta = p.total - pagado;
    setPedidos(pedidos.map(x=>x.id!==p.id?x:{
      ...x, estado:'entregado', fechaEntregado:hoyISO(),
      pagos: resta>0 ? [...x.pagos, {monto:resta, metodo, fecha:hoyISO()}] : x.pagos,
    }));
    setEntregando(null);
    avisar('Pedido <b>#'+p.folio+'</b> entregado'+(resta>0?' · cobrado '+dinero(resta):''));
  };

  const terminarStock = p => {
    let nuevoStock = [...stock];
    p.items.forEach(i=>{
      if(!i.temaId) return;
      const ex = nuevoStock.find(s=>s.prodId===i.prodId && s.temaId===i.temaId);
      if(ex) nuevoStock = nuevoStock.map(s=>s.id===ex.id?{...s, cantidad:s.cantidad+1}:s);
      else nuevoStock.push({id:uid(), prodId:i.prodId, temaId:i.temaId, cantidad:1});
    });
    setStock(nuevoStock);
    setPedidos(pedidos.map(x=>x.id!==p.id?x:{...x, estado:'entregado', fechaEntregado:hoyISO()}));
    avisar('<b>'+p.items.length+' piezas</b> sumadas al inventario');
  };

  const venderStock = (carrito, total, descuento, metodo) => {
    setStock(stock.map(s=>{
      const c = carrito.find(x=>x.stockId===s.id);
      return c ? {...s, cantidad:s.cantidad - c.cantidad} : s;
    }));
    const venta = {id:uid(), fecha:hoyISO(), items:carrito.map(c=>({prodId:c.prodId, temaId:c.temaId, cantidad:c.cantidad, precio:c.precio})), total, descuento, metodo};
    setVentas([venta, ...ventas]);
    avisar('Venta de <b>'+dinero(total)+'</b> registrada · '+metodo);
  };

  if(cargando) return (
    <div className="login-wrap">
      <div className="login-card">
        <img className="marca-img marca-img-login" src={LOGO_URI} alt="FANATICARTE"/>
        <div className="login-sub">Conectando con Google Sheets…</div>
      </div>
    </div>
  );

  if(!usuario) return <Login usuarios={usuarios} onEntrar={u=>{setUsuario(u); setTab(u.modulos[0]||'hoy');}}/>;

  const misModulos = MODULOS.filter(m=>usuario.modulos.includes(m.id));
  const pendientes = pedidos.filter(p=>p.estado!=='entregado' && diasPara(p.entrega)<=0).length;

  return (
    <div className="shell">
      <div className="topbar">
        <img className="marca-img marca-img-top" src={LOGO_URI} alt="FANATICARTE"/>
        <div className="topbar-right">
          {API.MODE==='demo' ? <span className="demo-flag">Demo</span> : <span className="demo-flag" style={{background:'var(--verde-suave)', color:'var(--verde)'}}>Sheets conectado</span>}
          <div className="chip-user"><div className="avatar">{usuario.nombre.slice(0,2).toUpperCase()}</div><span>{usuario.nombre}</span></div>
          <button className="btn-salir" onClick={()=>setUsuario(null)}>Salir</button>
        </div>
      </div>
      <div className="nav">
        {misModulos.map(m=>(
          <button key={m.id} className={'nav-btn'+(tab===m.id?' on':'')} onClick={()=>{setTab(m.id); if(m.id!=='pedido') setEditar(null);}}>
            {m.nombre}{m.id==='flujo' && pendientes>0 && <span className="nb-badge">{pendientes}</span>}
          </button>
        ))}
      </div>
      <div className="main">
        {tab==='hoy'        && <TabHoy pedidos={pedidos} ventas={ventas} gastos={gastos} clientes={clientes} productos={productos} ir={setTab}/>}
        {tab==='pedido'     && <TabPedido key={editar?editar.id:'nuevo'} productos={productos} materiales={materiales} temas={temas} crearTema={crearTema} clientes={clientes} setClientes={setClientes} crearPedido={crearPedido} editar={editar} setEditar={setEditar} avisar={avisar}/>}
        {tab==='flujo'      && <TabFlujo pedidos={pedidos} setPedidos={setPedidos} clientes={clientes} productos={productos} temas={temas} cobrarYEntregar={cobrarYEntregar} terminarStock={terminarStock} editarPedido={editarPedido} avisar={avisar}/>}
        {tab==='ventas'     && <TabVentas pedidos={pedidos} setPedidos={setPedidos} clientes={clientes} productos={productos} temas={temas} ventas={ventas} avisar={avisar}/>}
        {tab==='pos'        && <TabPos stock={stock} productos={productos} temas={temas} venderStock={venderStock}/>}
        {tab==='inventario' && <TabInventario stock={stock} setStock={setStock} productos={productos} temas={temas} crearTema={crearTema} ir={setTab}/>}
        {tab==='bases'      && <TabBases productos={productos} setProductos={setProductos} materiales={materiales} setMateriales={setMateriales} temas={temas} setTemas={setTemas} stock={stock} pedidos={pedidos} ventas={ventas} avisar={avisar}/>}
        {tab==='clientes'   && <TabClientes clientes={clientes} setClientes={setClientes} pedidos={pedidos} ventas={ventas} productos={productos} temas={temas}/>}
        {tab==='gastos'     && <TabGastos gastos={gastos} setGastos={setGastos} catGastos={catGastos} setCatGastos={setCatGastos} avisar={avisar}/>}
        {tab==='reportes'   && <TabReportes pedidos={pedidos} ventas={ventas} gastos={gastos} productos={productos} materiales={materiales} temas={temas} clientes={clientes}/>}
        {tab==='usuarios'   && <TabUsuarios usuarios={usuarios} setUsuarios={setUsuarios}/>}
      </div>

      {entregando && (()=>{
        const pagado = (entregando.pagos||[]).reduce((s,x)=>s+x.monto,0);
        const resta = entregando.total - pagado;
        return (
          <Modal titulo={'Entregar pedido #'+entregando.folio} onCerrar={()=>setEntregando(null)}>
            <div className="total-box" style={{marginBottom:14}}>
              <div className="t-row"><span>Total del pedido</span><span>{dinero(entregando.total)}</span></div>
              <div className="t-row"><span>Pagado</span><span>−{dinero(pagado)}</span></div>
              <div className="t-row big"><span>Por cobrar</span><span>{dinero(resta)}</span></div>
            </div>
            {resta>0 ? <>
              <label>Método de pago del restante</label>
              <div className="metodo-row" style={{marginBottom:14}}>
                {['Efectivo','Tarjeta','Transferencia'].map(m=>
                  <button key={m} className="metodo-btn" onClick={()=>confirmarEntrega(entregando, m)}>{m}</button>)}
              </div>
              <div style={{fontSize:12.5, color:'var(--gris-5)', textAlign:'center'}}>Toca el método para cobrar y entregar</div>
            </> :
              <button className="btn btn-p btn-block" onClick={()=>confirmarEntrega(entregando, 'Efectivo')}>Confirmar entrega (ya está pagado)</button>}
          </Modal>
        );
      })()}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
