<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FANATICARTE — Sistema</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --amarillo:#FFDD00;
    --amarillo-suave:#FFF7C2;
    --negro:#141414;
    --tinta:#1F1F1F;
    --gris-7:#4A4A4A;
    --gris-5:#8A8A86;
    --gris-3:#D8D8D3;
    --gris-2:#EBEBE6;
    --fondo:#FAFAF7;
    --blanco:#FFFFFF;
    --rojo:#D64541;
    --rojo-suave:#FDEBEA;
    --verde:#2E8B57;
    --verde-suave:#E7F4EC;
    --azul:#3B6EA5;
    --azul-suave:#EAF1F8;
    --radio:10px;
    --sombra:0 1px 3px rgba(20,20,20,.06), 0 4px 14px rgba(20,20,20,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--fondo);color:var(--tinta);font-size:14px;line-height:1.45}
  #root{min-height:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--tinta)}
  input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--gris-3);border-radius:8px;background:var(--blanco);outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--negro)}
  input[type=checkbox]{width:auto}
  label{display:block;font-size:11px;font-weight:600;color:var(--gris-7);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  ::placeholder{color:var(--gris-5)}

  /* ===== marca ===== */
  .marca{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:800;letter-spacing:.02em;display:inline-flex;align-items:baseline;gap:1px}
  .marca .m1{color:var(--negro)}
  .marca .m2{background:var(--negro);color:var(--amarillo);padding:1px 6px 2px;border-radius:5px;margin-left:2px}
  .marca-img{display:block;border-radius:8px;object-fit:cover}
  .marca-img-login{height:64px;margin:0 auto 6px;border-radius:12px}
  .marca-img-top{height:34px}

  /* ===== login ===== */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--fondo);padding:20px}
  .login-card{width:100%;max-width:360px;text-align:center}
  .login-card .marca{font-size:34px;margin-bottom:6px}
  .login-sub{color:var(--gris-5);font-size:12px;text-transform:uppercase;letter-spacing:.18em;margin-bottom:34px}
  .login-users{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
  .login-user{display:flex;align-items:center;gap:14px;background:var(--blanco);border:1.5px solid var(--gris-2);border-radius:var(--radio);padding:14px 16px;text-align:left;transition:border-color .15s}
  .login-user:hover{border-color:var(--negro)}
  .login-user.sel{border-color:var(--negro);box-shadow:0 0 0 2px var(--amarillo)}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--amarillo);color:var(--negro);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .login-user .lu-n{font-weight:600;font-size:15px}
  .login-user .lu-r{font-size:12px;color:var(--gris-5)}
  .pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--gris-3);background:var(--blanco)}
  .pin-dot.on{background:var(--negro);border-color:var(--negro)}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
  .pin-key{background:var(--blanco);border:1.5px solid var(--gris-2);border-radius:12px;padding:16px 0;font-size:18px;font-weight:600;transition:background .1s}
  .pin-key:active{background:var(--amarillo-suave)}
  .demo-note{margin-top:26px;font-size:12px;color:var(--gris-5)}
  .demo-note b{color:var(--gris-7)}

  /* ===== shell ===== */
  .shell{display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:var(--blanco);border-bottom:1px solid var(--gris-2);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:40}
  .topbar .marca{font-size:19px}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .chip-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
  .chip-user .avatar{width:28px;height:28px;font-size:12px}
  .btn-salir{font-size:12px;color:var(--gris-5);font-weight:600;padding:6px 10px;border-radius:7px}
  .btn-salir:hover{background:var(--gris-2);color:var(--tinta)}
  .demo-flag{font-size:10px;font-weight:700;letter-spacing:.1em;background:var(--amarillo);color:var(--negro);padding:3px 8px;border-radius:5px;text-transform:uppercase}

  .nav{background:var(--blanco);border-bottom:1px solid var(--gris-2);display:flex;overflow-x:auto;padding:0 10px;position:sticky;top:56px;z-index:39;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav-btn{white-space:nowrap;padding:13px 14px;font-size:13px;font-weight:600;color:var(--gris-5);border-bottom:2.5px solid transparent;transition:color .15s}
  .nav-btn:hover{color:var(--tinta)}
  .nav-btn.on{color:var(--negro);border-bottom-color:var(--amarillo)}
  .nav-btn .nb-badge{display:inline-block;margin-left:6px;background:var(--negro);color:var(--amarillo);font-size:10px;font-weight:700;border-radius:9px;padding:1px 7px;vertical-align:1px}

  .main{flex:1;padding:18px;max-width:1180px;width:100%;margin:0 auto}
  @media(min-width:760px){.main{padding:26px 28px}}

  /* ===== bloques ===== */
  .titulo{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:21px;margin-bottom:4px}
  .subtitulo{color:var(--gris-5);font-size:13px;margin-bottom:20px}
  .card{background:var(--blanco);border:1px solid var(--gris-2);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra)}
  .card+.card{margin-top:14px}
  .card-h{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:700px){.grid3,.grid4{grid-template-columns:1fr 1fr}}
  @media(max-width:460px){.grid2{grid-template-columns:1fr}}
  .campo{margin-bottom:12px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:8px;transition:transform .08s, background .15s}
  .btn:active{transform:scale(.98)}
  .btn-p{background:var(--negro);color:var(--amarillo)}
  .btn-p:hover{background:#000}
  .btn-s{background:var(--blanco);border:1.5px solid var(--gris-3);color:var(--tinta)}
  .btn-s:hover{border-color:var(--negro)}
  .btn-am{background:var(--amarillo);color:var(--negro)}
  .btn-rojo{background:var(--rojo-suave);color:var(--rojo)}
  .btn-mini{padding:6px 11px;font-size:12px;border-radius:7px}
  .btn-block{width:100%}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
  .tag-am{background:var(--amarillo-suave);color:#8a7500}
  .tag-gris{background:var(--gris-2);color:var(--gris-7)}
  .tag-verde{background:var(--verde-suave);color:var(--verde)}
  .tag-rojo{background:var(--rojo-suave);color:var(--rojo)}
  .tag-azul{background:var(--azul-suave);color:var(--azul)}
  .tag-negro{background:var(--negro);color:var(--amarillo)}

  .stat{background:var(--blanco);border:1px solid var(--gris-2);border-radius:var(--radio);padding:14px 16px}
  .stat .s-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gris-5)}
  .stat .s-v{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:22px;margin-top:3px}
  .stat .s-x{font-size:12px;color:var(--gris-5);margin-top:2px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gris-5);padding:8px 10px;border-bottom:1.5px solid var(--gris-2)}
  td{padding:10px;border-bottom:1px solid var(--gris-2);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .td-num{text-align:right;font-variant-numeric:tabular-nums}
  th.td-num{text-align:right}

  /* ===== flujo ===== */
  .flujo-cols{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:900px){.flujo-cols{grid-template-columns:1fr 1fr 1fr}}
  .fcol-h{display:flex;align-items:center;gap:8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
  .fcol-h .fc-n{background:var(--gris-2);border-radius:8px;font-size:11px;padding:1px 8px}
  .fcol-h.urgente{color:var(--rojo)}
  .pedido-card{background:var(--blanco);border:1px solid var(--gris-2);border-left:4px solid var(--gris-3);border-radius:var(--radio);padding:13px 14px;margin-bottom:10px;box-shadow:var(--sombra)}
  .pedido-card.urgente{border-left-color:var(--rojo)}
  .pedido-card.hoy{border-left-color:var(--amarillo)}
  .pedido-card.ok{border-left-color:var(--verde)}
  .pc-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pc-folio{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:15px}
  .pc-cliente{font-size:13px;color:var(--gris-7);margin-top:1px}
  .pc-fecha{font-size:12px;color:var(--gris-5);margin-top:2px}
  .pc-items{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .item-row{display:flex;align-items:center;gap:10px;background:var(--fondo);border:1px solid var(--gris-2);border-radius:8px;padding:8px 10px}
  .item-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;background:var(--gris-2);flex-shrink:0;border:1px solid var(--gris-2)}
  .item-thumb-ph{width:44px;height:44px;border-radius:6px;background:var(--gris-2);color:var(--gris-5);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .item-info{flex:1;min-width:0}
  .item-t{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-m{font-size:12px;color:var(--gris-5)}
  .checks{display:flex;gap:6px}
  .chk{font-size:11px;font-weight:700;padding:5px 9px;border-radius:6px;border:1.5px solid var(--gris-3);color:var(--gris-5);background:var(--blanco);text-transform:uppercase;letter-spacing:.03em}
  .chk.on{background:var(--negro);border-color:var(--negro);color:var(--amarillo)}
  .pc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:8px;flex-wrap:wrap}
  .envio-box{margin-top:10px;background:var(--azul-suave);border-radius:8px;padding:9px 11px;font-size:12.5px;color:var(--azul)}
  .envio-box b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .guia-img{margin-top:7px;max-width:130px;border-radius:6px;border:1px solid var(--gris-3);display:block}

  /* ===== constructor pedido ===== */
  .prod-line{display:flex;gap:12px;align-items:flex-start;background:var(--fondo);border:1px solid var(--gris-2);border-radius:var(--radio);padding:12px;margin-bottom:10px}
  .up-thumb{width:74px;height:74px;border-radius:8px;border:1.5px dashed var(--gris-3);background:var(--blanco);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gris-5);text-align:center;cursor:pointer;flex-shrink:0;overflow:hidden;text-transform:uppercase;letter-spacing:.04em}
  .up-thumb img{width:100%;height:100%;object-fit:cover}
  .up-thumb{position:relative}
  .up-thumb.up-err{border-color:var(--rojo);border-style:solid}
  .up-badge{position:absolute;left:0;right:0;bottom:0;background:rgba(20,20,20,.82);color:#fff;font-size:8.5px;padding:3px 2px;letter-spacing:.03em;text-align:center}
  .up-badge-err{background:var(--rojo)}
  .aviso-sub{margin-top:12px;padding:9px 12px;border-radius:8px;background:var(--gris-1);border:1px solid var(--gris-2);font-size:12.5px;color:var(--gris-t)}
  .aviso-sub.aviso-err{background:#FEF2F2;border-color:#FECACA;color:#B91C1C}
  .img-rota{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--gris-1);color:var(--gris-5);font-size:9px;text-align:center}
  .prod-line-campos{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px}
  @media(max-width:560px){.prod-line-campos{grid-template-columns:1fr}}
  .x-line{color:var(--gris-5);font-size:18px;font-weight:600;padding:2px 8px;border-radius:6px}
  .x-line:hover{background:var(--rojo-suave);color:var(--rojo)}
  .total-box{background:var(--negro);color:var(--blanco);border-radius:var(--radio);padding:16px 18px;display:flex;flex-direction:column;gap:7px}
  .total-box .t-row{display:flex;justify-content:space-between;font-size:13.5px;color:#CFCFCA}
  .total-box .t-row.big{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;font-size:20px;color:var(--amarillo);border-top:1px solid #3A3A3A;padding-top:9px;margin-top:3px}

  /* ===== pos ===== */
  .pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .pos-item{background:var(--blanco);border:1.5px solid var(--gris-2);border-radius:var(--radio);padding:12px;text-align:left;transition:border-color .12s}
  .pos-item:hover{border-color:var(--negro)}
  .pos-item .pi-t{font-weight:600;font-size:13px}
  .pos-item .pi-m{font-size:12px;color:var(--gris-5)}
  .pos-item .pi-p{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:700;margin-top:5px}
  .pos-item .pi-s{font-size:11px;color:var(--gris-5)}
  .pos-item.agotado{opacity:.45;pointer-events:none}
  .carrito-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gris-2);font-size:13.5px;gap:8px}
  .cant-ctrl{display:flex;align-items:center;gap:8px}
  .cant-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--gris-3);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
  .metodo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .metodo-btn{padding:10px 6px;border-radius:8px;border:1.5px solid var(--gris-3);font-weight:600;font-size:12.5px;background:var(--blanco)}
  .metodo-btn.on{background:var(--negro);border-color:var(--negro);color:var(--amarillo)}

  /* ===== modal ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,20,.45);z-index:80;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:640px){.modal-bg{align-items:center;padding:24px}}
  .modal{background:var(--blanco);width:100%;max-width:560px;border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;padding:20px}
  @media(min-width:640px){.modal{border-radius:14px}}
  .modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-h .titulo{margin-bottom:0;font-size:18px}
  .modal-x{font-size:22px;color:var(--gris-5);padding:2px 10px;border-radius:7px}
  .modal-x:hover{background:var(--gris-2);color:var(--tinta)}

  .vacio{text-align:center;padding:40px 20px;color:var(--gris-5)}
  .vacio .v-t{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-weight:600;font-size:15px;color:var(--gris-7);margin-bottom:4px}

  .receta-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .receta-row select{flex:2}
  .receta-row input{flex:1}
  .receta-row2{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .receta-row2 select{flex:1;min-width:0}
  .receta-row2 .rc-cant{width:70px;flex:none}
  .receta-row2 .rc-auto{width:96px;flex:none;font-size:12px;color:var(--gris-t);text-align:center}
  .receta-row2 .rc-costo{width:74px;flex:none;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}

  .filtros-fecha{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .filtros-fecha .campo{margin-bottom:0;min-width:140px}
  .chips-rapidos{display:flex;gap:6px;flex-wrap:wrap}
  .chip-f{font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;border:1.5px solid var(--gris-3);background:var(--blanco)}
  .chip-f.on{background:var(--negro);border-color:var(--negro);color:var(--amarillo)}

  .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .perm-item{display:flex;align-items:center;gap:9px;background:var(--fondo);border:1px solid var(--gris-2);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:500;cursor:pointer}
  .perm-item input{width:16px;height:16px;accent-color:var(--negro)}

  .subnav{display:flex;gap:6px;margin-bottom:18px;background:var(--gris-2);padding:4px;border-radius:10px;width:fit-content;max-width:100%;overflow-x:auto}
  .subnav-btn{white-space:nowrap;padding:8px 16px;font-size:13px;font-weight:600;color:var(--gris-7);border-radius:7px}
  .subnav-btn.on{background:var(--blanco);color:var(--negro);box-shadow:var(--sombra)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--negro);color:var(--blanco);padding:12px 22px;border-radius:10px;font-weight:600;font-size:13.5px;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:toastIn .2s ease}
  .toast b{color:var(--amarillo)}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useRef} = React;

/* ============================================================
   CONFIGURACIÓN DE CONEXIÓN
   Pega aquí la URL de tu Apps Script (paso final de la guía de
   conexión) y el sistema se conecta solo — mientras esté vacía,
   sigue funcionando en modo demo con datos de ejemplo.
   ============================================================ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlGPgMvw46rq-uLP3Hy5811hnDTSeSFO5azItzwISczO2edtA2V8FoZ8pBBNHMCe2KVw/exec';

/* Una imagen es "temporal" mientras sea base64 (data:...). Esas NUNCA deben
   viajar a Google Sheets: una sola rebasa el límite de 50,000 caracteres por
   celda, Sheets la corta a la mitad y el JSON del pedido queda roto — se pierde
   el pedido completo al recargar. Solo se guardan URLs de Drive. */
const esBase64 = v => typeof v === 'string' && v.startsWith('data:');

/* Deja el pedido listo para Sheets: quita las imágenes que todavía no se
   subieron a Drive y las marcas temporales de progreso. No toca el estado de
   la app, así que el usuario sigue viendo su vista previa en pantalla. */
const pedidosParaGuardar = pedidos => (pedidos||[]).map(p=>{
  const items = (p.items||[]).map(i=>{
    const {imgEstado, ...limpio} = i;               // el progreso no se guarda
    return esBase64(limpio.imagen) ? {...limpio, imagen:''} : limpio;
  });
  let envio = p.envio;
  if(envio){
    const {guiaEstado, ...limpioEnvio} = envio;
    envio = esBase64(limpioEnvio.guia) ? {...limpioEnvio, guia:''} : limpioEnvio;
  }
  return {...p, items, envio};
});

const API = {
  URL: APPS_SCRIPT_URL,
  MODE: APPS_SCRIPT_URL ? 'sheets' : 'demo',
  cargar(){
    return fetch(API.URL, {method:'GET'}).then(r=>r.json());
  },
  guardarTodo(datos){
    if(API.MODE!=='sheets') return Promise.resolve({ok:true});
    const limpio = {...datos, pedidos: pedidosParaGuardar(datos.pedidos)};
    return fetch(API.URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({accion:'guardarTodo', ...limpio})
    }).then(r=>r.json()).catch(()=>({ok:false}));
  },
  subirImagen(dataUrl, nombre){
    if(API.MODE!=='sheets') return Promise.resolve(null);
    return fetch(API.URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({accion:'subirImagen', nombre, datos:dataUrl})
    })
    .then(r=>r.json())
    .then(d=>(d && d.url) ? d.url : null)
    .catch(()=>null);
  }
};

const hoyISO = () => new Date().toISOString().slice(0,10);
const dinero = n => '$' + (Number(n)||0).toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
const fFecha = iso => { if(!iso) return '—'; const d = new Date(iso + 'T12:00:00'); return d.toLocaleDateString('es-MX',{day:'numeric',month:'short'}); };
const diasPara = iso => { if(!iso) return 999; const a = new Date(hoyISO()+'T12:00:00'), b = new Date(iso+'T12:00:00'); return Math.round((b-a)/86400000); };
const uid = () => Math.random().toString(36).slice(2,9);

/* ============================================================
   HELPERS DE NEGOCIO
   ============================================================ */
/* Costo de un material dentro de un producto, según su unidad.
   Las medidas del producto (alto, ancho) se capturan en CENTÍMETROS.
   - m²    → área del cuadro:  (alto × ancho) / 10000  →  m²  ×  costo por m²
   - metro → los 4 lados del marco: (alto + ancho) × 2  →  /100  →  metros  ×  costo por metro
   - pza   → cantidad fija capturada (no depende de la medida)  ×  costo por pieza */
const costoMaterialEnProducto = (mat, cant, alto, ancho) => {
  if(!mat) return 0;
  const A = Number(alto)||0, W = Number(ancho)||0, precio = Number(mat.costo)||0;
  if(mat.unidad === 'm²'){
    const areaM2 = (A * W) / 10000;          // cm² → m²
    return areaM2 * precio;
  }
  if(mat.unidad === 'metro'){
    const metrosLineales = ((A + W) * 2) / 100; // 4 lados en cm → m
    return metrosLineales * precio;
  }
  return (Number(cant)||0) * precio;          // pza
};

/* Cantidad calculada de un material, para mostrarla en el editor */
const cantidadMaterial = (mat, alto, ancho) => {
  if(!mat) return '';
  const A = Number(alto)||0, W = Number(ancho)||0;
  if(mat.unidad === 'm²')    return Number(((A * W) / 10000).toFixed(3)) + ' m²';
  if(mat.unidad === 'metro') return Number((((A + W) * 2) / 100).toFixed(2)) + ' m';
  return '';
};

const costoProduccion = (prod, materiales) => {
  if(!prod || !prod.receta) return 0;
  const alto = prod.alto, ancho = prod.ancho;
  return prod.receta.reduce((s,r) => {
    const m = materiales.find(x=>x.id===r.mat);
    return s + costoMaterialEnProducto(m, r.cant, alto, ancho);
  }, 0);
};

/* Devuelve la receta con el costo calculado de cada material (para desglose) */
const desgloseProduccion = (prod, materiales) => {
  if(!prod || !prod.receta) return [];
  return prod.receta.map(r=>{
    const m = materiales.find(x=>x.id===r.mat);
    return {
      mat: m,
      cant: r.cant,
      costo: costoMaterialEnProducto(m, r.cant, prod.alto, prod.ancho)
    };
  });
};
const prodDe = (id, productos) => productos.find(p=>p.id===id);
const medidaTxt = p => (p && p.alto && p.ancho) ? (p.alto + '×' + p.ancho) : (p && p.medida ? p.medida : '');
const prodEtiqueta = p => p ? (p.tipo + ' ' + medidaTxt(p)).trim() : '—';

const leerImagen = (file, cb) => {
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 600;
      let {width:w, height:h} = img;
      if(w>MAX || h>MAX){ const k = MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg', .75));
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
};

/* Sube la miniatura a la carpeta de Drive y reemplaza la vista previa local
   (base64) por la URL permanente. Informa el avance con un patch:
     {imgEstado:'subiendo'} → {imagen:URL, imgEstado:'ok'} → o {imgEstado:'error'}
   Mientras el estado no sea 'ok', la imagen no se guarda en Sheets. */
const subirImagenAuto = (dataUrl, nombre, aplicar) => {
  if(API.MODE!=='sheets'){ aplicar({imgEstado:'local'}); return; }
  aplicar({imgEstado:'subiendo'});
  API.subirImagen(dataUrl, nombre).then(url=>{
    if(url) aplicar({imagen:url, imgEstado:'ok'});
    else    aplicar({imgEstado:'error'});
  });
};

          <div className="titulo">{titulo}</div>
          <button className="modal-x" onClick={onCerrar}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Toast({msg}){ return msg ? <div className="toast" dangerouslySetInnerHTML={{__html:msg}}/> : null; }

function Vacio({t, x}){ return <div className="vacio"><div className="v-t">{t}</div><div>{x}</div></div>; }

/* Miniatura tolerante a fallos: si la imagen de Drive no carga (link roto,
   permisos, sin internet) muestra un aviso en vez del ícono de imagen rota */
function Miniatura({src, clase, claseVacio, textoVacio}){
  const [falla, setFalla] = useState(false);
  useEffect(()=>{ setFalla(false); }, [src]);
  if(!src || falla) return <div className={claseVacio}>{falla ? 'No carga' : textoVacio}</div>;
  return <img className={clase} src={src} alt="" loading="lazy" onError={()=>setFalla(true)}/>;
}

function SelectTema({value, onChange, temas, crearTema}){
  const [nuevo, setNuevo] = useState(false);
  const [n, setN] = useState('');
  if(nuevo){
    return (
      <div style={{display:'flex', gap:6}}>
        <input autoFocus placeholder="Nombre del tema" value={n} onChange={e=>setN(e.target.value)}/>
        <button className="btn btn-p btn-mini" style={{flexShrink:0}} onClick={()=>{
          if(!n.trim()) return;
          const id = crearTema(n.trim());
          onChange(id); setNuevo(false); setN('');
        }}>Guardar</button>
        <button className="btn btn-s btn-mini" style={{flexShrink:0}} onClick={()=>{setNuevo(false); setN('');}}>×</button>
      </div>
    );
  }
  return (
    <div style={{display:'flex', gap:6}}>
      <select value={value||''} onChange={e=>onChange(e.target.value)}>
        <option value="">Elegir tema…</option>
        {temas.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
      </select>
      <button className="btn btn-s btn-mini" style={{flexShrink:0}} onClick={()=>setNuevo(true)}>+ Tema</button>
    </div>
  );
}

/* ============================================================
   LOGIN
   ============================================================ */
function Login({usuarios, onEntrar}){
  const [sel, setSel] = useState(null);
  const [pin, setPin] = useState('');
  const [err, setErr] = useState(false);

  const tecla = d => {
    if(!sel) return;
    const nuevo = (pin + d).slice(0,4);
    setPin(nuevo);
    if(nuevo.length === 4){
      const u = usuarios.find(x=>x.id===sel);
      if(u && u.pin === nuevo){ onEntrar(u); }
      else { setErr(true); setTimeout(()=>{ setPin(''); setErr(false); }, 450); }
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <img className="marca-img marca-img-login" src={LOGO_URI} alt="FANATICARTE"/>
        <div className="login-sub">Sistema de gestión</div>
        <div className="login-users">
          {usuarios.map(u=>(
            <button key={u.id} className={'login-user'+(sel===u.id?' sel':'')} onClick={()=>{setSel(u.id); setPin('');}}>
              <div className="avatar">{u.nombre.slice(0,2).toUpperCase()}</div>
              <div><div className="lu-n">{u.nombre}</div><div className="lu-r">{u.rol}</div></div>
            </button>
          ))}
        </div>
        {sel && <>
          <div className="pin-row">
            {[0,1,2,3].map(i=><div key={i} className={'pin-dot'+(pin.length>i?' on':'')} style={err?{borderColor:'var(--rojo)',background:pin.length>i?'var(--rojo)':'#fff'}:{}}/>)}
          </div>
          <div className="pin-pad">
            {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} className="pin-key" onClick={()=>tecla(String(n))}>{n}</button>)}
            <div/>
            <button className="pin-key" onClick={()=>tecla('0')}>0</button>
            <button className="pin-key" onClick={()=>setPin(pin.slice(0,-1))}>←</button>
          </div>
        </>}
        <div className="demo-note">Modo demo — PIN de <b>Charly: 1234</b> · <b>Raúl: 2222</b></div>
      </div>
    </div>
  );
}

/* ============================================================
   TAB HOY
   ============================================================ */
function TabHoy({pedidos, ventas, gastos, clientes, productos, ir}){
  const hoy = hoyISO();
  const activos = pedidos.filter(p=>p.estado!=='entregado');
  const urgentes = activos.filter(p=>diasPara(p.entrega)<0);
  const paraHoy  = activos.filter(p=>diasPara(p.entrega)===0);
  const ventasHoy = ventas.filter(v=>v.fecha===hoy);
  const pagosHoy = pedidos.flatMap(p=>(p.pagos||[]).filter(x=>x.fecha===hoy).map(x=>x.monto)).reduce((a,b)=>a+b,0);
  const ingresoHoy = ventasHoy.reduce((s,v)=>s+v.total,0) + pagosHoy;
  const gastosHoy = gastos.filter(g=>g.fecha===hoy).reduce((s,g)=>s+g.monto,0);

  const nomCliente = p => p.destino==='stock' ? 'Producción para stock' : (clientes.find(c=>c.id===p.clienteId)?.nombre || p.clienteNombre || 'Cliente');

  return (
    <div>
      <div className="titulo">Hoy</div>
      <div className="subtitulo">{new Date().toLocaleDateString('es-MX',{weekday:'long', day:'numeric', month:'long'})}</div>
      <div className="grid4" style={{marginBottom:16}}>
        <div className="stat"><div className="s-l">Ingresos hoy</div><div className="s-v">{dinero(ingresoHoy)}</div><div className="s-x">{ventasHoy.length} ventas POS</div></div>
        <div className="stat"><div className="s-l">Gastos hoy</div><div className="s-v">{dinero(gastosHoy)}</div></div>
        <div className="stat"><div className="s-l">Para entregar hoy</div><div className="s-v">{paraHoy.length}</div></div>
        <div className="stat" style={urgentes.length?{borderColor:'var(--rojo)'}:{}}><div className="s-l" style={urgentes.length?{color:'var(--rojo)'}:{}}>Atrasados</div><div className="s-v" style={urgentes.length?{color:'var(--rojo)'}:{}}>{urgentes.length}</div></div>
      </div>

      {(urgentes.length>0 || paraHoy.length>0) &&
        <div className="card">
          <div className="card-h">Requieren atención <button className="btn btn-s btn-mini" onClick={()=>ir('flujo')}>Ir al flujo</button></div>
          {[...urgentes, ...paraHoy].map(p=>(
            <div key={p.id} className={'pedido-card '+(diasPara(p.entrega)<0?'urgente':'hoy')} style={{marginBottom:8}}>
              <div className="pc-top">
                <div>
                  <span className="pc-folio">#{p.folio}</span>
                  <div className="pc-cliente">{nomCliente(p)}</div>
                </div>
                <span className={'tag '+(diasPara(p.entrega)<0?'tag-rojo':'tag-am')}>{diasPara(p.entrega)<0?'Atrasado':'Entrega hoy'}</span>
              </div>
              <div className="pc-fecha">{p.items.length} producto{p.items.length!==1?'s':''} · entrega {fFecha(p.entrega)}</div>
            </div>
          ))}
        </div>
      }
      <div className="card">
        <div className="card-h">Acciones rápidas</div>
        <div className="grid3">
          <button className="btn btn-p btn-block" onClick={()=>ir('pedido')}>Nuevo pedido</button>
          <button className="btn btn-am btn-block" onClick={()=>ir('pos')}>Vender de stock</button>
          <button className="btn btn-s btn-block" onClick={()=>ir('gastos')}>Registrar gasto</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   TAB NUEVO PEDIDO
   ============================================================ */
function TabPedido({productos, materiales, temas, crearTema, clientes, setClientes, crearPedido, editar, setEditar, avisar}){
  const vacio = () => ({id:uid(), prodId:'', temaId:'', imagen:null, tBastidor:false, tImagen:false});
  const [items, setItems] = useState(editar ? editar.items.map(i=>({...i})) : [vacio()]);
  const [clienteId, setClienteId] = useState(editar?.clienteId || '');
  const [destino, setDestino] = useState(editar?.destino || 'cliente');
  const [entrega, setEntrega] = useState(editar?.entrega || manana(3));
  const [descuento, setDescuento] = useState(editar?.descuento || 0);
  const [anticipo, setAnticipo] = useState(editar?.anticipo || 0);
  const [metodoAnt, setMetodoAnt] = useState(editar?.metodoAnticipo || 'Efectivo');
  const [conEnvio, setConEnvio] = useState(!!editar?.envio);
  const [envio, setEnvio] = useState(editar?.envio || {ciudad:'', direccion:'', paqueteria:'', guia:null});
  const [nuevoCliente, setNuevoCliente] = useState(false);
  const [nc, setNc] = useState({nombre:'', telefono:'', ciudad:'', comentarios:''});

  const setItem = (id, patch) => setItems(prev=>prev.map(i=>i.id===id?{...i,...patch}:i));

  // Control de subidas: no se debe crear el pedido mientras una imagen siga en base64
  const subiendoImgs = items.filter(i=>i.imgEstado==='subiendo').length + (envio.guiaEstado==='subiendo'?1:0);
  const fallaronImgs = items.filter(i=>i.imgEstado==='error').length + (envio.guiaEstado==='error'?1:0);
  const subtotal = items.reduce((s,i)=>{ const p=prodDe(i.prodId, productos); return s + (p?p.precio:0); },0);
  const total = destino==='stock' ? 0 : Math.round(subtotal * (1 - descuento/100));
  const cliente = clientes.find(c=>c.id===clienteId);

  const guardarCliente = () => {
    if(!nc.nombre) return;
    const c = {id:uid(), ...nc};
    setClientes([...clientes, c]);
    setClienteId(c.id);
    setNuevoCliente(false);
    setNc({nombre:'', telefono:'', ciudad:'', comentarios:''});
  };

  const confirmar = () => {
    const validos = items.filter(i=>i.prodId);
    if(!validos.length){ avisar('Agrega al menos un producto'); return; }
    if(validos.some(i=>!i.temaId)){ avisar('Selecciona el tema de cada producto'); return; }
    if(destino==='cliente' && !clienteId){ avisar('Selecciona un cliente'); return; }
    crearPedido({
      clienteId: destino==='stock' ? null : clienteId,
      clienteNombre: destino==='stock' ? 'Stock FANATICARTE' : undefined,
      destino, entrega, descuento:Number(descuento)||0,
      anticipo:Number(anticipo)||0, metodoAnticipo:metodoAnt,
      items: validos, total,
      envio: (conEnvio && destino==='cliente') ? envio : null,
    }, editar);
    setItems([vacio()]); setClienteId(''); setDescuento(0); setAnticipo(0); setConEnvio(false);
    setEnvio({ciudad:'', direccion:'', paqueteria:'', guia:null});
    if(editar) setEditar(null);
  };

  return (
    <div>
      <div className="titulo">{editar ? 'Editar pedido #' + editar.folio : 'Nuevo pedido'}</div>
      <div className="subtitulo">{destino==='stock' ? 'Producción especial: al terminar se suma al inventario' : 'Cada producto lleva su tamaño y su imagen'}</div>

      <div className="card">
        <div className="card-h">Destino</div>
        <div className="metodo-row" style={{gridTemplateColumns:'1fr 1fr'}}>
          <button className={'metodo-btn'+(destino==='cliente'?' on':'')} onClick={()=>setDestino('cliente')}>Pedido de cliente</button>
          <button className={'metodo-btn'+(destino==='stock'?' on':'')} onClick={()=>setDestino('stock')}>Producción para stock</button>
        </div>
      </div>

      {destino==='cliente' && <div className="card">
        <div className="card-h">Cliente <button className="btn btn-s btn-mini" onClick={()=>setNuevoCliente(true)}>+ Nuevo cliente</button></div>
        <select value={clienteId} onChange={e=>setClienteId(e.target.value)}>
          <option value="">Seleccionar cliente…</option>
          {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} · {c.telefono}</option>)}
        </select>
        {cliente && cliente.comentarios && <div className="envio-box" style={{marginTop:10}}><b>Preferencias</b>{cliente.comentarios}</div>}
      </div>}

      <div className="card">
        <div className="card-h">Productos <button className="btn btn-s btn-mini" onClick={()=>setItems([...items, vacio()])}>+ Agregar producto</button></div>
        {items.map(it=>{
          const p = prodDe(it.prodId, productos);
          return (
            <div key={it.id} className="prod-line">
              <label className={'up-thumb'+(it.imgEstado==='error'?' up-err':'')} style={{marginBottom:0}}>
                {it.imagen ? <img src={it.imagen} alt=""/> : 'Subir imagen'}
                {it.imgEstado==='subiendo' && <span className="up-badge">Subiendo…</span>}
                {it.imgEstado==='error' && <span className="up-badge up-badge-err">Error — toca</span>}
                <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{ const f=e.target.files[0]; if(f) leerImagen(f, d=>{ setItem(it.id,{imagen:d, imgEstado:'subiendo'}); subirImagenAuto(d, 'pedido_'+it.id, patch=>setItem(it.id, patch)); }); }}/>
              </label>
              <div className="prod-line-campos">
                <div>
                  <label>Producto / tamaño</label>
                  <select value={it.prodId} onChange={e=>setItem(it.id,{prodId:e.target.value})}>
                    <option value="">Elegir…</option>
                    {productos.filter(p=>p.activo).map(p=><option key={p.id} value={p.id}>{p.nombre} — {dinero(p.precio)}</option>)}
                  </select>
                </div>
                <div>
                  <label>Tema</label>
                  <SelectTema value={it.temaId} onChange={id=>setItem(it.id,{temaId:id})} temas={temas} crearTema={crearTema}/>
                </div>
              </div>
              <button className="x-line" onClick={()=>setItems(items.length>1?items.filter(x=>x.id!==it.id):[vacio()])}>×</button>
            </div>
          );
        })}
      </div>

      {destino==='cliente' && <>
        <div className="card">
          <div className="card-h">Entrega y pago</div>
          <div className="grid3">
            <div className="campo"><label>Fecha de entrega</label><input type="date" value={entrega} onChange={e=>setEntrega(e.target.value)}/></div>
            <div className="campo"><label>Descuento %</label><input type="number" min="0" max="100" value={descuento} onChange={e=>setDescuento(e.target.value)}/></div>
            <div className="campo"><label>Anticipo $</label><input type="number" min="0" value={anticipo} onChange={e=>setAnticipo(e.target.value)}/></div>
          </div>
          {Number(anticipo)>0 && <div className="campo"><label>Método del anticipo</label>
            <div className="metodo-row">
              {['Efectivo','Tarjeta','Transferencia'].map(m=>
                <button key={m} className={'metodo-btn'+(metodoAnt===m?' on':'')} onClick={()=>setMetodoAnt(m)}>{m}</button>)}
            </div>
          </div>}
        </div>

        <div className="card">
          <div className="card-h">Envío a otra ciudad
            <label className="perm-item" style={{marginBottom:0}}><input type="checkbox" checked={conEnvio} onChange={e=>setConEnvio(e.target.checked)}/> Lleva envío</label>
          </div>
          {conEnvio && <div className="grid2">
            <div className="campo"><label>Ciudad destino</label><input value={envio.ciudad} onChange={e=>setEnvio({...envio, ciudad:e.target.value})} placeholder="Mazatlán"/></div>
            <div className="campo"><label>Paquetería</label><input value={envio.paqueteria} onChange={e=>setEnvio({...envio, paqueteria:e.target.value})} placeholder="Estafeta, DHL…"/></div>
            <div className="campo" style={{gridColumn:'1 / -1'}}><label>Dirección</label><input value={envio.direccion} onChange={e=>setEnvio({...envio, direccion:e.target.value})} placeholder="Calle, colonia, CP"/></div>
            <div className="campo" style={{gridColumn:'1 / -1'}}>
              <label>Guía de envío (foto o captura)</label>
              <label className={'up-thumb'+(envio.guiaEstado==='error'?' up-err':'')} style={{width:'100%', height:90}}>
                {envio.guia ? <img src={envio.guia} alt=""/> : 'Subir guía — también se puede cargar después desde el flujo'}
                {envio.guiaEstado==='subiendo' && <span className="up-badge">Subiendo…</span>}
                {envio.guiaEstado==='error' && <span className="up-badge up-badge-err">Error — toca</span>}
                <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{ const f=e.target.files[0]; if(f) leerImagen(f, d=>{ setEnvio(prev=>({...prev, guia:d, guiaEstado:'subiendo'})); subirImagenAuto(d, 'guia_temp_'+uid(), patch=>setEnvio(prev=>({...prev, guia: patch.imagen!==undefined?patch.imagen:prev.guia, guiaEstado: patch.imgEstado}))); }); }}/>
              </label>
            </div>
          </div>}
        </div>
      </>}

      <div className="total-box" style={{marginTop:14}}>
        {destino==='cliente' ? <>
          <div className="t-row"><span>Subtotal</span><span>{dinero(subtotal)}</span></div>
          {descuento>0 && <div className="t-row"><span>Descuento {descuento}%</span><span>−{dinero(subtotal-total)}</span></div>}
          {Number(anticipo)>0 && <div className="t-row"><span>Anticipo</span><span>−{dinero(anticipo)}</span></div>}
          <div className="t-row big"><span>{Number(anticipo)>0?'Resta':'Total'}</span><span>{dinero(total - (Number(anticipo)||0))}</span></div>
        </> : <div className="t-row big"><span>Producción interna</span><span>{items.filter(i=>i.prodId).length} pzas</span></div>}
      </div>
      {subiendoImgs > 0 && <div className="aviso-sub">Espera: {subiendoImgs} {subiendoImgs===1?'imagen se está subiendo':'imágenes se están subiendo'} a Drive…</div>}
      {fallaronImgs > 0 && <div className="aviso-sub aviso-err">{fallaronImgs} {fallaronImgs===1?'imagen no se pudo subir':'imágenes no se pudieron subir'}. Vuelve a tocar la miniatura para reintentar, o crea el pedido sin ella.</div>}
      <div style={{display:'flex', gap:10, marginTop:14}}>
        {editar && <button className="btn btn-s" onClick={()=>setEditar(null)}>Cancelar edición</button>}
        <button className="btn btn-p btn-block" onClick={confirmar} disabled={subiendoImgs>0}>{subiendoImgs>0 ? 'Subiendo imágenes…' : (editar?'Guardar cambios':'Crear pedido')}</button>
      </div>

      {nuevoCliente && <Modal titulo="Nuevo cliente" onCerrar={()=>setNuevoCliente(false)}>
        <div className="campo"><label>Nombre</label><input value={nc.nombre} onChange={e=>setNc({...nc,nombre:e.target.value})}/></div>
        <div className="grid2">
          <div className="campo"><label>Teléfono</label><input value={nc.telefono} onChange={e=>setNc({...nc,telefono:e.target.value})}/></div>
          <div className="campo"><label>Ciudad</label><input value={nc.ciudad} onChange={e=>setNc({...nc,ciudad:e.target.value})}/></div>
        </div>
        <div className="campo"><label>Preferencias / comentarios</label><textarea rows="2" value={nc.comentarios} onChange={e=>setNc({...nc,comentarios:e.target.value})}/></div>
        <button className="btn btn-p btn-block" onClick={guardarCliente}>Guardar cliente</button>
      </Modal>}
    </div>
  );
}

/* ============================================================
   TAB FLUJO
   ============================================================ */
function TabFlujo({pedidos, setPedidos, clientes, productos, temas, cobrarYEntregar, terminarStock, editarPedido, avisar}){
  const nomTema = id => (temas.find(t=>t.id===id)||{}).nombre || 'Sin tema';
  const [guiaDe, setGuiaDe] = useState(null);
  const activos = pedidos.filter(p=>p.estado!=='entregado');
  const cols = [
    {k:'urg', t:'Hoy y atrasados', filtro:p=>diasPara(p.entrega)<=0, urgente:true},
    {k:'prox',t:'Próximos (1–3 días)', filtro:p=>diasPara(p.entrega)>=1 && diasPara(p.entrega)<=3},
    {k:'desp',t:'Después', filtro:p=>diasPara(p.entrega)>3},
  ];

  const nomCliente = p => p.destino==='stock' ? 'Producción para stock' : (clientes.find(c=>c.id===p.clienteId)?.nombre || p.clienteNombre || 'Cliente');
  const toggleTarea = (pid, iid, campo) => {
    setPedidos(pedidos.map(p=>p.id!==pid?p:{...p, items:p.items.map(i=>i.id!==iid?i:{...i, [campo]:!i[campo]})}));
  };
  const listo = p => p.items.every(i=>i.tBastidor && i.tImagen);

  const subirGuia = (p, data) => {
    setPedidos(prev=>prev.map(x=>x.id!==p.id?x:{...x, envio:{...x.envio, guia:data, guiaEstado:'subiendo'}}));
    subirImagenAuto(data, 'guia_'+p.folio, patch=>{
      setPedidos(prev=>prev.map(x=>x.id!==p.id?x:{...x, envio:{
        ...x.envio,
        guia: patch.imagen!==undefined ? patch.imagen : x.envio.guia,
        guiaEstado: patch.imgEstado
      }}));
      if(patch.imgEstado==='ok')    avisar('Guía guardada en el pedido <b>#'+p.folio+'</b>');
      if(patch.imgEstado==='local') avisar('Guía cargada en el pedido <b>#'+p.folio+'</b>');
      if(patch.imgEstado==='error') avisar('No se pudo subir la guía a Drive — vuelve a intentarlo');
    });
  };

  return (
    <div>
      <div className="titulo">Flujo de trabajo</div>
      <div className="subtitulo">Dos tareas por producto: bastidor e imagen. Al completar todo, el pedido se puede entregar.</div>
      <div className="flujo-cols">
        {cols.map(col=>{
          const lista = activos.filter(col.filtro).sort((a,b)=>a.entrega<b.entrega?-1:1);
          return (
            <div key={col.k}>
              <div className={'fcol-h'+(col.urgente?' urgente':'')}>{col.t}<span className="fc-n">{lista.length}</span></div>
              {lista.length===0 && <Vacio t="Sin pedidos" x="Nada pendiente en este bloque"/>}
              {lista.map(p=>{
                const d = diasPara(p.entrega);
                const cls = d<0?'urgente':(d===0?'hoy':(listo(p)?'ok':''));
                return (
                  <div key={p.id} className={'pedido-card '+cls}>
                    <div className="pc-top">
                      <div>
                        <span className="pc-folio">#{p.folio}</span>
                        {p.destino==='stock' && <span className="tag tag-negro" style={{marginLeft:7}}>Stock</span>}
                        {p.envio && <span className="tag tag-azul" style={{marginLeft:7}}>Envío</span>}
                        <div className="pc-cliente">{nomCliente(p)}</div>
                        <div className="pc-fecha">Entrega {fFecha(p.entrega)} {d<0?'· '+Math.abs(d)+'d atrasado':(d===0?'· hoy':'· en '+d+'d')}</div>

                    </div>}
                    <div className="pc-foot">
                      {p.destino==='cliente' && <span style={{fontSize:12.5, color:'var(--gris-7)'}}>

                      </span>}
                      {listo(p)
                        ? (p.destino==='stock'

                        : <span className="tag tag-gris">{p.items.filter(i=>i.tBastidor&&i.tImagen).length}/{p.items.length} listos</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   TAB PEDIDOS (listado completo)
   ============================================================ */
function TabPedidos({pedidos, setPedidos, clientes, productos, temas, avisar}){
  const [busca, setBusca] = useState('');
  const [fEstado, setFEstado] = useState('');
  const [fSaldo, setFSaldo] = useState('');
  const [ver, setVer] = useState(null);

  const nomCliente = p => p.destino==='stock' ? 'Producción para stock' : (clientes.find(c=>c.id===p.clienteId)?.nombre || p.clienteNombre || 'Cliente');
  const pagadoDe = p => (p.pagos||[]).reduce((s,x)=>s+x.monto,0);
  const saldoDe = p => p.total - pagadoDe(p);

  const filtrados = pedidos.filter(p=>{
    if(fEstado && p.estado!==fEstado) return false;
    if(fSaldo==='pendiente' && !(p.destino==='cliente' && saldoDe(p)>0)) return false;
    if(fSaldo==='saldado' && !(p.destino==='cliente' && saldoDe(p)<=0)) return false;
    if(busca){
      const txt = (String(p.folio)+' '+nomCliente(p)).toLowerCase();
      if(!txt.includes(busca.toLowerCase())) return false;
    }
    return true;
  }).sort((a,b)=>b.folio-a.folio);

  const registrarAbono = (pedido, monto, metodo) => {
    setPedidos(pedidos.map(x=>x.id!==pedido.id?x:{...x, pagos:[...(x.pagos||[]), {monto, metodo, fecha:hoyISO()}]}));
    avisar('Abono de <b>'+dinero(monto)+'</b> registrado en #'+pedido.folio);
    setVer(null);
  };

  return (
    <div>
      <div className="campo"><input placeholder="Buscar folio o cliente…" value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <div className="chips-rapidos" style={{marginBottom:8}}>
        {[['','Todos'],['produccion','En producción'],['entregado','Entregados']].map(([k,t])=>
          <button key={k} className={'chip-f'+(fEstado===k?' on':'')} onClick={()=>setFEstado(k)}>{t}</button>)}
      </div>
      <div className="chips-rapidos" style={{marginBottom:14}}>
        {[['','Cualquier saldo'],['pendiente','Con saldo pendiente'],['saldado','Saldado']].map(([k,t])=>
          <button key={k} className={'chip-f'+(fSaldo===k?' on':'')} onClick={()=>setFSaldo(k)}>{t}</button>)}
      </div>
      <div className="card">
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Folio</th><th>Cliente</th><th>Entrega</th><th>Estado</th><th className="td-num">Total</th><th className="td-num">Saldo</th><th></th></tr></thead>
          <tbody>
            {filtrados.map(p=>{
              const saldo = saldoDe(p);
              return (
                <tr key={p.id}>
                  <td style={{fontWeight:700}}>#{p.folio}</td>
                  <td>{nomCliente(p)}{p.destino==='stock' && <span className="tag tag-negro" style={{marginLeft:6}}>Stock</span>}{p.envio && <span className="tag tag-azul" style={{marginLeft:6}}>Envío</span>}</td>
                  <td>{fFecha(p.entrega)}</td>
                  <td><span className={'tag '+(p.estado==='entregado'?'tag-verde':'tag-am')}>{p.estado==='entregado'?'Entregado':'Producción'}</span></td>
                  <td className="td-num">{p.destino==='cliente'?dinero(p.total):'—'}</td>
                  <td className="td-num">{p.destino!=='cliente' ? '—' : (saldo>0 ? <span style={{color:'var(--rojo)', fontWeight:700}}>{dinero(saldo)}</span> : <span className="tag tag-verde">Saldado</span>)}</td>
                  <td style={{textAlign:'right'}}><button className="btn btn-s btn-mini" onClick={()=>setVer(p)}>Ver</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
        {filtrados.length===0 && <Vacio t="Sin resultados" x="No hay pedidos con esos filtros"/>}
      </div>
      {ver && <ModalDetallePedido pedido={ver} clientes={clientes} productos={productos} temas={temas} onCerrar={()=>setVer(null)} onAbono={(monto,metodo)=>registrarAbono(ver, monto, metodo)}/>}
    </div>
  );
}

function VentasPosLista({ventas, productos, temas}){
  const [desde, setDesde] = useState('');
  const [hasta, setHasta] = useState('');
  const [abiertas, setAbiertas] = useState({});
  const nomTema = id => (temas.find(t=>t.id===id)||{}).nombre || 'Sin tema';

  const filtradas = ventas.filter(v=>{
    if(desde && v.fecha < desde) return false;
    if(hasta && v.fecha > hasta) return false;
    return true;
  });

  const porFecha = {};
  filtradas.forEach(v=>{ (porFecha[v.fecha] = porFecha[v.fecha] || []).push(v); });
  const fechas = Object.keys(porFecha).sort((a,b)=>a<b?1:-1);
  const totalGeneral = filtradas.reduce((s,v)=>s+v.total,0);

  return (
    <div>
      <div className="filtros-fecha">
        <div className="campo"><label>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
        <div className="campo"><label>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        {(desde||hasta) && <button className="btn btn-s btn-mini" onClick={()=>{setDesde('');setHasta('');}}>Limpiar</button>}
      </div>
      <div className="grid2" style={{marginBottom:14}}>
        <div className="stat"><div className="s-l">Total del periodo</div><div className="s-v">{dinero(totalGeneral)}</div></div>
        <div className="stat"><div className="s-l">Ventas</div><div className="s-v">{filtradas.length}</div></div>
      </div>
      {fechas.length===0 && <div className="card"><Vacio t="Sin ventas" x="No hay ventas de stock en este rango"/></div>}
      {fechas.map(f=>{
        const lista = porFecha[f];
        const totalDia = lista.reduce((s,v)=>s+v.total,0);
        return (
          <div key={f} className="card">
            <div className="card-h">{fFecha(f)}<span className="tag tag-am">{dinero(totalDia)} · {lista.length} venta{lista.length!==1?'s':''}</span></div>
            {lista.map(v=>{
              const abierta = !!abiertas[v.id];
              const pzas = v.items.reduce((s,i)=>s+i.cantidad,0);
              return (
                <div key={v.id} style={{border:'1px solid var(--gris-2)', borderRadius:8, marginBottom:8, overflow:'hidden'}}>
                  <button style={{width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 13px', background:'var(--fondo)', textAlign:'left', gap:8}} onClick={()=>setAbiertas({...abiertas, [v.id]:!abierta})}>
                    <span>{pzas} pza{pzas!==1?'s':''} · <span style={{color:'var(--gris-5)'}}>{v.metodo}</span>{v.descuento>0 && <span className="tag tag-gris" style={{marginLeft:6}}>−{v.descuento}%</span>}</span>
                    <span style={{fontWeight:700}}>{dinero(v.total)}</span>
                  </button>
                  {abierta && <div style={{padding:'4px 13px 10px'}}>
                    {v.items.map((i,ix)=>{
                      const p = prodDe(i.prodId, productos);
                      return (
                        <div key={ix} className="carrito-line">
                          <div>{nomTema(i.temaId)} <span style={{color:'var(--gris-5)'}}>· {prodEtiqueta(p)}</span></div>
                          <div style={{fontWeight:600}}>{i.cantidad} × {dinero(i.precio)}</div>
                        </div>
                      );
                    })}
                  </div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ============================================================
   TAB POS (venta de stock)
   ============================================================ */
function TabPos({stock, productos, temas, venderStock}){
  const [carrito, setCarrito] = useState([]);
  const [metodo, setMetodo] = useState('Efectivo');
  const [descuento, setDescuento] = useState(0);
  const [prodSel, setProdSel] = useState(null);

  const nomTema = id => (temas.find(t=>t.id===id)||{}).nombre || 'Sin tema';
  const prodsConStock = productos.filter(p => stock.some(s=>s.prodId===p.id && s.cantidad>0));
  const totalDe = prodId => stock.filter(s=>s.prodId===prodId).reduce((s,x)=>s+x.cantidad,0);
  const temasDeProd = prodId => stock.filter(s=>s.prodId===prodId && s.cantidad>0);

  const enCarrito = id => carrito.find(c=>c.stockId===id);
  const agregar = s => {
    const p = prodDe(s.prodId, productos);
    const ex = enCarrito(s.id);
    if(ex){ if(ex.cantidad < s.cantidad) setCarrito(carrito.map(c=>c.stockId===s.id?{...c, cantidad:c.cantidad+1}:c)); }
    else setCarrito([...carrito, {stockId:s.id, prodId:s.prodId, temaId:s.temaId, precio:p?p.precio:0, cantidad:1, max:s.cantidad}]);
  };
  const cambiar = (id, delta) => {
    setCarrito(carrito.map(c=>c.stockId===id?{...c, cantidad:Math.max(0, Math.min(c.max, c.cantidad+delta))}:c).filter(c=>c.cantidad>0));
  };
  const subtotal = carrito.reduce((s,c)=>s+c.precio*c.cantidad,0);
  const total = Math.round(subtotal*(1-descuento/100));

  const cobrar = () => {
    if(!carrito.length) return;
    venderStock(carrito, total, Number(descuento)||0, metodo);
    setCarrito([]); setDescuento(0);
  };

  const prodActual = prodSel ? prodDe(prodSel, productos) : null;

  return (
    <div>
      <div className="titulo">Venta de stock</div>
      <div className="subtitulo">Primero el tamaño, después el tema exacto — así se descuenta la pieza correcta del inventario</div>

      {!prodSel ? (
        <div className="pos-grid" style={{marginBottom:16}}>
          {prodsConStock.map(p=>(
            <button key={p.id} className="pos-item" onClick={()=>setProdSel(p.id)}>
              <div className="pi-t">{p.nombre}</div>
              <div className="pi-m">{p.tipo}</div>
              <div className="pi-p">{dinero(p.precio)}</div>
              <div className="pi-s">{totalDe(p.id)} en stock</div>
            </button>
          ))}
          {prodsConStock.length===0 && <Vacio t="Sin stock disponible" x="Aún no hay piezas en inventario para vender"/>}
        </div>
      ) : (
        <div style={{marginBottom:16}}>
          <button className="btn btn-s btn-mini" style={{marginBottom:10}} onClick={()=>setProdSel(null)}>← Volver a tamaños</button>
          <div className="subtitulo" style={{marginTop:-4}}>{prodActual?.nombre} — elige el tema</div>
          <div className="pos-grid">
            {temasDeProd(prodSel).map(s=>{
              const restante = s.cantidad - (enCarrito(s.id)?.cantidad||0);
              return (
                <button key={s.id} className={'pos-item'+(restante<=0?' agotado':'')} onClick={()=>agregar(s)}>
                  <div className="pi-t">{nomTema(s.temaId)}</div>
                  <div className="pi-p">{dinero(prodActual?prodActual.precio:0)}</div>
                  <div className="pi-s">{restante} en stock</div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {carrito.length>0 && <div className="card">
        <div className="card-h">Carrito</div>
        {carrito.map(c=>(
          <div key={c.stockId} className="carrito-line">
            <div style={{flex:1}}>{nomTema(c.temaId)} <span style={{color:'var(--gris-5)'}}>· {medidaTxt(prodDe(c.prodId, productos))}</span></div>
            <div className="cant-ctrl">
              <button className="cant-btn" onClick={()=>cambiar(c.stockId,-1)}>−</button>
              <b>{c.cantidad}</b>
              <button className="cant-btn" onClick={()=>cambiar(c.stockId,1)}>+</button>
            </div>
            <div style={{width:70, textAlign:'right', fontWeight:600}}>{dinero(c.precio*c.cantidad)}</div>
          </div>
        ))}
        <div className="grid2" style={{marginTop:12}}>
          <div className="campo"><label>Descuento %</label><input type="number" min="0" max="100" value={descuento} onChange={e=>setDescuento(e.target.value)}/></div>
          <div className="campo"><label>Método de pago</label>
            <div className="metodo-row">
              {['Efectivo','Tarjeta','Transferencia'].map(m=>
                <button key={m} className={'metodo-btn'+(metodo===m?' on':'')} onClick={()=>setMetodo(m)}>{m==='Transferencia'?'Transf.':m}</button>)}
            </div>
          </div>
        </div>
        <div className="total-box">
          {descuento>0 && <div className="t-row"><span>Subtotal</span><span>{dinero(subtotal)}</span></div>}
          <div className="t-row big"><span>Total</span><span>{dinero(total)}</span></div>
        </div>
        <button className="btn btn-p btn-block" style={{marginTop:12}} onClick={cobrar}>Cobrar {dinero(total)}</button>
      </div>}
    </div>
  );
}

/* ============================================================
   TAB INVENTARIO
   ============================================================ */
function TabInventario({stock, setStock, productos, temas, crearTema, ir}){
  const [modal, setModal] = useState(false);
  const [nuevo, setNuevo] = useState({prodId:'', temaId:'', cantidad:1});
  const [abiertos, setAbiertos] = useState({});

  const agregar = () => {
    if(!nuevo.prodId || !nuevo.temaId) return;
    const ex = stock.find(s=>s.prodId===nuevo.prodId && s.temaId===nuevo.temaId);
    if(ex) setStock(stock.map(s=>s.id===ex.id?{...s, cantidad:s.cantidad+Number(nuevo.cantidad)}:s));
    else setStock([...stock, {id:uid(), prodId:nuevo.prodId, temaId:nuevo.temaId, cantidad:Number(nuevo.cantidad)}]);
    setModal(false); setNuevo({prodId:'', temaId:'', cantidad:1});
  };
  const ajustar = (id, delta) => setStock(stock.map(s=>s.id===id?{...s, cantidad:Math.max(0, s.cantidad+delta)}:s));

  const totalPzas = stock.reduce((s,x)=>s+x.cantidad,0);
  const valor = stock.reduce((s,x)=>{ const p=prodDe(x.prodId, productos); return s+(p?p.precio:0)*x.cantidad; },0);
  const nomTema = id => (temas.find(t=>t.id===id)||{}).nombre || 'Sin tema';
  const grupos = productos.filter(p=>stock.some(s=>s.prodId===p.id && s.cantidad>0));

  return (
    <div>
      <div className="titulo">Inventario de tienda</div>
      <div className="subtitulo">Piezas terminadas por tamaño, agrupadas y desglosadas por tema</div>
      <div className="grid3" style={{marginBottom:14}}>
        <div className="stat"><div className="s-l">Piezas en stock</div><div className="s-v">{totalPzas}</div></div>
        <div className="stat"><div className="s-l">Valor a precio de venta</div><div className="s-v">{dinero(valor)}</div></div>
        <div className="stat"><div className="s-l">Variantes</div><div className="s-v">{stock.filter(s=>s.cantidad>0).length}</div></div>
      </div>
      <div className="card">
        <div className="card-h">Existencias por producto
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-s btn-mini" onClick={()=>ir('pedido')}>Producir para stock</button>
            <button className="btn btn-p btn-mini" onClick={()=>setModal(true)}>+ Entrada manual</button>
          </div>
        </div>
        {grupos.map(p=>{
          const variantes = stock.filter(s=>s.prodId===p.id && s.cantidad>0);
          const totalVar = variantes.reduce((s,x)=>s+x.cantidad,0);
          const abierto = !!abiertos[p.id];
          return (
            <div key={p.id} style={{border:'1px solid var(--gris-2)', borderRadius:8, marginBottom:8, overflow:'hidden'}}>
              <button style={{width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', padding:'11px 13px', background:'var(--fondo)', textAlign:'left'}} onClick={()=>setAbiertos({...abiertos, [p.id]:!abierto})}>
                <span style={{fontWeight:600}}>{p.nombre} <span style={{color:'var(--gris-5)', fontWeight:400}}>· {variantes.length} tema{variantes.length!==1?'s':''}</span></span>
                <span className="tag tag-am">{totalVar} pzas</span>
              </button>
              {abierto && <div style={{padding:'6px 13px 10px'}}>
                {variantes.map(s=>(
                  <div key={s.id} className="carrito-line">
                    <div>{nomTema(s.temaId)}</div>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <button className="cant-btn" onClick={()=>ajustar(s.id,-1)}>−</button>
                      <b>{s.cantidad}</b>
                      <button className="cant-btn" onClick={()=>ajustar(s.id,1)}>+</button>
                    </div>
                  </div>
                ))}
              </div>}
            </div>
          );
        })}
        {grupos.length===0 && <Vacio t="Inventario vacío" x="Produce para stock desde Nuevo Pedido o registra una entrada manual"/>}
      </div>
      {modal && <Modal titulo="Entrada manual a stock" onCerrar={()=>setModal(false)}>
        <div className="campo"><label>Producto</label>
          <select value={nuevo.prodId} onChange={e=>setNuevo({...nuevo, prodId:e.target.value})}>
            <option value="">Elegir…</option>
            {productos.filter(p=>p.activo).map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </div>
        <div className="campo"><label>Tema</label>
          <SelectTema value={nuevo.temaId} onChange={id=>setNuevo({...nuevo, temaId:id})} temas={temas} crearTema={crearTema}/>
        </div>
        <div className="campo"><label>Cantidad</label><input type="number" min="1" value={nuevo.cantidad} onChange={e=>setNuevo({...nuevo, cantidad:e.target.value})}/></div>
        <button className="btn btn-p btn-block" onClick={agregar} disabled={!nuevo.prodId || !nuevo.temaId}>Agregar a stock</button>
      </Modal>}
    </div>
  );
}

/* ============================================================
   TAB CATALOGO (productos + receta de materiales)
   ============================================================ */
function TabCatalogo({productos, setProductos, materiales}){
  const [editando, setEditando] = useState(null);

  const guardar = p => {
    if(p.id) setProductos(productos.map(x=>x.id===p.id?p:x));
    else setProductos([...productos, {...p, id:uid(), activo:true}]);
    setEditando(null);
  };

  return (
    <div>
      <div className="subtitulo">Cada producto lleva su receta de materiales: de ahí sale el costo de producción y la utilidad</div>
      <div className="card">
        <div className="card-h">Productos <button className="btn btn-p btn-mini" onClick={()=>setEditando({tipo:'Canvas', nombre:'', alto:'', ancho:'', receta:[], precio:0})}>+ Nuevo producto</button></div>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Producto</th><th>Tipo</th><th className="td-num">Costo prod.</th><th className="td-num">Precio</th><th className="td-num">Utilidad</th><th></th></tr></thead>
          <tbody>
            {productos.map(p=>{
              const costo = costoProduccion(p, materiales);
              const util = p.precio - costo;
              const margen = p.precio>0 ? Math.round(util/p.precio*100) : 0;
              return (
                <tr key={p.id} style={p.activo?{}:{opacity:.45}}>
                  <td style={{fontWeight:600}}>{p.nombre}</td>
                  <td><span className="tag tag-gris">{p.tipo}</span></td>
                  <td className="td-num">{dinero(costo)}</td>
                  <td className="td-num" style={{fontWeight:700}}>{dinero(p.precio)}</td>
                  <td className="td-num" style={{color:util>0?'var(--verde)':'var(--rojo)', fontWeight:600}}>{dinero(util)} · {margen}%</td>
                  <td style={{textAlign:'right'}}><button className="btn btn-s btn-mini" onClick={()=>setEditando({...p, receta:p.receta.map(r=>({...r}))})}>Editar</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>
      {editando && <EditorProducto prod={editando} materiales={materiales} onGuardar={guardar} onCerrar={()=>setEditando(null)} onToggle={p=>{ setProductos(productos.map(x=>x.id===p.id?{...x, activo:!x.activo}:x)); setEditando(null); }}/>}
    </div>
  );
}

function EditorProducto({prod, materiales, onGuardar, onCerrar, onToggle}){
  const [p, setP] = useState(prod);
  const desglose = desgloseProduccion(p, materiales);
  const costo = desglose.reduce((s,d)=>s+d.costo, 0);
  const util = (Number(p.precio)||0) - costo;
  const margen = p.precio>0 ? Math.round(util/p.precio*100) : 0;
  const setReceta = (i, patch) => setP({...p, receta:p.receta.map((r,ix)=>ix===i?{...r,...patch}:r)});
  const nombreAuto = (tipo, alto, ancho) => (alto && ancho) ? (tipo + ' ' + alto + '×' + ancho) : (p.nombre||'');
  return (
    <Modal titulo={p.id?'Editar producto':'Nuevo producto'} onCerrar={onCerrar}>
      <div className="grid3">
        <div className="campo"><label>Tipo</label>
          <select value={p.tipo} onChange={e=>{ const tipo=e.target.value; setP(prev=>({...prev, tipo, nombre:nombreAuto(tipo, prev.alto, prev.ancho)})); }}>
            {['Canvas','Bastidor','Cartel','Otro'].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="campo"><label>Alto (cm)</label><input type="number" min="0" value={p.alto} onChange={e=>{ const alto=e.target.value; setP(prev=>({...prev, alto, nombre:nombreAuto(prev.tipo, alto, prev.ancho)})); }}/></div>
        <div className="campo"><label>Ancho (cm)</label><input type="number" min="0" value={p.ancho} onChange={e=>{ const ancho=e.target.value; setP(prev=>({...prev, ancho, nombre:nombreAuto(prev.tipo, prev.alto, ancho)})); }}/></div>
      </div>
      <div className="grid2">
        <div className="campo"><label>Nombre</label><input value={p.nombre} onChange={e=>setP({...p, nombre:e.target.value})}/></div>
        <div className="campo"><label>Precio venta $</label><input type="number" min="0" value={p.precio} onChange={e=>setP({...p, precio:Number(e.target.value)||0})}/></div>
      </div>
      <div className="campo">
        <label>Composición de materiales</label>
        <div className="subtitulo" style={{marginTop:0, marginBottom:10}}>El costo se calcula solo: por área (m²), por perímetro (metro) o por cantidad (pza). Solo las piezas piden cantidad.</div>
        {desglose.map((d,i)=>{
          const r = p.receta[i];
          const esPza = d.mat && d.mat.unidad === 'pza';
          return (
            <div key={i} className="receta-row2">
              <select value={r.mat} onChange={e=>setReceta(i,{mat:e.target.value})}>
                <option value="">Material…</option>
                {materiales.map(m=><option key={m.id} value={m.id}>{m.nombre} ({dinero(m.costo)}/{m.unidad})</option>)}
              </select>
              {esPza
                ? <input className="rc-cant" type="number" step="1" min="0" value={r.cant} title="Cantidad de piezas" onChange={e=>setReceta(i,{cant:e.target.value})}/>
                : <span className="rc-auto" title="Se calcula por la medida del producto">{d.mat ? cantidadMaterial(d.mat, p.alto, p.ancho) : '—'}</span>
              }
              <span className="rc-costo">{dinero(d.costo)}</span>
              <button className="x-line" onClick={()=>setP({...p, receta:p.receta.filter((_,ix)=>ix!==i)})}>×</button>
            </div>
          );
        })}
        <button className="btn btn-s btn-mini" onClick={()=>setP({...p, receta:[...p.receta, {mat:'', cant:1}]})}>+ Material</button>
      </div>
      <div className="total-box" style={{marginBottom:14}}>
        <div className="t-row"><span>Costo de producción</span><span>{dinero(costo)}</span></div>
        <div className="t-row"><span>Precio de venta</span><span>{dinero(p.precio)}</span></div>
        <div className="t-row big"><span>Utilidad por pieza</span><span>{dinero(util)} · {margen}%</span></div>
      </div>
      <div style={{display:'flex', gap:10}}>
        {p.id && <button className="btn btn-s" onClick={()=>onToggle(p)}>{p.activo!==false?'Desactivar':'Activar'}</button>}
        <button className="btn btn-p btn-block" onClick={()=>onGuardar(p)} disabled={!p.nombre || !p.alto || !p.ancho}>Guardar producto</button>
      </div>
    </Modal>
  );
}

/* ============================================================
   TAB TEMAS (catálogo)
   ============================================================ */
function TabTemas({temas, setTemas, stock, pedidos, ventas, avisar}){
  const [editando, setEditando] = useState(null);

  const enUso = id =>
    stock.some(s=>s.temaId===id && s.cantidad>0) ||
    pedidos.some(p=>p.items.some(i=>i.temaId===id)) ||
    ventas.some(v=>v.items.some(i=>i.temaId===id));
  const contarStock = id => stock.filter(s=>s.temaId===id).reduce((s,x)=>s+x.cantidad,0);

  const guardar = t => {
    if(!t.nombre.trim()) return;
    if(t.id) setTemas(temas.map(x=>x.id===t.id?t:x));
    else setTemas([...temas, {id:uid(), nombre:t.nombre.trim()}]);
    setEditando(null);
  };
  const eliminar = t => {
    if(enUso(t.id)){ avisar('No puedes eliminar "'+t.nombre+'": tiene stock o pedidos asociados'); return; }
    setTemas(temas.filter(x=>x.id!==t.id));
  };

  return (
    <div>
      <div className="subtitulo">Los mismos temas se usan en pedidos, inventario y ventas — mantenerlos en un solo lugar evita duplicados por error de escritura</div>
      <div className="card">
        <div className="card-h">Temas <button className="btn btn-p btn-mini" onClick={()=>setEditando({nombre:''})}>+ Nuevo tema</button></div>
        <table>
          <thead><tr><th>Tema</th><th className="td-num">En stock</th><th></th></tr></thead>
          <tbody>
            {temas.map(t=>(
              <tr key={t.id}>
                <td style={{fontWeight:600}}>{t.nombre}</td>
                <td className="td-num">{contarStock(t.id)}</td>
                <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                  <button className="btn btn-s btn-mini" style={{marginRight:6}} onClick={()=>setEditando({...t})}>Editar</button>
                  <button className="btn btn-rojo btn-mini" onClick={()=>eliminar(t)}>Eliminar</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {temas.length===0 && <Vacio t="Sin temas" x="Agrega el primero con el botón Nuevo tema"/>}
      </div>
      {editando && <Modal titulo={editando.id?'Editar tema':'Nuevo tema'} onCerrar={()=>setEditando(null)}>
        <div className="campo"><label>Nombre</label><input autoFocus value={editando.nombre} onChange={e=>setEditando({...editando, nombre:e.target.value})}/></div>
        <button className="btn btn-p btn-block" onClick={()=>guardar(editando)} disabled={!editando.nombre.trim()}>Guardar tema</button>
      </Modal>}
    </div>
  );
}

        <table>

                <td>{c.ciudad || '—'}</td>

                <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                  <button className="btn btn-s btn-mini" style={{marginRight:6}} onClick={()=>setVer(c)}>Ver</button>

          <div className="campo"><label>Ciudad</label><input value={editando.ciudad} onChange={e=>setEditando({...editando, ciudad:e.target.value})}/></div>
        </div>
        <div className="campo"><label>Preferencias / comentarios</label><textarea rows="3" value={editando.comentarios} placeholder="Temas que le gustan, forma de pago, si pide envío…" onChange={e=>setEditando({...editando, comentarios:e.target.value})}/></div>

          <div className="stat"><div className="s-l">Ciudad</div><div style={{fontWeight:600, marginTop:3}}>{ver.ciudad || '—'}</div></div>
